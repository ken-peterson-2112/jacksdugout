const ARM_CARE = {
  dailyMax: 75,
  restTiers: [
    { min: 0, max: 24, days: 0, label: "No rest" },
    { min: 25, max: 34, days: 1, label: "1 day" },
    { min: 35, max: 54, days: 2, label: "2 days" },
    { min: 55, max: 74, days: 3, label: "3 days" },
    { min: 75, max: 75, days: 4, label: "4 days" },
  ],
  budgetOptions: [24, 34, 54, 74, 75],
  maxConsecutiveDays: 3,
};

function getRestDays(pc) {
  for (const t of ARM_CARE.restTiers) { if (pc >= t.min && pc <= t.max) return t.days; }
  return 4;
}
function getRestLabel(pc) {
  for (const t of ARM_CARE.restTiers) { if (pc >= t.min && pc <= t.max) return t.label; }
  return "4 days";
}

function load(k, fb) { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : fb; } catch { return fb; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
// positionMap values may be bare tiers ("preferred") or tier-with-rank ("secondary:2").
// Rank breaks ties within a tier (1 = top). Missing rank defaults to 1.
function playerTier(player, pos) {
  const raw = player.positionMap?.[pos];
  return raw ? raw.split(":")[0] : null;
}
function playerRank(player, pos) {
  const raw = player.positionMap?.[pos];
  if (!raw) return 0;
  const parts = raw.split(":");
  return parts.length > 1 ? (parseInt(parts[1], 10) || 1) : 1;
}
function playerCanPlay(player, pos) { return !!playerTier(player, pos); }

function recomputeFromGrid(grid, availablePlayers) {
  const posHistory = {};
  const benchCount = {};
  availablePlayers.forEach(p => { posHistory[p.id] = []; benchCount[p.id] = 0; });
  for (let i = 0; i < grid.length; i++) {
    const inn = grid[i];
    availablePlayers.forEach(p => {
      for (const pos of ["P", ...FIELD_POS]) {
        if (inn[pos] === p.id) { posHistory[p.id].push(pos); return; }
      }
      if ((inn.BN || []).includes(p.id)) { posHistory[p.id].push("BN"); benchCount[p.id]++; }
    });
  }
  return { posHistory, benchCount };
}

// ══════════════════════════════════════════════════
// LINEUP GENERATOR
// ══════════════════════════════════════════════════
// Small seeded RNG so the solver can run the same roster multiple times and
// produce *different* lineups — used by multiRunSolve to score-and-pick best.
// LCG with a 31-bit state. Good enough for shuffling ties.
function makeRng(seed) {
  let s = ((seed | 0) || 1) >>> 0;
  return function rand() {
    s = (Math.imul(s, 1664525) + 1013904223) >>> 0;
    return s / 0x100000000;
  };
}

function generateLineup({ roster, pitchers, catchers, absentIds, innings = 6, benchTiers = {}, pins = [], rngSeed = null }) {
  const available = roster.filter(p => !absentIds.includes(p.id));
  const n = available.length;
  const fieldSlots = 9;
  const benchPerInning = n - fieldSlots;
  const grid = [];
  const rand = makeRng(rngSeed == null ? Math.floor(Math.random() * 1e9) : rngSeed);

  // ── Pin lookup: pin = { innIdx, pos, playerId }  where pos ∈ {1B,2B,3B,SS,LF,CF,RF,BN}
  // P and C are excluded — those come from pitcherAssignments / catcherAssignments and
  // shouldn't be double-pinned. Invalid pins (unknown player, can't-play-pos) are
  // silently dropped so partial pin sets still solve.
  const pinByInning = [];
  for (let i = 0; i < innings; i++) pinByInning.push({ posMap: {}, benchSet: new Set(), pinnedPlayers: new Set() });
  for (const pin of (pins || [])) {
    if (!pin || typeof pin.innIdx !== "number") continue;
    if (pin.innIdx < 0 || pin.innIdx >= innings) continue;
    if (pin.pos === "P" || pin.pos === "C") continue; // pitcher/catcher are driven by their own plans
    const p = available.find(x => x.id === pin.playerId);
    if (!p) continue;
    const slot = pinByInning[pin.innIdx];
    if (slot.pinnedPlayers.has(pin.playerId)) continue; // duplicate — ignore
    if (pin.pos === "BN") {
      slot.benchSet.add(pin.playerId);
      slot.pinnedPlayers.add(pin.playerId);
    } else {
      // Must be a playable position for this player, or we'd create a guaranteed warning.
      // Drop the pin silently rather than force an impossible assignment.
      if (!playerTier(p, pin.pos)) continue;
      if (slot.posMap[pin.pos]) continue; // position already pinned — ignore later duplicate
      slot.posMap[pin.pos] = pin.playerId;
      slot.pinnedPlayers.add(pin.playerId);
    }
  }
  // Helpers used by every rebalancing pass — a pinned (inning, pos) cell or
  // pinned-bench player is immovable, and a pinned field player can't be benched.
  const isPosPinned = (ii, pos) => !!(pinByInning[ii] && pinByInning[ii].posMap[pos]);
  const isBenchPinned = (ii, pid) => !!(pinByInning[ii] && pinByInning[ii].benchSet.has(pid));
  const isFieldPinned = (ii, pid) => {
    const slot = pinByInning[ii];
    if (!slot) return false;
    for (const px of Object.values(slot.posMap)) if (px === pid) return true;
    return false;
  };

  const pitcherSchedule = [];
  let inn = 0;
  for (const pa of pitchers) {
    const dur = pa.innings || 2;
    pitcherSchedule.push({ id: pa.id, start: inn, end: Math.min(inn + dur - 1, innings - 1) });
    inn += dur;
    if (inn >= innings) break;
  }
  if (pitcherSchedule.length > 0) pitcherSchedule[pitcherSchedule.length - 1].end = innings - 1;

  // Catcher plan: non-contiguous distribution. Each catcher still catches exactly
  // their configured number of innings, but those innings are spread across the
  // game rather than forced into a contiguous block. Algorithm, per inning:
  //   1. Exclude catchers whose quota is spent, who are pitching this inning, or
  //      who have already pitched earlier in the game (OBA "pitcher can't catch
  //      remainder of game" rule).
  //   2. Prefer the catcher with the most remaining innings (spreads the load
  //      evenly across the game).
  //   3. Break ties by preferring the catcher who caught longest ago (or never
  //      yet), which avoids back-to-back innings behind the plate.
  const catcherPlan = new Array(innings).fill(null);
  const cRemaining = {};
  const cLastInning = {};
  for (const ca of catchers) {
    cRemaining[ca.id] = ca.innings || 3;
    cLastInning[ca.id] = -2; // -2 so the first pick has a larger "gap" than any real value
  }
  for (let i = 0; i < innings; i++) {
    const pitcherEntryC = pitcherSchedule.find(ps => i >= ps.start && i <= ps.end);
    const pitcherIdC = pitcherEntryC ? pitcherEntryC.id : null;
    const pitchedByNow = new Set();
    for (let pp = 0; pp <= i; pp++) {
      const ppEntry = pitcherSchedule.find(ps => pp >= ps.start && pp <= ps.end);
      if (ppEntry) pitchedByNow.add(ppEntry.id);
    }
    const eligible = catchers.filter(ca =>
      cRemaining[ca.id] > 0 &&
      ca.id !== pitcherIdC &&
      !pitchedByNow.has(ca.id)
    );
    if (eligible.length === 0) continue;
    eligible.sort((a, b) => {
      const remDiff = cRemaining[b.id] - cRemaining[a.id];
      if (remDiff !== 0) return remDiff;
      const gapA = i - cLastInning[a.id];
      const gapB = i - cLastInning[b.id];
      return gapB - gapA; // larger gap wins
    });
    const chosen = eligible[0];
    catcherPlan[i] = chosen.id;
    cRemaining[chosen.id]--;
    cLastInning[chosen.id] = i;
  }

  const benchCount = {};
  const posHistory = {};
  available.forEach(p => { benchCount[p.id] = 0; posHistory[p.id] = []; });

  for (let i = 0; i < innings; i++) {
    const inning = {};
    const inningPins = pinByInning[i];
    const pitcherEntry = pitcherSchedule.find(ps => i >= ps.start && i <= ps.end);
    const pitcherId = pitcherEntry ? pitcherEntry.id : null;
    inning.P = pitcherId;

    let catcherId = catcherPlan[i];
    if (catcherId === pitcherId) catcherId = null;
    inning.C = catcherId;

    const assigned = new Set();
    if (pitcherId) assigned.add(pitcherId);
    if (catcherId) assigned.add(catcherId);

    const hasPitchedThisGame = new Set();
    for (let prev = 0; prev < i; prev++) {
      const pp = pitcherSchedule.find(ps => prev >= ps.start && prev <= ps.end);
      if (pp) hasPitchedThisGame.add(pp.id);
    }
    if (pitcherId) hasPitchedThisGame.add(pitcherId);

    if (!catcherId) {
      const cc = available
        .filter(p => !assigned.has(p.id) && playerCanPlay(p, "C") && !hasPitchedThisGame.has(p.id))
        .sort((a, b) => {
          const diff = (TIER_SCORE[playerTier(b, "C")] || 0) - (TIER_SCORE[playerTier(a, "C")] || 0);
          if (diff !== 0) return diff;
          return (playerRank(a, "C") || 99) - (playerRank(b, "C") || 99);
        });
      if (cc.length > 0) { catcherId = cc[0].id; inning.C = catcherId; assigned.add(catcherId); }
    }

    const satLast = i > 0 ? (grid[i - 1].BN || []) : [];
    const satLast2 = i > 1 ? (grid[i - 2].BN || []) : [];

    // ── Position coverage analysis (before bench selection) ──
    const fieldCandidatePool = available.filter(p => !assigned.has(p.id));
    const positionsNeeded = FIELD_POS.filter(pos => pos !== "C");
    const positionCoverage = {};
    positionsNeeded.forEach(pos => {
      positionCoverage[pos] = fieldCandidatePool.filter(p => playerTier(p, pos)).map(p => p.id);
    });

    // Measure how "scarce-valuable" each player is: sum of scarcity across their positions.
    // A player who covers multiple scarce positions is very hard to replace on the field.
    // Critically: a player who is the SOLE preferred at a position must not be benched
    // while a lower-tier player fills in, even if that position has many total candidates.
    const playerScarcityValue = {};
    fieldCandidatePool.forEach(p => {
      let val = 0;
      positionsNeeded.forEach(pos => {
        const tier = playerTier(p, pos);
        if (!tier) return;
        const coverage = positionCoverage[pos].length;
        // Count how many PREFERRED-tier players exist for this position (among available)
        const prefCount = positionCoverage[pos].filter(pid => {
          const pp = fieldCandidatePool.find(x => x.id === pid);
          return pp && playerTier(pp, pos) === "preferred";
        }).length;
        // Baseline scarcity (few total candidates means everyone is valuable)
        if (coverage === 1) val += 100;
        else if (coverage === 2) val += 50;
        else if (coverage === 3) val += 15;
        // Preferred-tier protection: benching the only/last preferred at a position is costly
        if (tier === "preferred") {
          if (prefCount === 1) val += 120;      // sole preferred — critical to keep on field
          else if (prefCount === 2) val += 35;  // one of two — still important
          else val += 15;
        } else if (tier === "secondary" && prefCount === 0) {
          // No preferred exists at this position; best secondary is effectively the top
          val += 25;
        }
      });
      playerScarcityValue[p.id] = val;
    });

    // ── Bench selection with scarcity awareness + fairness ──
    const HARD_BENCH_CAP = 3; // NO player may sit more than this many innings, ever
    // Field-pinned players must stay on the field → exclude from bench pool.
    // Bench-pinned players are pre-seeded onto the bench below.
    const fieldPinnedIds = new Set(Object.values(inningPins.posMap));
    const benchPinnedIds = inningPins.benchSet;
    const benchCandidates = fieldCandidatePool
      .filter(p => !fieldPinnedIds.has(p.id) && !benchPinnedIds.has(p.id))
      .map(p => {
        const bt = BENCH_TIER_MAP[benchTiers[p.id] || DEFAULT_BENCH_TIER];
        let score = bt.benchWeight;
        score -= benchCount[p.id] * 10;
        if (benchCount[p.id] >= bt.maxBench) score -= 200;
        // HARD CAP: 3 innings total, no exceptions
        if (benchCount[p.id] >= HARD_BENCH_CAP) score -= 5000;
        if (satLast.includes(p.id)) score -= 100;
        if (satLast2.includes(p.id) && satLast.includes(p.id)) score -= 200;
        // Scarcity protection: players who cover scarce positions are harder to bench
        score -= playerScarcityValue[p.id];
        // ── FAIRNESS: everyone must sit at least once ──
        if (benchCount[p.id] === 0 && i >= 2) score += 25 * (i - 1);
        if (benchCount[p.id] === 0 && i >= innings - 2) score += 70;
        // Small jitter breaks ties across runs so multi-run solve produces variety.
        // Amplitude well below the smallest meaningful gap so it never crosses real
        // priorities (tier gaps and bench-cap penalties are orders of magnitude larger).
        score += rand() * 3;
        return { player: p, score };
      })
      .sort((a, b) => b.score - a.score);

    // Seed bench with pinned BN players, then fill remaining slots from scored candidates.
    const pinnedBench = Array.from(benchPinnedIds);
    const openBenchSlots = Math.max(0, benchPerInning - pinnedBench.length);
    let toBench = [...pinnedBench, ...benchCandidates.slice(0, openBenchSlots).map(bc => bc.player.id)];

    // ── Bench feasibility checks ──
    // canCover: every position has SOME player (any tier) — hard constraint
    // canCoverStrict: every position has a preferred or secondary player — avoids emergency placements
    function canCover(benchSet) {
      const field = fieldCandidatePool.filter(p => !benchSet.includes(p.id));
      for (const pos of positionsNeeded) {
        if (!field.some(p => playerTier(p, pos))) return false;
      }
      return true;
    }
    function canCoverStrict(benchSet) {
      const field = fieldCandidatePool.filter(p => !benchSet.includes(p.id));
      for (const pos of positionsNeeded) {
        if (!field.some(p => {
          const t = playerTier(p, pos);
          return t === "preferred" || t === "secondary";
        })) return false;
      }
      return true;
    }
    // Try to achieve strict coverage (no emergency placements) via bench swaps.
    // If impossible (roster-limited), fall back to regular canCover.
    // Pinned BN players are immovable — never swap them off. Field-pinned players
    // are also immovable — never swap them on.
    function trySwapsForCheck(checkFn) {
      if (checkFn(toBench)) return true;
      for (let bi = toBench.length - 1; bi >= 0; bi--) {
        if (benchPinnedIds.has(toBench[bi])) continue; // can't move a pinned bench player
        // Prefer replacing with less-flexible players (fewer position options) so scarce-slot players stay on field
        const replacements = fieldCandidatePool
          .filter(p => !toBench.includes(p.id) && !fieldPinnedIds.has(p.id))
          .sort((a, b) => {
            const fa = positionsNeeded.filter(pos => playerTier(a, pos)).length;
            const fb = positionsNeeded.filter(pos => playerTier(b, pos)).length;
            return fa - fb; // fewer options → bench them (safer to sit someone inflexible)
          });
        for (const rep of replacements) {
          const testBench = [...toBench];
          testBench[bi] = rep.id;
          if (checkFn(testBench)) { toBench = testBench; break; }
        }
        if (checkFn(toBench)) break;
      }
      return checkFn(toBench);
    }
    if (!trySwapsForCheck(canCoverStrict)) {
      // Strict coverage unreachable — fall back to permissive coverage
      trySwapsForCheck(canCover);
    }

    inning.BN = toBench;
    toBench.forEach(id => { benchCount[id]++; });

    // ── Field position assignment (constraint solver) ──
    const fieldPlayers = fieldCandidatePool.filter(p => !toBench.includes(p.id));
    const playerPool = [...fieldPlayers];
    const posAssignments = {};
    // Pre-seed pinned positions so the backtracking solver never reassigns them.
    // Remove those positions from positionsToFill and those players from the pool.
    const pinnedPositions = new Set();
    for (const [pos, pid] of Object.entries(inningPins.posMap)) {
      if (pid && playerPool.find(p => p.id === pid)) {
        posAssignments[pos] = pid;
        pinnedPositions.add(pos);
      }
    }
    const positionsToFill = positionsNeeded.filter(pos => !pinnedPositions.has(pos));
    const pinnedPlayerIds = new Set(Object.values(posAssignments));
    const remainingPool = playerPool.filter(p => !pinnedPlayerIds.has(p.id));

    // TIER WEIGHTS: preferred >> secondary >> emergency > empty
    const TIER_W = { preferred: 200, secondary: 80, emergency: 25 };

    function fieldScore(player, pos, inningIdx) {
      const tier = playerTier(player, pos);
      if (!tier) return -Infinity; // HARD CONSTRAINT: no mapping = impossible
      let s = TIER_W[tier];
      // Rank tiebreaker: penalty small enough to never cross tier boundaries
      // (smallest inter-tier gap = secondary(80) - emergency(25) = 55).
      s -= (playerRank(player, pos) - 1) * 5;

      // Scarcity bonus: prefer assigning players to positions with fewer candidates
      const candidateCount = playerPool.filter(p => playerTier(p, pos)).length;
      if (candidateCount <= 2) s += 50;
      else if (candidateCount === 3) s += 20;

      // "Only option" bonus: if this player can ONLY play this position among needed ones, strong boost
      const playerOptions = positionsToFill.filter(p => playerTier(player, p)).length;
      if (playerOptions === 1) s += 40;
      else if (playerOptions === 2) s += 15;

      // Continuity bonuses (small — act as tiebreakers, never override scarcity)
      if (inningIdx > 0 && posHistory[player.id][inningIdx - 1] === pos) s += 12;
      if (inningIdx > 1 && posHistory[player.id][inningIdx - 1] === pos && posHistory[player.id][inningIdx - 2] === pos) s += 6;
      const prevPos = inningIdx > 0 ? posHistory[player.id][inningIdx - 1] : null;
      if (prevPos && prevPos !== "BN" && prevPos !== "P") {
        const pz = INFIELD.includes(prevPos) ? "IF" : "OF";
        const tz = INFIELD.includes(pos) ? "IF" : "OF";
        if (pz === tz) s += 10;
      }
      // Tiny jitter for variety across multi-run solve. Amplitude is well under
      // any meaningful priority gap (smallest is the rank step of 5), so it can
      // only shuffle already-tied candidates.
      s += rand() * 4;
      return s;
    }

    // Build candidate map: STRICT — only players with the position in their map.
    // Use remainingPool (excludes players already seated by pins) for the solver's
    // candidate lists so pinned players aren't considered for other positions.
    const posCandidates = {};
    positionsToFill.forEach(pos => {
      posCandidates[pos] = remainingPool
        .filter(p => playerTier(p, pos))
        .map(p => ({ player: p, score: fieldScore(p, pos, i) }))
        .sort((a, b) => b.score - a.score);
    });

    // Backtracking solver — fills all positions optimally, never misassigns
    function solve(remainingPos, usedIds, currentAssignment) {
      if (remainingPos.length === 0) return { assignment: { ...currentAssignment }, score: 0 };

      let bestPosIdx = 0, minCands = Infinity;
      for (let pi = 0; pi < remainingPos.length; pi++) {
        const pos = remainingPos[pi];
        const avail = posCandidates[pos].filter(c => !usedIds.has(c.player.id));
        if (avail.length < minCands) { minCands = avail.length; bestPosIdx = pi; }
      }

      const pos = remainingPos[bestPosIdx];
      const nextRemaining = remainingPos.filter((_, idx) => idx !== bestPosIdx);
      const candidates = posCandidates[pos].filter(c => !usedIds.has(c.player.id));

      if (candidates.length === 0) {
        // HEAVY penalty for empty position — solver will try hard to avoid this
        const subResult = solve(nextRemaining, usedIds, currentAssignment);
        return { assignment: subResult.assignment, score: subResult.score - 500 };
      }

      let bestResult = null;
      const tryLimit = candidates.length; // try ALL candidates — no artificial limit
      for (let ci = 0; ci < tryLimit; ci++) {
        const cand = candidates[ci];
        const newUsed = new Set(usedIds);
        newUsed.add(cand.player.id);
        const newAssign = { ...currentAssignment, [pos]: cand.player.id };
        const subResult = solve(nextRemaining, newUsed, newAssign);
        const totalScore = cand.score + subResult.score;
        if (!bestResult || totalScore > bestResult.score) {
          bestResult = { assignment: subResult.assignment, score: totalScore };
        }
      }
      return bestResult || { assignment: currentAssignment, score: -99999 };
    }

    const solution = solve(positionsToFill, new Set(), {});
    Object.assign(posAssignments, solution.assignment);

    // ── Global swap optimization: try every pairwise swap, take any that improves total score ──
    // This catches cases where the greedy solver locked in a suboptimal arrangement.
    function assignmentScore(assign) {
      let total = 0;
      for (const [pos, pid] of Object.entries(assign)) {
        if (!pid) { total -= 500; continue; }
        const player = playerPool.find(p => p.id === pid);
        if (!player) continue;
        const sc = fieldScore(player, pos, i);
        if (sc === -Infinity) return -Infinity;
        total += sc;
      }
      return total;
    }
    // Tier+rank dominance key: higher = strictly better slot for this player.
    // Used as a safety net in pairwise swap so scarcity/continuity bonuses can
    // never block a swap where both players land at an equal-or-better tier
    // (and at least one is strictly better). Catches cases like Benji at 1B
    // sec:2 + Jude at SS sec:4  \u2192  Benji at SS pref + Jude at 1B sec:1.
    function tierRankKey(player, pos) {
      const t = playerTier(player, pos);
      if (!t) return -Infinity;
      return TIER_W[t] * 10 - (playerRank(player, pos) - 1);
    }
    function runPairwiseSwap() {
      let improved = true, swapIters = 0, anyChange = false;
      while (improved && swapIters < 20) {
        improved = false;
        swapIters++;
        const assignedPosList = positionsToFill.filter(pos => posAssignments[pos]);
        for (let a = 0; a < assignedPosList.length; a++) {
          for (let b = a + 1; b < assignedPosList.length; b++) {
            const posA = assignedPosList[a], posB = assignedPosList[b];
            const playerA = playerPool.find(p => p.id === posAssignments[posA]);
            const playerB = playerPool.find(p => p.id === posAssignments[posB]);
            if (!playerA || !playerB) continue;
            if (!playerTier(playerA, posB) || !playerTier(playerB, posA)) continue;
            // Strict tier-dominance check: both players land at an equal-or-better
            // tier (+rank) slot, and at least one strictly improves. Accept regardless
            // of scarcity/continuity noise in fieldScore.
            const aBeforeTR = tierRankKey(playerA, posA);
            const aAfterTR  = tierRankKey(playerA, posB);
            const bBeforeTR = tierRankKey(playerB, posB);
            const bAfterTR  = tierRankKey(playerB, posA);
            const strictlyDominates = aAfterTR >= aBeforeTR && bAfterTR >= bBeforeTR &&
                                      (aAfterTR > aBeforeTR || bAfterTR > bBeforeTR);
            const beforeA = fieldScore(playerA, posA, i);
            const beforeB = fieldScore(playerB, posB, i);
            const afterA  = fieldScore(playerA, posB, i);
            const afterB  = fieldScore(playerB, posA, i);
            if (strictlyDominates || afterA + afterB > beforeA + beforeB) {
              posAssignments[posA] = playerB.id;
              posAssignments[posB] = playerA.id;
              improved = true;
              anyChange = true;
            }
          }
        }
      }
      return anyChange;
    }
    runPairwiseSwap();

    // ── Tier-inversion repair: if any field slot has a player whose tier is beaten
    // by a benched player's tier for that same slot, swap them. Protects against the
    // bencher sending a preferred-tier starter to the bench while a secondary/emergency
    // fills their slot. Runs up to 10 times to handle cascades.
    function repairInversion() {
      for (const pos of positionsToFill) {
        const fieldPid = posAssignments[pos];
        if (!fieldPid) continue;
        const fieldPlayer = available.find(p => p.id === fieldPid);
        if (!fieldPlayer) continue;
        const fieldTierScore = TIER_W[playerTier(fieldPlayer, pos)] || 0;
        // Sort bench by tier-at-pos descending (then rank asc) so we pick the BEST
        // bench candidate for this slot, not just the first one in array order.
        // Without this, repairInversion was swapping in whoever came first in toBench
        // (e.g. a secondary-tier player) instead of a sole-preferred-tier player
        // further down the list \u2014 leaving preferred players on the bench while
        // emergency/secondary fills the field slot.
        const benchSorted = toBench
          .map(bid => ({ bid, player: available.find(p => p.id === bid) }))
          // Skip pinned-bench players — user explicitly wanted them benched this inning.
          .filter(x => x.player && playerTier(x.player, pos) && !benchPinnedIds.has(x.bid))
          .sort((a, b) => {
            const ta = TIER_W[playerTier(a.player, pos)] || 0;
            const tb = TIER_W[playerTier(b.player, pos)] || 0;
            if (tb !== ta) return tb - ta;
            return (playerRank(a.player, pos) || 99) - (playerRank(b.player, pos) || 99);
          });
        for (const { bid: benchId, player: benchPlayer } of benchSorted) {
          const benchT = playerTier(benchPlayer, pos);
          const benchTierScore = TIER_W[benchT];
          if (benchTierScore <= fieldTierScore) continue;
          // Don't push fieldPlayer past their bench tier cap
          const ft = BENCH_TIER_MAP[benchTiers[fieldPid] || DEFAULT_BENCH_TIER];
          if ((benchCount[fieldPid] || 0) + 1 > ft.maxBench) continue;
          if ((benchCount[fieldPid] || 0) + 1 > HARD_BENCH_CAP) continue;
          // Swap: benchPlayer takes the position; fieldPlayer goes to bench
          posAssignments[pos] = benchPlayer.id;
          const bIdx = toBench.indexOf(benchId);
          toBench[bIdx] = fieldPid;
          benchCount[benchId] = Math.max(0, (benchCount[benchId] || 0) - 1);
          benchCount[fieldPid] = (benchCount[fieldPid] || 0) + 1;
          return true;
        }
      }
      return false;
    }
    let repairIters = 0;
    while (repairInversion() && repairIters < 10) repairIters++;
    // Re-run pairwise swap after bench repair \u2014 bench \u2194 field swaps can open up
    // new in-field dominating swaps that weren't available before.
    if (repairIters > 0) runPairwiseSwap();

    // ── Rescue: if any position is STILL empty, pull best candidate from bench ──
    // Pinned-bench players are never rescued — user wanted them sitting.
    // Pinned-field players are never re-benched — they're already placed.
    const emptyPos = positionsToFill.filter(pos => !posAssignments[pos]);
    for (const pos of emptyPos) {
      const benchRescue = toBench
        .filter(bid => !benchPinnedIds.has(bid))
        .map(bid => available.find(p => p.id === bid))
        .filter(p => p && playerTier(p, pos))
        .sort((a, b) => {
          const diff = (TIER_W[playerTier(b, pos)] || 0) - (TIER_W[playerTier(a, pos)] || 0);
          if (diff !== 0) return diff;
          return (playerRank(a, pos) || 99) - (playerRank(b, pos) || 99);
        });
      if (benchRescue.length > 0) {
        const rescued = benchRescue[0];
        posAssignments[pos] = rescued.id;
        // Remove from bench, find most-flexible remaining field player to replace them
        const rIdx = toBench.indexOf(rescued.id);
        if (rIdx !== -1) { toBench.splice(rIdx, 1); benchCount[rescued.id]--; }
        const assignedSet = new Set(Object.values(posAssignments));
        const newBenchCand = fieldCandidatePool
          .filter(p => !assigned.has(p.id) && !assignedSet.has(p.id) && !toBench.includes(p.id) && !fieldPinnedIds.has(p.id))
          .sort((a, b) => {
            const fa = positionsNeeded.filter(pos => playerTier(a, pos)).length;
            const fb = positionsNeeded.filter(pos => playerTier(b, pos)).length;
            return fb - fa; // bench the most flexible player
          });
        if (newBenchCand.length > 0) {
          toBench.push(newBenchCand[0].id);
          benchCount[newBenchCand[0].id]++;
        }
        inning.BN = toBench;
      }
    }

    for (const pos of FIELD_POS) { if (pos !== "C") inning[pos] = posAssignments[pos] || null; }

    available.forEach(p => {
      if (p.id === pitcherId) posHistory[p.id].push("P");
      else if (p.id === catcherId) posHistory[p.id].push("C");
      else if (toBench.includes(p.id)) posHistory[p.id].push("BN");
      else {
        const f = Object.entries(posAssignments).find(([_, pid]) => pid === p.id);
        if (f) { posHistory[p.id].push(f[0]); }
        else {
          // Player couldn't be assigned to any valid position — add to bench overflow
          posHistory[p.id].push("BN");
          inning.BN = [...(inning.BN || []), p.id];
          benchCount[p.id]++;
        }
      }
    });
    grid.push(inning);
  }

  // ══════════════════════════════════════════════════
  // SECOND PASS: Bench rebalancing
  // Look at the full picture and swap to even out bench time,
  // fix back-to-back bench, and ensure nobody sits too much or too little.
  // ══════════════════════════════════════════════════
  const targetBench = Math.round((benchPerInning * innings) / available.length); // ideal bench count per player
  const maxPasses = 30; // safety limit

  for (let pass = 0; pass < maxPasses; pass++) {
    let improved = false;

    // Find the most over-benched and most under-benched players
    const overBenched = available
      .filter(p => benchCount[p.id] > targetBench)
      .sort((a, b) => benchCount[b.id] - benchCount[a.id]);
    const underBenched = available
      .filter(p => benchCount[p.id] < targetBench)
      .sort((a, b) => benchCount[a.id] - benchCount[b.id]);

    if (overBenched.length === 0 || underBenched.length === 0) break;

    // Try to swap: find an inning where over-benched player sits and under-benched plays field,
    // and swapping them would be valid (under-benched can play that position, or they can swap roles)
    for (const overP of overBenched) {
      if (improved) break;
      for (const underP of underBenched) {
        if (improved) break;
        // Find an inning where overP is on bench and underP is on field
        for (let ii = 0; ii < innings; ii++) {
          const inn = grid[ii];
          const overOnBench = (inn.BN || []).includes(overP.id);
          if (!overOnBench) continue;
          // Respect pins: can't pull pinned-bench off, can't push pinned-field to bench.
          if (isBenchPinned(ii, overP.id)) continue;

          // Find underP's field position this inning
          let underPos = null;
          for (const pos of ["P", ...FIELD_POS]) {
            if (inn[pos] === underP.id) { underPos = pos; break; }
          }
          if (!underPos || underPos === "P" || underPos === "C") continue; // can't swap pitcher or catcher (user-defined)
          if (isPosPinned(ii, underPos)) continue;
          if (isFieldPinned(ii, underP.id)) continue;

          // Can overP play underP's position?
          if (!playerTier(overP, underPos)) continue;

          // Can underP go to bench without creating back-to-back?
          const underHistory = posHistory[underP.id];
          const wouldBB = (ii > 0 && underHistory[ii - 1] === "BN") || (ii < innings - 1 && underHistory[ii + 1] === "BN");
          if (wouldBB) continue;

          // Would overP coming off bench create back-to-back for them? (should be fixing it, not creating it)
          const overHistory = posHistory[overP.id];
          // Check the swap doesn't give overP back-to-back bench elsewhere
          // (they're coming OFF bench this inning, so check if adjacent innings are also bench)
          // This is the opposite — it's REDUCING their bench, so it's fine.

          // Do the swap
          // Remove overP from bench
          const bnIdx = inn.BN.indexOf(overP.id);
          if (bnIdx !== -1) inn.BN.splice(bnIdx, 1);
          // Put underP on bench
          inn.BN.push(underP.id);
          // Put overP at underP's field position
          if (underPos === "C") inn.C = overP.id;
          else inn[underPos] = overP.id;

          // Update tracking
          posHistory[overP.id][ii] = underPos;
          posHistory[underP.id][ii] = "BN";
          benchCount[overP.id]--;
          benchCount[underP.id]++;

          improved = true;
          break;
        }
      }
    }

    // Also fix back-to-back bench situations
    if (!improved) {
      for (const p of available) {
        if (improved) break;
        const hist = posHistory[p.id];
        for (let ii = 1; ii < innings; ii++) {
          if (hist[ii] === "BN" && hist[ii - 1] === "BN") {
            // Found back-to-back. Try to swap p off bench in inning ii with someone on field
            const inn = grid[ii];
            if (isBenchPinned(ii, p.id)) continue; // pinned on bench → can't pull off
            for (const swapP of available) {
              if (swapP.id === p.id) continue;
              // Find swapP's field position in this inning (catcher is locked to user plan)
              let swapPos = null;
              for (const pos of FIELD_POS) {
                if (pos === "C") continue;
                if (inn[pos] === swapP.id) { swapPos = pos; break; }
              }
              if (!swapPos) continue;
              if (isPosPinned(ii, swapPos)) continue;
              if (isFieldPinned(ii, swapP.id)) continue;

              // Can p play swapP's position?
              if (!playerTier(p, swapPos)) continue;

              // Would swapP get back-to-back bench?
              const swapHist = posHistory[swapP.id];
              const swapWouldBB = (ii > 0 && swapHist[ii - 1] === "BN") || (ii < innings - 1 && swapHist[ii + 1] === "BN");
              if (swapWouldBB) continue;

              // Is swapP already benched more than p? Don't make it worse
              if (benchCount[swapP.id] >= benchCount[p.id]) continue;

              // Do the swap
              const bnIdx = inn.BN.indexOf(p.id);
              if (bnIdx !== -1) inn.BN.splice(bnIdx, 1);
              inn.BN.push(swapP.id);
              inn[swapPos] = p.id;

              posHistory[p.id][ii] = swapPos;
              posHistory[swapP.id][ii] = "BN";
              benchCount[p.id]--;
              benchCount[swapP.id]++;

              improved = true;
              break;
            }
            if (improved) break;
          }
        }
      }
    }

    if (!improved) break; // no more improvements possible
  }

  // ══════════════════════════════════════════════════
  // 2.5 PASS: Pull over-benched players off bench via chain swaps.
  // Direct rebalance only works if the over-benched player can play an under-benched player's
  // position. For inflexible over-benchers (e.g. Kaden: only LF/RF), that often fails.
  // Chain swap: over-benched → middle-player's pos, middle-player → under-benched's pos, under-benched → bench.
  // ══════════════════════════════════════════════════
  for (let pass = 0; pass < 15; pass++) {
    let improved = false;
    const overList = available
      .filter(p => benchCount[p.id] > targetBench)
      .sort((a, b) => benchCount[b.id] - benchCount[a.id]);
    const underList = available
      .filter(p => benchCount[p.id] < targetBench)
      .sort((a, b) => benchCount[a.id] - benchCount[b.id]);
    if (overList.length === 0 || underList.length === 0) break;

    outer: for (const overP of overList) {
      for (let ii = 0; ii < innings; ii++) {
        const inn = grid[ii];
        if (!(inn.BN || []).includes(overP.id)) continue;
        if (isBenchPinned(ii, overP.id)) continue;
        // For each position overP can play, find the current occupant (middle player)
        // Catcher is locked to the user-defined plan — never swap into or out of C.
        for (const midPos of FIELD_POS) {
          if (midPos === "P" || midPos === "C") continue;
          if (!playerTier(overP, midPos)) continue;
          if (isPosPinned(ii, midPos)) continue;
          const midId = inn[midPos];
          if (!midId) continue;
          const midP = available.find(p => p.id === midId);
          if (!midP) continue;
          if (isFieldPinned(ii, midP.id)) continue;
          for (const underP of underList) {
            if (underP.id === overP.id || underP.id === midP.id) continue;
            // Find underP's current field position in this inning (excluding C)
            let underPos = null;
            for (const pos of FIELD_POS) {
              if (pos === "C") continue;
              if (inn[pos] === underP.id) { underPos = pos; break; }
            }
            if (!underPos) continue; // underP not on field (likely pitching, catching, or already benched)
            if (underPos === midPos) continue;
            if (isPosPinned(ii, underPos)) continue;
            if (isFieldPinned(ii, underP.id)) continue;
            if (!playerTier(midP, underPos)) continue;
            // Check back-to-back for underP going to bench
            const uHist = posHistory[underP.id];
            const underBB = (ii > 0 && uHist[ii - 1] === "BN") || (ii < innings - 1 && uHist[ii + 1] === "BN");
            if (underBB) continue;
            // Execute chain: overP → midPos, midP → underPos, underP → bench
            const bIdx = inn.BN.indexOf(overP.id);
            if (bIdx !== -1) inn.BN.splice(bIdx, 1);
            inn.BN.push(underP.id);
            if (midPos === "C") inn.C = overP.id; else inn[midPos] = overP.id;
            if (underPos === "C") inn.C = midP.id; else inn[underPos] = midP.id;
            posHistory[overP.id][ii] = midPos;
            posHistory[midP.id][ii] = underPos;
            posHistory[underP.id][ii] = "BN";
            benchCount[overP.id]--;
            benchCount[underP.id]++;
            improved = true;
            break outer;
          }
        }
      }
    }
    if (!improved) break;
  }

  // ══════════════════════════════════════════════════
  // THIRD PASS: Force-sit players who never sat (chain swaps)
  // For each player with benchCount === 0, try to find ANY inning where we can
  // bench them via a chain swap: bench-player → middle-player's pos → middle-player → never-sat's pos → bench.
  // ══════════════════════════════════════════════════
  const neverSat = available.filter(p => benchCount[p.id] === 0);
  for (const target of neverSat) {
    let forced = false;
    for (let ii = 0; ii < innings && !forced; ii++) {
      const inn = grid[ii];
      // Find target's non-C, non-P position this inning — catcher is locked to user plan
      let targetPos = null;
      for (const pos of FIELD_POS) {
        if (pos === "C") continue;
        if (inn[pos] === target.id) { targetPos = pos; break; }
      }
      if (!targetPos) continue; // target is pitching, catching, or already benched — skip
      if (isPosPinned(ii, targetPos)) continue;
      if (isFieldPinned(ii, target.id)) continue;
      // Avoid creating back-to-back bench for target
      const tHist = posHistory[target.id];
      const targetBB = (ii > 0 && tHist[ii - 1] === "BN") || (ii < innings - 1 && tHist[ii + 1] === "BN");
      if (targetBB) continue;

      // Direct swap: try any bench player who can play targetPos
      for (const benchId of [...(inn.BN || [])]) {
        const benchP = available.find(p => p.id === benchId);
        if (!benchP) continue;
        if (isBenchPinned(ii, benchId)) continue;
        if (!playerTier(benchP, targetPos)) continue;
        // Swap
        const bIdx = inn.BN.indexOf(benchId);
        if (bIdx !== -1) inn.BN.splice(bIdx, 1);
        inn.BN.push(target.id);
        inn[targetPos] = benchP.id;
        posHistory[target.id][ii] = "BN";
        posHistory[benchP.id][ii] = targetPos;
        benchCount[target.id]++;
        benchCount[benchP.id]--;
        forced = true;
        break;
      }
      if (forced) break;

      // Chain swap: bench player → middle player's pos → middle player → target's pos → bench
      for (const benchId of [...(inn.BN || [])]) {
        if (forced) break;
        const benchP = available.find(p => p.id === benchId);
        if (!benchP) continue;
        if (isBenchPinned(ii, benchId)) continue;
        for (const midPos of FIELD_POS) {
          if (midPos === "P" || midPos === "C") continue;
          if (midPos === targetPos) continue;
          if (isPosPinned(ii, midPos)) continue;
          if (!playerTier(benchP, midPos)) continue;
          const midPlayerId = inn[midPos];
          if (!midPlayerId) continue;
          if (midPlayerId === target.id) continue;
          const midP = available.find(p => p.id === midPlayerId);
          if (!midP) continue;
          if (isFieldPinned(ii, midP.id)) continue;
          if (!playerTier(midP, targetPos)) continue;
          // Execute chain
          const bIdx = inn.BN.indexOf(benchId);
          if (bIdx !== -1) inn.BN.splice(bIdx, 1);
          inn.BN.push(target.id);
          inn[midPos] = benchP.id;
          inn[targetPos] = midP.id;
          posHistory[target.id][ii] = "BN";
          posHistory[midP.id][ii] = targetPos;
          posHistory[benchP.id][ii] = midPos;
          benchCount[target.id]++;
          benchCount[benchP.id]--;
          forced = true;
          break;
        }
      }
    }
  }

  // ══════════════════════════════════════════════════
  // FINAL PASS: Hard cap enforcement — no player sits more than 3 innings.
  // For any player over the cap, try direct swap then chain swap to pull them off bench.
  //
  // Runs in escalating relaxation levels so cap enforcement wins even when the
  // strict path (no back-to-back bench, stay under cap) finds no candidate:
  //   level 0 — strict (original behavior)
  //   level 1 — allow the player being benched-to to land in a back-to-back
  //             bench pattern (BB is a soft preference; cap is a hard rule)
  //   level 2 — also allow 2-hop chain swaps (overP → midPos → swapA → swapB → bench)
  //             so a player with narrow position coverage can still be pulled off
  //             the bench when every 1-hop neighbor is locked in.
  // ══════════════════════════════════════════════════
  const HARD_BENCH_CAP = 3;
  function tryHardCapFix(level) {
    const overCap = available
      .filter(p => benchCount[p.id] > HARD_BENCH_CAP)
      .sort((a, b) => benchCount[b.id] - benchCount[a.id]);
    if (overCap.length === 0) return "done";
    const allowBB = level >= 1;
    const allowTwoHop = level >= 2;
    for (const overP of overCap) {
      for (let ii = 0; ii < innings; ii++) {
        const inn = grid[ii];
        if (!(inn.BN || []).includes(overP.id)) continue;
        if (isBenchPinned(ii, overP.id)) continue;
        // Direct swap: field player at a pos overP can play goes to bench.
        for (const pos of FIELD_POS) {
          if (pos === "P" || pos === "C") continue;
          if (!playerTier(overP, pos)) continue;
          if (isPosPinned(ii, pos)) continue;
          const occId = inn[pos];
          if (!occId) continue;
          const occP = available.find(p => p.id === occId);
          if (!occP) continue;
          if (isFieldPinned(ii, occP.id)) continue;
          if (benchCount[occP.id] + 1 > HARD_BENCH_CAP) continue;
          const oHist = posHistory[occP.id];
          const occBB = (ii > 0 && oHist[ii - 1] === "BN") || (ii < innings - 1 && oHist[ii + 1] === "BN");
          if (occBB && !allowBB) continue;
          const bIdx = inn.BN.indexOf(overP.id);
          if (bIdx !== -1) inn.BN.splice(bIdx, 1);
          inn.BN.push(occP.id);
          inn[pos] = overP.id;
          posHistory[overP.id][ii] = pos;
          posHistory[occP.id][ii] = "BN";
          benchCount[overP.id]--;
          benchCount[occP.id]++;
          return "fixed";
        }
        // 1-hop chain swap: overP → midPos, midP (was at midPos) → swapTargetPos,
        // targetP (was at swapTargetPos) → bench.
        for (const midPos of FIELD_POS) {
          if (midPos === "P" || midPos === "C") continue;
          if (isPosPinned(ii, midPos)) continue;
          if (!playerTier(overP, midPos)) continue;
          const midId = inn[midPos];
          if (!midId) continue;
          const midP = available.find(p => p.id === midId);
          if (!midP) continue;
          if (isFieldPinned(ii, midP.id)) continue;
          for (const swapTargetPos of FIELD_POS) {
            if (swapTargetPos === "P" || swapTargetPos === "C") continue;
            if (swapTargetPos === midPos) continue;
            if (isPosPinned(ii, swapTargetPos)) continue;
            if (!playerTier(midP, swapTargetPos)) continue;
            const targetId = inn[swapTargetPos];
            if (!targetId) continue;
            const targetP = available.find(p => p.id === targetId);
            if (!targetP) continue;
            if (isFieldPinned(ii, targetP.id)) continue;
            if (benchCount[targetP.id] + 1 > HARD_BENCH_CAP) continue;
            const tHist = posHistory[targetP.id];
            const tBB = (ii > 0 && tHist[ii - 1] === "BN") || (ii < innings - 1 && tHist[ii + 1] === "BN");
            if (tBB && !allowBB) continue;
            const bIdx = inn.BN.indexOf(overP.id);
            if (bIdx !== -1) inn.BN.splice(bIdx, 1);
            inn.BN.push(targetP.id);
            inn[midPos] = overP.id;
            inn[swapTargetPos] = midP.id;
            posHistory[overP.id][ii] = midPos;
            posHistory[midP.id][ii] = swapTargetPos;
            posHistory[targetP.id][ii] = "BN";
            benchCount[overP.id]--;
            benchCount[targetP.id]++;
            return "fixed";
          }
        }
        // 2-hop chain swap (level 2 only): overP → midPos, midP → swapAPos,
        // occA → swapBPos, occB → bench. Used when midP has no 1-hop target
        // because all their alternate positions are filled by capped players.
        if (allowTwoHop) {
          for (const midPos of FIELD_POS) {
            if (midPos === "P" || midPos === "C") continue;
            if (isPosPinned(ii, midPos)) continue;
            if (!playerTier(overP, midPos)) continue;
            const midId = inn[midPos];
            if (!midId) continue;
            const midP = available.find(p => p.id === midId);
            if (!midP) continue;
            if (isFieldPinned(ii, midP.id)) continue;
            for (const swapAPos of FIELD_POS) {
              if (swapAPos === "P" || swapAPos === "C") continue;
              if (swapAPos === midPos) continue;
              if (isPosPinned(ii, swapAPos)) continue;
              if (!playerTier(midP, swapAPos)) continue;
              const occAId = inn[swapAPos];
              if (!occAId) continue;
              const occA = available.find(p => p.id === occAId);
              if (!occA) continue;
              if (isFieldPinned(ii, occA.id)) continue;
              for (const swapBPos of FIELD_POS) {
                if (swapBPos === "P" || swapBPos === "C") continue;
                if (swapBPos === midPos || swapBPos === swapAPos) continue;
                if (isPosPinned(ii, swapBPos)) continue;
                if (!playerTier(occA, swapBPos)) continue;
                const occBId = inn[swapBPos];
                if (!occBId) continue;
                const occB = available.find(p => p.id === occBId);
                if (!occB) continue;
                if (isFieldPinned(ii, occB.id)) continue;
                if (benchCount[occB.id] + 1 > HARD_BENCH_CAP) continue;
                const bHist = posHistory[occB.id];
                const bBB = (ii > 0 && bHist[ii - 1] === "BN") || (ii < innings - 1 && bHist[ii + 1] === "BN");
                if (bBB && !allowBB) continue;
                const bIdx = inn.BN.indexOf(overP.id);
                if (bIdx !== -1) inn.BN.splice(bIdx, 1);
                inn.BN.push(occB.id);
                inn[midPos] = overP.id;
                inn[swapAPos] = midP.id;
                inn[swapBPos] = occA.id;
                posHistory[overP.id][ii] = midPos;
                posHistory[midP.id][ii] = swapAPos;
                posHistory[occA.id][ii] = swapBPos;
                posHistory[occB.id][ii] = "BN";
                benchCount[overP.id]--;
                benchCount[occB.id]++;
                return "fixed";
              }
            }
          }
        }
      }
    }
    return "stuck";
  }
  for (let cap = 0; cap < 50; cap++) {
    let outcome = tryHardCapFix(0);
    if (outcome === "done") break;
    if (outcome === "stuck") outcome = tryHardCapFix(1);
    if (outcome === "stuck") outcome = tryHardCapFix(2);
    if (outcome === "stuck") break; // roster truly too thin — emits warning downstream
  }

  // ══════════════════════════════════════════════════
  // BENCH BALANCE PASS: flatten the spread of bench counts across non-iron players.
  // Strict rule (per user ask 2026-04-23): spread = max(sits) - min(sits) across
  // non-iron players must not exceed 2. A lineup where one player sits 4 and
  // another sits 1 is considered unacceptable regardless of tier.
  // Strategy: identify over-sitters (count ≥ min+3) and under-sitters (count ≤
  // max-3); for each pairing, find an inning where over is benched and under is
  // in the field, then swap so under absorbs a sit. Accepts tier downgrades
  // freely — the balance goal outranks defensive optimization for these edges.
  // ══════════════════════════════════════════════════
  function tryBenchBalance() {
    const isNonIron = (p) => (BENCH_TIER_MAP[benchTiers[p.id] || DEFAULT_BENCH_TIER].id !== "iron");
    const nonIron = available.filter(isNonIron);
    if (nonIron.length < 2) return false;
    const counts = nonIron.map(p => benchCount[p.id] || 0);
    const minSits = Math.min(...counts);
    const maxSits = Math.max(...counts);
    if (maxSits - minSits <= 2) return false; // spread is already acceptable
    const overSitters = nonIron
      .filter(p => (benchCount[p.id] || 0) >= minSits + 3)
      .sort((a, b) => benchCount[b.id] - benchCount[a.id]);
    const underSitters = nonIron
      .filter(p => (benchCount[p.id] || 0) <= maxSits - 3);
    if (!overSitters.length || !underSitters.length) return false;

    for (const over of overSitters) {
      for (const under of underSitters) {
        for (let ii = 0; ii < innings; ii++) {
          const inn = grid[ii];
          if (!(inn.BN || []).includes(over.id)) continue;
          if (isBenchPinned(ii, over.id)) continue;
          const underPos = posHistory[under.id][ii];
          // under must be in the field; don't pull them out of P or C (locked plans)
          if (!underPos || underPos === "BN" || underPos === "P" || underPos === "C") continue;
          if (isPosPinned(ii, underPos)) continue;
          if (isFieldPinned(ii, under.id)) continue;
          // Back-to-back check for under (they'd gain a new BN at ii)
          const uHist = posHistory[under.id];
          const uBB = (ii > 0 && uHist[ii - 1] === "BN") || (ii < innings - 1 && uHist[ii + 1] === "BN");
          if (uBB) continue;
          // Direct: over can play underPos — simple 2-way swap.
          if (playerTier(over, underPos)) {
            const bIdx = inn.BN.indexOf(over.id);
            if (bIdx !== -1) inn.BN.splice(bIdx, 1);
            inn.BN.push(under.id);
            inn[underPos] = over.id;
            posHistory[over.id][ii] = underPos;
            posHistory[under.id][ii] = "BN";
            benchCount[over.id]--;
            benchCount[under.id]++;
            return true;
          }
          // Chain: over → some midPos they can play, midP → underPos (if tier valid),
          // under → bench. Lets us give a sit to under even when over and under
          // don't share a position.
          for (const midPos of FIELD_POS) {
            if (midPos === "P" || midPos === "C") continue;
            if (midPos === underPos) continue;
            if (isPosPinned(ii, midPos)) continue;
            if (!playerTier(over, midPos)) continue;
            const midId = inn[midPos];
            if (!midId) continue;
            const midP = available.find(p => p.id === midId);
            if (!midP) continue;
            if (isFieldPinned(ii, midP.id)) continue;
            if (!playerTier(midP, underPos)) continue;
            const bIdx = inn.BN.indexOf(over.id);
            if (bIdx !== -1) inn.BN.splice(bIdx, 1);
            inn.BN.push(under.id);
            inn[midPos] = over.id;
            inn[underPos] = midP.id;
            posHistory[over.id][ii] = midPos;
            posHistory[midP.id][ii] = underPos;
            posHistory[under.id][ii] = "BN";
            benchCount[over.id]--;
            benchCount[under.id]++;
            return true;
          }
        }
      }
    }
    return false;
  }
  for (let bi = 0; bi < 30; bi++) {
    if (!tryBenchBalance()) break;
  }

  return { grid, posHistory, benchCount };
}

// ══════════════════════════════════════════════════
// VALIDATION
// ══════════════════════════════════════════════════
function validateLineup(grid, posHistory, roster, innings = 6, benchTiers = {}) {
  const warnings = [];
  const playerMap = {};
  roster.forEach(p => { playerMap[p.id] = p; });

  // Pre-scan: is there at least one non-iron player at 3+ sits? If so, any 0-sit
  // player is a balance violation (high severity), not just a mild imbalance.
  let hasThreePlusSitter = false;
  for (const [id, hist] of Object.entries(posHistory)) {
    const bt = BENCH_TIER_MAP[benchTiers[id] || DEFAULT_BENCH_TIER];
    if (bt.id === "iron") continue;
    if (hist.filter(h => h === "BN").length >= 3) { hasThreePlusSitter = true; break; }
  }

  // Strict fairness check: spread of bench sits across non-iron players cannot
  // exceed 2 (user ask 2026-04-23: "one guy sits 4, another sits 1" is unacceptable).
  // High severity — the solver uses this to reject candidates outright.
  let minNonIronBN = Infinity, maxNonIronBN = -Infinity;
  let minNonIronName = null, maxNonIronName = null;
  for (const [id, hist] of Object.entries(posHistory)) {
    const bt = BENCH_TIER_MAP[benchTiers[id] || DEFAULT_BENCH_TIER];
    if (bt.id === "iron") continue;
    const bn = hist.filter(h => h === "BN").length;
    if (bn < minNonIronBN) { minNonIronBN = bn; minNonIronName = playerMap[id]?.name || id; }
    if (bn > maxNonIronBN) { maxNonIronBN = bn; maxNonIronName = playerMap[id]?.name || id; }
  }
  if (minNonIronBN !== Infinity && maxNonIronBN - minNonIronBN > 2) {
    warnings.push({
      type: "bench",
      severity: "high",
      msg: `Bench spread too wide: ${maxNonIronName} sits ${maxNonIronBN}, ${minNonIronName} sits ${minNonIronBN} \u2014 max allowed gap is 2`,
    });
  }

  for (const [id, history] of Object.entries(posHistory)) {
    const name = playerMap[id]?.name || id;
    const benchInnings = history.filter(h => h === "BN").length;
    const fieldInnings = history.filter(h => h !== "BN").length;
    const bt = BENCH_TIER_MAP[benchTiers[id] || DEFAULT_BENCH_TIER];

    if (benchInnings > bt.maxBench) warnings.push({ type:"bench", severity:"high", msg:`${name} sits ${benchInnings} innings (max ${bt.maxBench} for ${bt.label})` });

    // Flag players who never sit. When another non-iron player is at 3+ sits, this
    // is a high-severity balance problem ("someone's kid sits 3 innings while
    // another never sits" is the single most visible unfairness). When no one is
    // over 2 sits, a single 0-sitter is just distribution noise \u2014 log as med.
    if (benchInnings === 0 && innings >= 5 && bt.id !== "iron") {
      const sev = hasThreePlusSitter ? "high" : "med";
      const suffix = hasThreePlusSitter ? " while others sit 3+ \u2014 redistribute" : " \u2014 bench distribution may be uneven";
      warnings.push({ type:"bench", severity:sev, msg:`${name} never sits (${bt.label} tier expects ~${bt.maxBench} max)${suffix}` });
    }

    for (let i = 1; i < history.length; i++) {
      if (history[i] === "BN" && history[i-1] === "BN") { warnings.push({ type:"bench", severity:"high", msg:`${name} sits back-to-back (innings ${i} & ${i+1})` }); break; }
    }

    let transitions = 0;
    for (let i = 1; i < history.length; i++) {
      if (history[i] !== history[i-1] && history[i] !== "BN" && history[i-1] !== "BN") transitions++;
    }
    if (transitions > 3) warnings.push({ type:"movement", severity:"med", msg:`${name} changes positions ${transitions} times` });

    for (let i = 0; i < history.length; i++) {
      const pos = history[i];
      if (pos !== "BN" && pos !== "P" && !playerCanPlay(playerMap[id], pos)) {
        warnings.push({ type:"position", severity:"high", msg:`${name} assigned to ${pos} (inn ${i+1}) \u2014 not in their position map` });
      }
    }

    const fieldPositions = history.filter(h => h !== "BN");
    const uniqueFieldPos = [...new Set(fieldPositions)];
    if (fieldInnings >= 5 && uniqueFieldPos.length === 1 && uniqueFieldPos[0] !== "P")
      warnings.push({ type:"variety", severity:"low", msg:`${name} plays ${uniqueFieldPos[0]} every inning they're on the field` });
  }

  // Tier weights — mirror the values used inside the generator. Used for both
  // emergency counting and the aggregate IF/OF segment scores below.
  const TIER_WEIGHT = { preferred: 200, secondary: 80, emergency: 25 };
  // Segment thresholds below which an inning is flagged. See comment block below
  // the loop for how these numbers were calibrated against the current roster.
  const IF_WARN = 280;   // 1B+2B+3B+SS combined; below this ≈ multiple soft spots
  const OF_WARN = 185;   // LF+CF+RF combined; Kaden-emerg + 2 sec = 185 is the floor

  for (let i = 0; i < grid.length; i++) {
    let ec = 0;
    let ifScore = 0, ofScore = 0;
    for (const pos of FIELD_POS) {
      const pid = grid[i][pos];
      if (pid) {
        const tier = playerTier(roster.find(p => p.id === pid), pos);
        if (tier === "emergency") {
          ec++;
          const pname = playerMap[pid]?.name || pid;
          warnings.push({ type:"emergency", severity:"med", msg:`${pname} at ${pos} (inn ${i+1}) is an emergency assignment` });
        }
        const w = TIER_WEIGHT[tier] || 0;
        if (INFIELD.includes(pos) && pos !== "C") ifScore += w;
        else if (OUTFIELD.includes(pos)) ofScore += w;
      }
    }
    if (ec >= 2) warnings.push({ type:"defense", severity:"high", msg:`Inning ${i+1}: ${ec} emergency-tier assignments \u2014 defensive risk` });
    // Aggregate-tier warnings: a single position below preferred is fine, but multiple
    // soft spots stacked in the same half of the field is a red flag worth surfacing.
    if (ifScore < IF_WARN)
      warnings.push({ type:"defense", severity:"med", msg:`Inning ${i+1}: infield aggregate tier score ${ifScore} (1B+2B+3B+SS) \u2014 check for stacked soft spots` });
    if (ofScore < OF_WARN)
      warnings.push({ type:"defense", severity:"med", msg:`Inning ${i+1}: outfield aggregate tier score ${ofScore} (LF+CF+RF) \u2014 check for stacked soft spots` });

    // Tier-inversion audit: flag any inning where a preferred-tier player is on the
    // bench while the position they're preferred at is filled by an emergency-tier
    // (or secondary, for sole-preferred players) placement. This catches the pattern
    // that was letting Clay sit while Kaden played RF at emergency.
    const benchIds = grid[i].BN || [];
    for (const pos of FIELD_POS) {
      const fieldPid = grid[i][pos];
      if (!fieldPid) continue;
      const fieldTier = playerTier(roster.find(p => p.id === fieldPid), pos);
      if (fieldTier !== "emergency") continue;
      for (const bid of benchIds) {
        const bp = roster.find(p => p.id === bid);
        if (!bp) continue;
        const bTier = playerTier(bp, pos);
        if (bTier === "preferred") {
          const bname = playerMap[bid]?.name || bid;
          const fname = playerMap[fieldPid]?.name || fieldPid;
          warnings.push({ type:"inversion", severity:"high", msg:`Inning ${i+1}: ${bname} (preferred ${pos}) is benched while ${fname} plays ${pos} at emergency tier \u2014 should swap` });
        }
      }
    }
  }
  return warnings;
}

// ══════════════════════════════════════════════════
// SCORING + MULTI-RUN SOLVER
// ══════════════════════════════════════════════════
// Produce a composite score for a candidate lineup. Used by multiRunSolve to
// pick the best of N random attempts.
//
// Priority (from the user's "balanced" answer): fairness & validity first, then
// defensive tier quality.
//   1. fewest HIGH-severity warnings (bench cap, back-to-back, tier inversion,
//      invalid position, emergency stacking)
//   2. tightest bench spread (max - min across non-iron players)
//   3. fewest MED-severity warnings
//   4. highest aggregate tier score (preferred>>secondary>>emergency)
//
// Encoded as a single number so we can just take the max. Coefficients chosen
// so each higher-priority dimension dominates the one below it for realistic
// roster sizes (≤14 players, ≤8 innings).
function scoreLineup(grid, posHistory, benchCount, roster, innings, benchTiers) {
  const warnings = validateLineup(grid, posHistory, roster, innings, benchTiers);
  const counts = { high: 0, med: 0, low: 0 };
  for (const w of warnings) { counts[w.severity] = (counts[w.severity] || 0) + 1; }

  // Bench spread: ignore iron-tier players (they're expected to play every inning).
  const nonIron = roster.filter(p => (BENCH_TIER_MAP[benchTiers[p.id] || DEFAULT_BENCH_TIER].id !== "iron"));
  let spread = 0;
  if (nonIron.length > 0) {
    const vals = nonIron.map(p => benchCount[p.id] || 0);
    spread = Math.max(...vals) - Math.min(...vals);
  }

  // Tier score: sum TIER_W across every filled field slot.
  const TIER_W = { preferred: 200, secondary: 80, emergency: 25 };
  let tierScore = 0;
  for (const inn of grid) {
    for (const pos of FIELD_POS) {
      const pid = inn[pos];
      if (!pid) continue;
      const p = roster.find(x => x.id === pid);
      if (!p) continue;
      const t = playerTier(p, pos);
      if (t) tierScore += TIER_W[t];
    }
  }

  // Composite — higher is better.
  const composite = -counts.high * 100000 - spread * 2000 - counts.med * 200 + tierScore;
  return { composite, high: counts.high, med: counts.med, low: counts.low, spread, tierScore, warnings };
}

// Run the solver multiple times with different random seeds and return the
// best-scoring result. Keeps the same pin set across runs so user-locked cells
// never move; variety comes from fieldScore/benchScore tiebreaker jitter.
function multiRunSolve({ roster, pitchers, catchers, absentIds, innings, benchTiers, pins, attempts = 30 }) {
  const availableRoster = roster.filter(p => !absentIds.includes(p.id));
  let best = null;          // best candidate with spread <= 2 (strict fairness)
  let bestFallback = null;  // best candidate overall, used only if no strict pass qualifies
  for (let i = 0; i < attempts; i++) {
    // Derive a deterministic-ish seed from the attempt index + a random base so
    // each run differs but reruns aren't pathologically identical.
    const seed = ((i + 1) * 2654435761) ^ Math.floor(Math.random() * 0x7fffffff);
    let result;
    try {
      result = generateLineup({ roster, pitchers, catchers, absentIds, innings, benchTiers, pins, rngSeed: seed });
    } catch (e) {
      continue; // failed attempt — skip and keep trying
    }
    const scored = scoreLineup(result.grid, result.posHistory, result.benchCount, availableRoster, innings, benchTiers);
    // Strict fairness gate: spread of bench sits across non-iron players must
    // not exceed 2. Candidates violating this are ignored unless every attempt
    // violates, in which case the best violator is returned and the caller can
    // surface a warning.
    if (scored.spread <= 2) {
      if (!best || scored.composite > best.scored.composite) {
        best = { result, scored, seed, attempt: i };
      }
    }
    if (!bestFallback || scored.composite > bestFallback.scored.composite) {
      bestFallback = { result, scored, seed, attempt: i };
    }
  }
  if (best) return best;
  if (bestFallback) return { ...bestFallback, fairnessViolation: true };
  return best;
}

// ══════════════════════════════════════════════════
// PNG GENERATOR
// ══════════════════════════════════════════════════
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
}

function generatePNG(grid, posHistory, roster, innings) {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  const players = [...roster].sort((a, b) => parseInt(a.number) - parseInt(b.number));
  const cellW = 82, cellH = 32, nameW = 110, numW = 36, pad = 28, headerH = 56, legendH = 48, gapAfterHeader = 12;
  const gridW = numW + nameW + cellW * innings;
  const gridH = cellH * (players.length + 1);
  canvas.width = gridW + pad * 2;
  canvas.height = headerH + gapAfterHeader + gridH + legendH + pad * 2 + 8;

  // Background
  ctx.fillStyle = "#f5f3ef";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Header bar
  ctx.fillStyle = "#6b7f5e";
  roundRect(ctx, pad, pad, gridW, headerH - 16, 8);
  ctx.fill();
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 22px Georgia, serif";
  ctx.fillText("Dugout", pad + 16, pad + 26);
  ctx.font = "500 13px Inter, sans-serif";
  ctx.fillText("11U OBA \u00B7 Game Lineup", pad + 110, pad + 26);
  const dateStr = new Date().toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric", year:"numeric" });
  const dateW = ctx.measureText(dateStr).width;
  ctx.fillText(dateStr, pad + gridW - dateW - 16, pad + 26);

  const gridTop = pad + headerH + gapAfterHeader;
  const gridLeft = pad;

  // Header row
  ctx.fillStyle = "#eae6df";
  roundRect(ctx, gridLeft, gridTop, gridW, cellH, 6);
  ctx.fill();
  ctx.fillStyle = "#8c8478";
  ctx.font = "600 11px Inter, sans-serif";
  ctx.textBaseline = "middle";
  ctx.fillText("#", gridLeft + 10, gridTop + cellH / 2);
  ctx.fillText("Player", gridLeft + numW + 10, gridTop + cellH / 2);
  for (let i = 0; i < innings; i++) {
    const cx = gridLeft + numW + nameW + cellW * i;
    const label = "Inn " + (i + 1);
    const lw = ctx.measureText(label).width;
    ctx.fillText(label, cx + (cellW - lw) / 2, gridTop + cellH / 2);
  }

  // Player rows
  players.forEach((p, ri) => {
    const y = gridTop + cellH * (ri + 1);
    const history = posHistory[p.id] || [];
    ctx.fillStyle = ri % 2 === 0 ? "#ffffff" : "#f9f7f4";
    const isLast = ri === players.length - 1;
    if (isLast) { roundRect(ctx, gridLeft, y, gridW, cellH, 6); ctx.fill(); }
    else { ctx.fillRect(gridLeft, y, gridW, cellH); }

    // Number
    ctx.fillStyle = "#6b7f5e";
    ctx.font = "600 12px Inter, sans-serif";
    ctx.fillText(p.number, gridLeft + 10, y + cellH / 2);
    // Name
    ctx.fillStyle = "#3d3832";
    ctx.font = "600 12px Inter, sans-serif";
    ctx.fillText(p.name, gridLeft + numW + 10, y + cellH / 2);

    // Innings cells
    for (let i = 0; i < innings; i++) {
      const pos = history[i];
      if (!pos) continue;
      const cat = POS_CAT[pos] || "bench";
      const colors = CAT_COLORS[cat];
      const cx = gridLeft + numW + nameW + cellW * i + 4;
      ctx.fillStyle = colors.bg;
      roundRect(ctx, cx, y + 4, cellW - 8, cellH - 8, 5);
      ctx.fill();
      ctx.fillStyle = colors.text;
      ctx.font = "600 12px Inter, sans-serif";
      const tw = ctx.measureText(pos).width;
      ctx.fillText(pos, cx + (cellW - 8 - tw) / 2, y + cellH / 2);
    }
  });

  // Grid outline
  ctx.strokeStyle = "#e2ddd5";
  ctx.lineWidth = 1;
  roundRect(ctx, gridLeft, gridTop, gridW, gridH, 6);
  ctx.stroke();

  // Legend
  const legendY = gridTop + gridH + 16;
  let lx = gridLeft;
  Object.values(CAT_COLORS).forEach(item => {
    ctx.fillStyle = item.bg;
    roundRect(ctx, lx, legendY, 16, 16, 4);
    ctx.fill();
    ctx.strokeStyle = "#d4cfc7";
    ctx.lineWidth = 0.5;
    roundRect(ctx, lx, legendY, 16, 16, 4);
    ctx.stroke();
    ctx.fillStyle = "#8c8478";
    ctx.font = "500 12px Inter, sans-serif";
    ctx.fillText(item.label, lx + 22, legendY + 12);
    lx += ctx.measureText(item.label).width + 42;
  });

  return canvas.toDataURL("image/png");
}

// ══════════════════════════════════════════════════
// APP
// ══════════════════════════════════════════════════
function App() {
  const [roster, setRoster] = useState(() => {
    const storedVer = load("dugout_roster_version", 0);
    if (storedVer < ROSTER_VERSION) {
      // Roster defaults have changed — reset to pick up corrected positions + ranks.
      save("dugout_roster", DEFAULT_ROSTER);
      save("dugout_roster_version", ROSTER_VERSION);
      return DEFAULT_ROSTER;
    }
    return load("dugout_roster", DEFAULT_ROSTER);
  });
  const [pitchLogs, setPitchLogs] = useState(() => load("dugout_pitchLogs", []));
  const [tab, setTab] = useState("schedule");

  useEffect(() => { save("dugout_roster", roster); save("dugout_roster_version", ROSTER_VERSION); }, [roster]);
  useEffect(() => { save("dugout_pitchLogs", pitchLogs); }, [pitchLogs]);

  // Season schedule. Each entry: { id, date: "YYYY-MM-DD", opponent, homeAway,
  // gameType?, lineup? }. lineup, when present, is the saved game state for
  // that day so re-opening the entry restores the exact lineup the coach left.
  const [schedule, setSchedule] = useState(() => load("dugout_schedule", []));
  useEffect(() => { save("dugout_schedule", schedule); }, [schedule]);

  const [absentIds, setAbsentIds] = useState([]);
  const [pitcherAssignments, setPitcherAssignments] = useState([]);
  const [catcherAssignments, setCatcherAssignments] = useState([]);
  const [benchTiers, setBenchTiers] = useState(() => {
    const stored = load("dugout_benchTiers", null);
    // If no stored tiers or roster version bumped, seed from defaults.
    if (!stored || load("dugout_benchTiers_version", 0) < ROSTER_VERSION) {
      save("dugout_benchTiers", DEFAULT_BENCH_TIERS);
      save("dugout_benchTiers_version", ROSTER_VERSION);
      return DEFAULT_BENCH_TIERS;
    }
    return stored;
  });
  useEffect(() => { save("dugout_benchTiers", benchTiers); }, [benchTiers]);
  const [editableGrid, setEditableGrid] = useState(null);
  const [isFinalized, setIsFinalized] = useState(false);
  const [warnings, setWarnings] = useState([]);
  const [gameInnings, setGameInnings] = useState(6);
  const [generationId, setGenerationId] = useState(0);
  // Pins: user-locked (inning, pos, playerId) cells that the brute-force solver
  // must leave untouched. Cleared on every fresh Generate so a new lineup starts
  // from a clean slate. Persist across Solve Remaining so the solver respects
  // the user's manual decisions.
  const [pins, setPins] = useState([]);
  const [isSolving, setIsSolving] = useState(false);
  // Game metadata used in filenames, export headers, and the lineup print.
  // Persisted so next session opens with the last game's shell; user will
  // typically update the date + opponent for each game and keep gameType.
  const [gameMeta, setGameMeta] = useState(() => load("dugout_gameMeta", {
    date: new Date().toISOString().slice(0, 10),
    opponent: "",
    gameType: "season",
  }));
  useEffect(() => { save("dugout_gameMeta", gameMeta); }, [gameMeta]);

  // Transient: id of the schedule entry the user is currently editing. Set
  // when they click into a game from the calendar; null for a one-off lineup
  // not tied to the schedule. Drives the auto-save-back effect below.
  const [currentScheduleId, setCurrentScheduleId] = useState(null);

  // Roster sorted by jersey number ascending. All player-list UI (roster table,
  // attendance, bench priority, lineup summary, etc.) uses this so players appear
  // in #-order regardless of insertion order. Non-numeric numbers sort last.
  const sortedRoster = useMemo(() => {
    const byNumber = (a, b) => {
      const na = parseInt(a.number, 10);
      const nb = parseInt(b.number, 10);
      if (Number.isNaN(na) && Number.isNaN(nb)) return 0;
      if (Number.isNaN(na)) return 1;
      if (Number.isNaN(nb)) return -1;
      return na - nb;
    };
    return [...roster].sort(byNumber);
  }, [roster]);

  const availablePlayers = useMemo(() => sortedRoster.filter(p => !absentIds.includes(p.id)), [sortedRoster, absentIds]);

  const today = new Date().toISOString().slice(0, 10);
  const pitcherAvailability = useMemo(() => {
    const result = {};
    roster.forEach(p => {
      if (!p.positionMap?.P) return;
      const logs = pitchLogs.filter(l => l.playerId === p.id);
      const recent = logs.filter(l => { const d = (new Date(today) - new Date(l.date)) / 86400000; return d >= 0 && d <= 7; });
      if (recent.length === 0) { result[p.id] = { available: true, reason: "No recent pitching", last7: 0 }; return; }
      const lastLog = recent.sort((a, b) => b.date.localeCompare(a.date))[0];
      const restNeeded = getRestDays(lastLog.pitches);
      const daysSince = Math.floor((new Date(today) - new Date(lastLog.date)) / 86400000);
      const restRemaining = Math.max(0, restNeeded - daysSince);
      const last7 = recent.reduce((s, l) => s + l.pitches, 0);
      result[p.id] = { available: restRemaining === 0, reason: restRemaining > 0 ? `${restRemaining}d rest remaining` : "Available", restRemaining, last7 };
    });
    return result;
  }, [roster, pitchLogs, today]);

  // Recompute posHistory/benchCount from editableGrid
  const computed = useMemo(() => {
    if (!editableGrid) return { posHistory: {}, benchCount: {} };
    return recomputeFromGrid(editableGrid, availablePlayers);
  }, [editableGrid, availablePlayers]);

  const handleGenerate = () => {
    if (pitcherAssignments.length === 0 || catcherAssignments.length === 0) return;
    for (const pa of pitcherAssignments) {
      const avail = pitcherAvailability[pa.id];
      if (avail && !avail.available) { alert(`${roster.find(p => p.id === pa.id)?.name} is unavailable \u2014 ${avail.reason}.`); return; }
    }
    // Always route through multiRunSolve so every "Generate" benefits from the
    // strict bench-fairness gate (spread \u2264 2 among non-iron players). 25
    // attempts is a good balance of speed and quality for the no-pins case.
    const best = multiRunSolve({
      roster: availablePlayers, pitchers: pitcherAssignments, catchers: catcherAssignments,
      absentIds, innings: gameInnings, benchTiers, pins: [], attempts: 25,
    });
    if (!best) { alert("Couldn't produce any valid lineup. Check that pitchers/catchers are set and enough players are available."); return; }
    if (best.fairnessViolation) {
      alert(`Warning: couldn't find a lineup where bench time is within the fairness rule (max 2-inning spread). Showing the best attempt; consider adjusting bench tiers (e.g. mark more players Iron Man or Dev) and regenerate.`);
    }
    setEditableGrid(JSON.parse(JSON.stringify(best.result.grid)));
    setWarnings(best.scored.warnings);
    setIsFinalized(false);
    setPins([]); // fresh generation \u2192 clear any prior pins
    setGenerationId(g => g + 1);
    setTab("lineup");
  };

  // Brute-force multi-run solve that respects `pins`. Runs generateLineup N
  // times with different rngSeeds, scores each, keeps the best. Used by the
  // "Solve Remaining" button on the lineup tab.
  const handleSolve = (attempts = 30) => {
    if (pitcherAssignments.length === 0 || catcherAssignments.length === 0) return;
    for (const pa of pitcherAssignments) {
      const avail = pitcherAvailability[pa.id];
      if (avail && !avail.available) { alert(`${roster.find(p => p.id === pa.id)?.name} is unavailable \u2014 ${avail.reason}.`); return; }
    }
    setIsSolving(true);
    // Defer so React can render the spinner/button-disabled state before the
    // synchronous solver blocks the main thread.
    setTimeout(() => {
      try {
        const best = multiRunSolve({
          roster: availablePlayers, pitchers: pitcherAssignments, catchers: catcherAssignments,
          absentIds, innings: gameInnings, benchTiers, pins, attempts,
        });
        if (!best) { alert("Solver couldn't produce a valid lineup. Try removing a pin."); return; }
        if (best.fairnessViolation) {
          alert("Warning: couldn't find a pinned solution where bench time is within the fairness rule (max 2-inning spread). Showing the best attempt \u2014 consider removing a pin or adjusting bench tiers.");
        }
        setEditableGrid(JSON.parse(JSON.stringify(best.result.grid)));
        setWarnings(best.scored.warnings);
        setIsFinalized(false);
        setGenerationId(g => g + 1);
      } finally {
        setIsSolving(false);
      }
    }, 30);
  };

  // Re-validate when grid changes
  useEffect(() => {
    if (editableGrid) {
      const w = validateLineup(editableGrid, computed.posHistory, availablePlayers, gameInnings, benchTiers);
      setWarnings(w);
    }
  }, [editableGrid]);

  // Load a schedule entry into the active editing state. If a saved lineup is
  // present, route to the Lineup tab; otherwise jump to Game Settings so the
  // coach can build one.
  const handleOpenScheduleEntry = (entry) => {
    setGameMeta(prev => ({
      ...prev,
      date: entry.date,
      opponent: entry.opponent || "",
      homeAway: entry.homeAway || "home",
      gameType: entry.gameType || prev.gameType || "season",
    }));
    setCurrentScheduleId(entry.id);
    if (entry.lineup) {
      setEditableGrid(JSON.parse(JSON.stringify(entry.lineup.grid)));
      setPitcherAssignments(entry.lineup.pitcherAssignments || []);
      setCatcherAssignments(entry.lineup.catcherAssignments || []);
      setAbsentIds(entry.lineup.absentIds || []);
      setGameInnings(entry.lineup.gameInnings || 6);
      setIsFinalized(!!entry.lineup.isFinalized);
      setPins([]);
      setTab("lineup");
    } else {
      setEditableGrid(null);
      setPitcherAssignments([]);
      setCatcherAssignments([]);
      setAbsentIds([]);
      setIsFinalized(false);
      setPins([]);
      setTab("setup");
    }
  };

  // Mirror the active game state back to its schedule entry so the calendar
  // shows up-to-date pitcher names and re-opening the entry restores the
  // exact lineup. No-op when no schedule entry is loaded.
  useEffect(() => {
    if (!currentScheduleId) return;
    setSchedule(prev => {
      const idx = prev.findIndex(e => e.id === currentScheduleId);
      if (idx === -1) return prev;
      const next = [...prev];
      next[idx] = {
        ...prev[idx],
        date: gameMeta.date || prev[idx].date,
        opponent: gameMeta.opponent ?? prev[idx].opponent,
        homeAway: gameMeta.homeAway || prev[idx].homeAway,
        gameType: gameMeta.gameType || prev[idx].gameType,
        lineup: editableGrid ? {
          grid: editableGrid,
          pitcherAssignments,
          catcherAssignments,
          absentIds,
          gameInnings,
          isFinalized,
        } : prev[idx].lineup,
      };
      return next;
    });
  }, [currentScheduleId, gameMeta, editableGrid, pitcherAssignments, catcherAssignments, absentIds, gameInnings, isFinalized]);

  const tabs = [
    { id:"schedule", label:"Schedule" },
    { id:"roster", label:"Roster" },
    { id:"armcare", label:"Arm Care" },
    { id:"setup", label:"Game Settings" },
    { id:"lineup", label:"Lineup" },
  ];

  return (
    <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FONT, color: C.text }}>
