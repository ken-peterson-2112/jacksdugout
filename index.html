// ══════════════════════════════════════════════════
// LOG PITCHES MODAL
// Post-game pitch-count entry. Shows each planned pitcher with their
// budgeted pitch count as a hint (placeholder), an empty input for the
// actual count, and a "+ Add another pitcher" dropdown for relief.
// On Save the parent rebuilds pitchLogs for this game from these entries
// and flips the schedule entry's `played` flag.
// ══════════════════════════════════════════════════
function LogPitchesModal({ pitcherAssignments, pitchLogsForGame, roster, gameMeta, onSave, onCancel }) {
  const playerById = useMemo(() => {
    const m = {};
    roster.forEach(p => { m[p.id] = p; });
    return m;
  }, [roster]);
  const logByPlayer = useMemo(() => {
    const m = {};
    pitchLogsForGame.forEach(l => { m[l.playerId] = l; });
    return m;
  }, [pitchLogsForGame]);

  // Initial entry list = planned pitchers (with their budget as a hint), plus
  // any relief pitchers already logged for this game.
  const initialEntries = useMemo(() => {
    const seen = new Set();
    const list = [];
    pitcherAssignments.forEach(pa => {
      seen.add(pa.id);
      const existing = logByPlayer[pa.id];
      list.push({
        playerId: pa.id,
        budget: pa.budget,
        innings: pa.innings,
        pitches: existing != null ? String(existing.pitches) : "",
        planned: true,
      });
    });
    pitchLogsForGame.forEach(l => {
      if (seen.has(l.playerId)) return;
      seen.add(l.playerId);
      list.push({
        playerId: l.playerId,
        budget: null,
        innings: null,
        pitches: String(l.pitches),
        planned: false,
      });
    });
    return list;
  }, [pitcherAssignments, pitchLogsForGame, logByPlayer]);

  const [entries, setEntries] = useState(initialEntries);

  const updatePitches = (playerId, value) => {
    setEntries(prev => prev.map(e => e.playerId === playerId ? { ...e, pitches: value } : e));
  };
  const removeEntry = (playerId) => {
    setEntries(prev => prev.filter(e => e.playerId !== playerId));
  };
  const addPitcher = (playerId) => {
    if (!playerId) return;
    if (entries.some(e => e.playerId === playerId)) return;
    setEntries(prev => [...prev, { playerId, budget: null, innings: null, pitches: "", planned: false }]);
  };

  // Roster pitchers not already in the entries list.
  const availableToAdd = useMemo(() => {
    const taken = new Set(entries.map(e => e.playerId));
    return roster.filter(p => p.positionMap?.P && !taken.has(p.id));
  }, [roster, entries]);

  const dateLabel = (() => {
    if (!gameMeta?.date) return "";
    try {
      const d = new Date(gameMeta.date + "T12:00:00");
      return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    } catch { return gameMeta.date; }
  })();
  const oppLabel = gameMeta?.opponent
    ? ((gameMeta.homeAway === "away" ? "@ " : "vs ") + gameMeta.opponent)
    : "";

  return (
    <div onClick={onCancel} style={{
      position: "fixed", inset: 0, background: "rgba(40,35,30,0.45)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 100, padding: 20,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: C.surface, borderRadius: 12, padding: 24, maxWidth: 460, width: "100%",
        fontFamily: FONT, color: C.text, boxShadow: "0 10px 40px rgba(0,0,0,0.15)",
        maxHeight: "90vh", overflowY: "auto",
      }}>
        <h2 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, marginBottom: 4 }}>Log pitch counts</h2>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 18 }}>
          {[oppLabel, dateLabel].filter(Boolean).join(" · ") || "This game"}
        </div>

        <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>
          Pitchers
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 14 }}>
          {entries.length === 0 && (
            <div style={{ fontSize: 13, color: C.textMuted, fontStyle: "italic", padding: "6px 0" }}>
              No pitchers yet. Add one below to log a count.
            </div>
          )}
          {entries.map(e => {
            const player = playerById[e.playerId];
            return (
              <div key={e.playerId} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>{player?.name || "(unknown)"}</div>
                  <div style={{ fontSize: 11, color: C.textMuted }}>
                    {e.planned
                      ? `${e.innings || "?"} inning${e.innings === 1 ? "" : "s"} planned · budget ${e.budget}`
                      : "Relief / unplanned"}
                  </div>
                </div>
                <input type="number" min="0" max="200" value={e.pitches}
                  onChange={(ev) => updatePitches(e.playerId, ev.target.value)}
                  placeholder={e.budget != null ? String(e.budget) : "0"}
                  style={{ width: 70, padding: "6px 8px", border: `1px solid ${C.border}`, borderRadius: 6, fontFamily: FONT, fontSize: 14, color: C.text, background: C.surfaceAlt, textAlign: "center" }} />
                <span style={{ fontSize: 11, color: C.textMuted, width: 36 }}>pitches</span>
                {!e.planned && (
                  <button onClick={() => removeEntry(e.playerId)} title="Remove relief pitcher" style={{
                    background: "transparent", border: "none", color: C.textMuted,
                    fontSize: 16, cursor: "pointer", padding: "0 4px", lineHeight: 1,
                  }}>×</button>
                )}
              </div>
            );
          })}
        </div>

        {availableToAdd.length > 0 && (
          <div style={{ marginBottom: 20 }}>
            <select value="" onChange={(e) => { addPitcher(e.target.value); e.target.value = ""; }}
              style={{ width: "100%", padding: "8px 10px", border: `1px dashed ${C.border}`, borderRadius: 6, fontFamily: FONT, fontSize: 13, color: C.textMuted, background: C.surfaceAlt, cursor: "pointer" }}>
              <option value="">+ Add a relief pitcher…</option>
              {availableToAdd.map(p => (
                <option key={p.id} value={p.id}>{p.name}</option>
              ))}
            </select>
          </div>
        )}

        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
          <button onClick={onCancel} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.text, padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Cancel</button>
          <button onClick={() => onSave(entries)} style={{
            background: C.accent, border: `1px solid ${C.accent}`, color: "#fff",
            padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 600,
            cursor: "pointer",
          }}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// BENCH SCORE BADGE
// Golf-scorecard-style indicator for a player's bench count.
// Par = 2 sits. Under par = circle (green); over par = square (orange/red).
// Eagle (0) and double bogey (4+) get a doubled outline via box-shadow ring.
// Par renders nothing so cells stay clean for the typical case.
// `size="sm"` (default) is a 14px corner badge, absolutely positioned —
// safe to drop into any cell that already has `position: relative`.
// `size="md"` is a 22px inline badge for the Player Summary table.
// ══════════════════════════════════════════════════
function BenchScoreBadge({ count, size = "sm" }) {
  if (count == null || count === 2) return null;
  const px = size === "md" ? 22 : 16;
  const isUnder = count < 2;
  const isDouble = count === 0 || count >= 4;
  const color = (count === 0 || count === 1) ? C.greenText
              : count === 3 ? C.tierOrange
              : C.redText;
  // sm = corner badge in a cell, vertically centred against the right edge.
  // md = inline shape that wraps a count number in the Player Summary column.
  const positioning = size === "sm"
    ? { position: "absolute", top: "50%", right: 4, transform: "translateY(-50%)", pointerEvents: "none" }
    : { verticalAlign: "middle" };
  return (
    <span style={{
      ...positioning,
      display: "inline-flex",
      alignItems: "center",
      justifyContent: "center",
      width: px, height: px,
      border: `1.5px solid ${color}`,
      borderRadius: isUnder ? "50%" : 2,
      boxSizing: "border-box",
      boxShadow: isDouble ? `0 0 0 1.5px ${C.surface}, 0 0 0 3px ${color}` : "none",
      background: "transparent",
      fontSize: size === "md" ? 12 : 0,
      fontWeight: 700,
      color: color,
      lineHeight: 1,
    }}>
      {size === "md" ? count : null}
    </span>
  );
}

function Section({ title, children, alert, success, defaultOpen = true }) {

        <span style={{ fontSize: 11, transition: "transform .2s", display: "inline-block", transform: open ? "rotate(90deg)" : "rotate(0deg)", color: C.accent }}>{"\u25B6"}</span>
        <span style={{ fontSize: 14, fontWeight: 600, color: C.text, flex: 1 }}>{title}</span>
        {alert && <span style={{ fontSize: 12, color: C.orange, fontWeight: 600 }}>{alert}</span>}

// ══════════════════════════════════════════════════
// SCHEDULE TAB
// Calendar of May–Aug 2026, Sun–Sat. Empty days are tappable to add a game;
// game cells show vs/@ Opponent + chosen pitchers (or "no lineup"). Tapping a
// game cell loads the entry into the active editing state via onOpenGame.
// ══════════════════════════════════════════════════
function ScheduleTab({ schedule, setSchedule, roster, onOpenGame, canEdit = true }) {
  const months = [
    { year: 2026, monthIdx: 4, label: "May 2026" },
    { year: 2026, monthIdx: 5, label: "June 2026" },
    { year: 2026, monthIdx: 6, label: "July 2026" },
    { year: 2026, monthIdx: 7, label: "August 2026" },
  ];
  const dayHeaders = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const [editorOpen, setEditorOpen] = useState(false);
  const [editorMode, setEditorMode] = useState("add");
  const [editorKind, setEditorKind] = useState("game"); // "game" | "practice"
  const [editorDate, setEditorDate] = useState("");
  const [editorEntryId, setEditorEntryId] = useState(null);
  const [editorOpponent, setEditorOpponent] = useState("");
  // Empty by default — coach must explicitly choose Home or Away to save.
  const [editorHomeAway, setEditorHomeAway] = useState("");
  // 24h "HH:MM" string. Required for game entries.
  const [editorTime, setEditorTime] = useState("");
  // Game type defaults to "season" since regular-season games are most common.
  const [editorGameType, setEditorGameType] = useState("season");

  const openAdd = (date) => {
    setEditorMode("add");
    setEditorKind("game");
    setEditorDate(date);
    setEditorEntryId(null);
    setEditorOpponent("");
    setEditorHomeAway("");
    setEditorTime("");
    setEditorGameType("season");
    setEditorOpen(true);
  };
  const openEdit = (entry) => {
    setEditorMode("edit");
    setEditorKind(entry.kind === "practice" ? "practice" : "game");
    setEditorDate(entry.date);
    setEditorEntryId(entry.id);
    setEditorOpponent(entry.opponent || "");
    setEditorHomeAway(entry.homeAway || "");
    setEditorTime(entry.time || "");
    setEditorGameType(entry.gameType || "season");
    setEditorOpen(true);
  };
  // Build the entry object that would be created/updated on save. Used by
  // both saveEditor (returns to Schedule) and saveAndEdit (jumps to the
  // Create-a-Lineup workflow with this entry preloaded).
  const buildEntryFromForm = () => {
    const opp = editorOpponent.trim();
    if (!opp || !editorTime || !editorHomeAway) return null;
    if (editorMode === "edit" && editorEntryId) {
      const existing = schedule.find(e => e.id === editorEntryId) || {};
      return { ...existing, id: editorEntryId, opponent: opp, homeAway: editorHomeAway, time: editorTime, gameType: editorGameType || "season" };
    }
    return {
      id: "sch_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
      date: editorDate,
      kind: "game",
      opponent: opp,
      homeAway: editorHomeAway,
      time: editorTime,
      gameType: editorGameType || "season",
    };
  };
  const saveEditor = () => {
    const entry = buildEntryFromForm();
    if (!entry) return;
    if (editorMode === "edit" && editorEntryId) {
      setSchedule(prev => prev.map(e => e.id === editorEntryId ? entry : e));
    } else {
      setSchedule(prev => [...prev, entry]);
    }
    setEditorOpen(false);
  };
  // "Add & Edit" / "Save & Edit" — same write as saveEditor, then jumps
  // straight to the lineup-building flow with this entry preloaded.
  const saveAndEdit = () => {
    const entry = buildEntryFromForm();
    if (!entry) return;
    if (editorMode === "edit" && editorEntryId) {
      setSchedule(prev => prev.map(e => e.id === editorEntryId ? entry : e));
    } else {
      setSchedule(prev => [...prev, entry]);
    }
    setEditorOpen(false);
    if (typeof onOpenGame === "function") onOpenGame(entry);
  };
  const setAsPractice = () => {
    const time = editorTime.trim() || null;
    if (editorMode === "edit" && editorEntryId) {
      // Convert an existing game entry to a practice (drops opponent + lineup).
      setSchedule(prev => prev.map(e => e.id === editorEntryId ? {
        id: e.id, date: e.date, kind: "practice", time,
      } : e));
    } else {
      setSchedule(prev => [...prev, {
        id: "sch_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        date: editorDate,
        kind: "practice",
        time,
      }]);
    }
    setEditorOpen(false);
  };
  const deleteEditor = () => {
    if (editorMode !== "edit" || !editorEntryId) return;
    const msg = editorKind === "practice"
      ? "Delete this practice?"
      : "Delete this game and any saved lineup for it?";
    if (!confirm(msg)) return;
    setSchedule(prev => prev.filter(e => e.id !== editorEntryId));
    setEditorOpen(false);
  };

  // Each date can hold multiple entries (tournament weekends, game + practice
  // on the same day, etc.). Sorted by time ascending within a day; entries
  // without a time sort last so timed games appear in chronological order.
  const byDate = useMemo(() => {
    const m = {};
    schedule.forEach(e => {
      if (!m[e.date]) m[e.date] = [];
      m[e.date].push(e);
    });
    for (const date of Object.keys(m)) {
      m[date].sort((a, b) => {
        if (!a.time && !b.time) return 0;
        if (!a.time) return 1;
        if (!b.time) return -1;
        return a.time.localeCompare(b.time);
      });
    }
    return m;
  }, [schedule]);

  const rosterById = useMemo(() => {
    const m = {};
    roster.forEach(p => { m[p.id] = p; });
    return m;
  }, [roster]);

  const pitcherNames = (entry) => {
    if (!entry || !entry.lineup || !Array.isArray(entry.lineup.grid)) return null;
    const seen = new Set();
    const names = [];
    entry.lineup.grid.forEach(inn => {
      const pid = inn && inn.P;
      if (pid && !seen.has(pid)) {
        seen.add(pid);
        const p = rosterById[pid];
        if (p) names.push(p.name);
      }
    });
    return names.length > 0 ? names : null;
  };

  return (
    <div>
      <div style={{ marginBottom: 22 }}>
        <h2 style={{ fontFamily: DISPLAY, fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Schedule</h2>
        <div style={{ fontSize: 13, color: C.textMuted }}>
          {canEdit
            ? "Tap a day to add a game or practice. Tap a game or practice to edit details."
            : "Tap a game to view its lineup. Sign in as a coach to edit."}
        </div>
      </div>
      {months.map(m => (
        <MonthGrid key={m.label}
          year={m.year} monthIdx={m.monthIdx} label={m.label}
          dayHeaders={dayHeaders} byDate={byDate}
          pitcherNames={pitcherNames}
          onAdd={openAdd} onEdit={openEdit} onOpen={onOpenGame}
          canEdit={canEdit}
        />
      ))}
      {editorOpen && canEdit && (
        <ScheduleEditorModal
          mode={editorMode} kind={editorKind} date={editorDate}
          opponent={editorOpponent} setOpponent={setEditorOpponent}
          homeAway={editorHomeAway} setHomeAway={setEditorHomeAway}
          time={editorTime} setTime={setEditorTime}
          gameType={editorGameType} setGameType={setEditorGameType}
          onSave={saveEditor} onSaveAndEdit={saveAndEdit} onDelete={deleteEditor}
          onSetAsPractice={setAsPractice}
          onCancel={() => setEditorOpen(false)}
        />
      )}
    </div>
  );
}

// Format a 24h "HH:MM" time string as "9am" / "1:30pm". Returns "" for empty.
function formatTime(t) {
  if (!t) return "";
  const parts = String(t).split(":");
  const h = parseInt(parts[0], 10);
  const m = parts[1] ? parseInt(parts[1], 10) : 0;
  if (Number.isNaN(h)) return String(t);
  const ampm = h >= 12 ? "pm" : "am";
  const h12 = h % 12 || 12;
  return m === 0 ? `${h12}${ampm}` : `${h12}:${String(m).padStart(2, "0")}${ampm}`;
}

// One game/practice card inside a calendar day cell. Compact so multiple
// stack cleanly; click body opens the entry, "edit" pill opens the editor.
function EntryCard({ entry, pitcherNames, onOpen, onEdit, canEdit }) {
  const isPractice = entry.kind === "practice";
  const timeStr = entry.time ? formatTime(entry.time) : "";

  if (isPractice) {
    return (
      <div onClick={canEdit ? () => onEdit(entry) : undefined} style={{
        background: C.orangeLight, border: `1px solid ${C.orange}`, borderRadius: 6,
        padding: "4px 6px", cursor: canEdit ? "pointer" : "default",
      }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: C.orange, lineHeight: 1.3 }}>
          {timeStr && <span style={{ color: C.textMuted, fontWeight: 500, marginRight: 4 }}>{timeStr}</span>}
          Practice
        </div>
      </div>
    );
  }

  const pitchers = pitcherNames(entry);
  const hasLineup = !!pitchers;
  const isPlayed = !!entry.played;
  const oppLabel = (entry.homeAway === "away" ? "@ " : "vs ") + (entry.opponent || "?");
  return (
    <div onClick={() => onOpen(entry)} style={{
      background: hasLineup ? C.greenLight : C.blueLight,
      border: `1px solid ${hasLineup ? C.green : C.blue}`,
      borderRadius: 6, padding: "4px 6px", cursor: "pointer",
      opacity: isPlayed ? 0.85 : 1,
    }}>
      {/* Top row: time on the left, edit pill on the right. Always rendered
          so spacing stays consistent whether or not a time is set. */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", minHeight: 14 }}>
        <span style={{ fontSize: 10, color: C.textMuted, fontWeight: 500, display: "inline-flex", alignItems: "center", gap: 3 }}>{isPlayed && <span title="Pitch counts logged" style={{ color: C.greenText, fontWeight: 700 }}>{"✓"}</span>}{timeStr || " "}</span>
        {canEdit && <button onClick={(e) => { e.stopPropagation(); onEdit(entry); }} style={{
          background: C.surface, border: `1px solid ${C.border}`,
          padding: "0 5px", cursor: "pointer", color: C.text,
          fontSize: 9, lineHeight: 1.4, borderRadius: 3, flexShrink: 0,
        }} title="Edit">edit</button>}
      </div>
      {/* Opponent label gets its own full-width row so long names don't wrap
          letter-by-letter against a narrow flex column. */}
      <div style={{ fontSize: 11, fontWeight: 700, color: C.text, lineHeight: 1.2, marginTop: 2, wordBreak: "break-word" }}>{oppLabel}</div>
      <div style={{ fontSize: 10, color: hasLineup ? C.greenText : C.textMuted, lineHeight: 1.2, fontStyle: hasLineup ? "normal" : "italic", marginTop: 2, wordBreak: "break-word" }}>
        {hasLineup ? pitchers.join(", ") : "no lineup"}
      </div>
    </div>
  );
}

function MonthGrid({ year, monthIdx, label, dayHeaders, byDate, pitcherNames, onAdd, onEdit, onOpen, canEdit = true }) {
  const firstOfMonth = new Date(year, monthIdx, 1);
  const lastOfMonth = new Date(year, monthIdx + 1, 0);
  const startCol = firstOfMonth.getDay();
  const numDays = lastOfMonth.getDate();
  const cells = [];
  for (let i = 0; i < startCol; i++) cells.push({ kind: "blank", key: "b" + i });
  for (let d = 1; d <= numDays; d++) {
    const date = `${year}-${String(monthIdx + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    cells.push({ kind: "day", key: date, day: d, date });
  }
  while (cells.length % 7 !== 0) cells.push({ kind: "blank", key: "t" + cells.length });

  return (
    <div style={{ marginBottom: 32, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 18 }}>
      <h3 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, color: C.text, marginBottom: 14 }}>{label}</h3>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, marginBottom: 6 }}>
        {dayHeaders.map(d => (
          <div key={d} style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, textAlign: "center", padding: "4px 0" }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
        {cells.map(c => {
          if (c.kind === "blank") return <div key={c.key} style={{ minHeight: 110 }} />;
          const entries = byDate[c.date] || [];
          if (entries.length === 0) {
            if (!canEdit) {
              return (
                <div key={c.key} style={{
                  minHeight: 110, padding: "8px 10px",
                  background: C.surfaceAlt, border: `1px dashed ${C.border}`, borderRadius: 8,
                  fontFamily: FONT, color: C.textLight,
                }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: C.textLight }}>{c.day}</div>
                </div>
              );
            }
            return (
              <button key={c.key} onClick={() => onAdd(c.date)} style={{
                minHeight: 110, padding: "8px 10px",
                background: C.surfaceAlt, border: `1px dashed ${C.border}`, borderRadius: 8,
                fontFamily: FONT, color: C.textMuted, textAlign: "left",
                cursor: "pointer", display: "flex", flexDirection: "column",
                transition: "background 0.1s, border-color 0.1s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.background = C.accentLight; e.currentTarget.style.borderColor = C.accent; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = C.surfaceAlt; e.currentTarget.style.borderColor = C.border; }}
              >
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{c.day}</div>
              </button>
            );
          }
          // Day with one or more entries: day number + "+" sit in the header
          // row (using the otherwise-empty space next to the date), then the
          // stacked cards below. Click the "+" to add another game/practice
          // on the same day (e.g. tournament weekends).
          return (
            <div key={c.key} style={{
              minHeight: 110, padding: "6px 7px",
              background: C.surface, border: `1px solid ${C.border}`,
              borderRadius: 8, display: "flex", flexDirection: "column", gap: 4,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{c.day}</div>
                {canEdit && (
                  <button onClick={() => onAdd(c.date)} title="Add another game or practice on this day"
                    style={{
                      background: "transparent", border: `1px solid ${C.border}`,
                      color: C.textMuted, fontSize: 14, lineHeight: 1, fontWeight: 600,
                      width: 20, height: 20, borderRadius: 4, cursor: "pointer",
                      display: "inline-flex", alignItems: "center", justifyContent: "center",
                      padding: 0, fontFamily: FONT,
                    }}>+</button>
                )}
              </div>
              {entries.map(entry => (
                <EntryCard key={entry.id} entry={entry} pitcherNames={pitcherNames}
                  onOpen={onOpen} onEdit={onEdit} canEdit={canEdit} />
              ))}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ScheduleEditorModal({ mode, kind, date, opponent, setOpponent, homeAway, setHomeAway, time, setTime, gameType, setGameType, onSave, onSaveAndEdit, onDelete, onSetAsPractice, onCancel }) {
  const dateLabel = (() => {
    try {
      const d = new Date(date + "T12:00:00");
      return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });
    } catch { return date; }
  })();
  const oppValid = opponent.trim().length > 0;
  const isPracticeEdit = mode === "edit" && kind === "practice";
  // Game form requires opponent + time + an explicit home/away choice. Practice
  // form skips opponent/homeAway entirely so it only needs the time field if
  // any (which we still leave optional for practices).
  const formValid = isPracticeEdit
    ? true
    : (oppValid && !!time && !!homeAway);

  return (
    <div onClick={onCancel} style={{
      position: "fixed", inset: 0, background: "rgba(40,35,30,0.45)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 100, padding: 20,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: C.surface, borderRadius: 12, padding: 24, maxWidth: 400, width: "100%",
        fontFamily: FONT, color: C.text, boxShadow: "0 10px 40px rgba(0,0,0,0.15)",
      }}>
        <h2 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, marginBottom: 4 }}>
          {isPracticeEdit ? "Practice" : (mode === "edit" ? "Edit game" : "Add game")}
        </h2>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 18 }}>{dateLabel}</div>

        <label style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>
          Time {!isPracticeEdit && <span style={{ color: C.red }}>*</span>}{isPracticeEdit && <span style={{ textTransform: "none", letterSpacing: 0, fontWeight: 400 }}> (optional)</span>}
        </label>
        <input type="time" value={time || ""} onChange={e => setTime(e.target.value)}
          style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: 6, fontFamily: FONT, fontSize: 14, color: C.text, background: C.surfaceAlt, marginBottom: 16 }} />

        {isPracticeEdit ? (
          <div style={{
            background: C.orangeLight, border: `1px solid ${C.orange}`, borderRadius: 6,
            padding: "10px 12px", marginBottom: 22, fontSize: 13, color: C.text,
          }}>
            This day is set as a practice.
          </div>
        ) : (
          <React.Fragment>
            <label style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Opponent</label>
            <input type="text" value={opponent} onChange={e => setOpponent(e.target.value)} placeholder="e.g. Burlington Bulls"
              autoFocus
              onKeyDown={(e) => { if (e.key === "Enter" && formValid) onSave(); }}
              style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: 6, fontFamily: FONT, fontSize: 14, color: C.text, background: C.surfaceAlt, marginBottom: 16 }} />
            <label style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Home / Away</label>
            <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
              {[{id:"home", label:"Home (vs)"}, {id:"away", label:"Away (@)"}].map(opt => (
                <button key={opt.id} onClick={() => setHomeAway(opt.id)} style={{
                  flex: 1, padding: "8px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 500, cursor: "pointer",
                  background: homeAway === opt.id ? C.accent : C.surface,
                  color: homeAway === opt.id ? "#fff" : C.text,
                  border: `1px solid ${homeAway === opt.id ? C.accent : C.border}`,
                }}>{opt.label}</button>
              ))}
            </div>
            <label style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Game Type</label>
            <select value={gameType || "season"} onChange={e => setGameType(e.target.value)}
              style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: 6, fontFamily: FONT, fontSize: 14, color: C.text, background: C.surfaceAlt, marginBottom: 22, outline: "none" }}>
              {GAME_TYPES.map(gt => <option key={gt.id} value={gt.id}>{gt.label}</option>)}
            </select>
          </React.Fragment>
        )}

        <div style={{ display: "flex", justifyContent: mode === "edit" ? "space-between" : "flex-end", alignItems: "center", gap: 8 }}>
          {mode === "edit" && (
            <button onClick={onDelete} style={{ background: "transparent", border: `1px solid ${C.red}`, color: C.redText, padding: "8px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Delete</button>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onCancel} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.text, padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Cancel</button>
            {isPracticeEdit ? (
              <button onClick={onSetAsPractice} style={{
                background: C.accent, border: `1px solid ${C.accent}`, color: "#fff",
                padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 600,
                cursor: "pointer",
              }}>Save</button>
            ) : (
              <React.Fragment>
                <button onClick={onSave} disabled={!formValid} style={{
                  background: formValid ? C.surface : C.borderLight,
                  border: `1px solid ${formValid ? C.accent : C.border}`,
                  color: formValid ? C.accent : C.textMuted,
                  padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 600,
                  cursor: formValid ? "pointer" : "not-allowed",
                }}>{mode === "edit" ? "Save" : "Add"}</button>
                <button onClick={onSaveAndEdit} disabled={!formValid} title={mode === "edit" ? "Save and open this game in the lineup editor" : "Add this game and open it in the lineup editor"} style={{
                  background: formValid ? C.accent : C.borderLight,
                  border: `1px solid ${formValid ? C.accent : C.border}`,
                  color: formValid ? "#fff" : C.textMuted,
                  padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 600,
                  cursor: formValid ? "pointer" : "not-allowed",
                }}>{mode === "edit" ? "Save & Edit" : "Add & Edit"}</button>
              </React.Fragment>
            )}
          </div>
        </div>

        {!isPracticeEdit && (
          <div style={{ borderTop: `1px solid ${C.borderLight}`, marginTop: 18, paddingTop: 14, display: "flex", justifyContent: "center" }}>
            <button onClick={onSetAsPractice} style={{
              background: "transparent", border: `1px solid ${C.orange}`, color: C.orange,
              padding: "6px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 12, fontWeight: 500, cursor: "pointer",
            }}>Set as practice</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
