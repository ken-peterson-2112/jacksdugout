function Section({ title, children, alert, success, defaultOpen = true }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, marginBottom: 14, overflow: "hidden", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", background: "transparent", border: "none", cursor: "pointer", fontFamily: FONT, textAlign: "left" }}>
        <span style={{ fontSize: 11, transition: "transform .2s", display: "inline-block", transform: open ? "rotate(90deg)" : "rotate(0deg)", color: C.accent }}>{"\u25B6"}</span>
        <span style={{ fontSize: 14, fontWeight: 600, color: C.text, flex: 1 }}>{title}</span>
        {alert && <span style={{ fontSize: 12, color: C.orange, fontWeight: 600 }}>{alert}</span>}
        {success && !alert && <span style={{ fontSize: 13, color: C.greenText, fontWeight: 600 }}>{"\u2713"}</span>}
      </button>
      {open && <div style={{ padding: "0 16px 16px" }}>{children}</div>}
    </div>
  );
}

const chipStyle = { fontFamily: FONT, fontSize: 13, padding: "5px 12px", borderRadius: 6, border: `1px solid ${C.border}`, cursor: "pointer", background: C.surface, color: C.text, fontWeight: 500 };
const miniChipStyle = { fontFamily: FONT, fontSize: 12, padding: "4px 10px", borderRadius: 5, border: `1px solid ${C.border}`, cursor: "pointer", background: C.surface, color: C.text, fontWeight: 500 };
const thStyle = { padding: "10px 8px", fontSize: 12, fontWeight: 600, color: C.textMuted, borderBottom: `2px solid ${C.border}`, background: C.surfaceAlt, textAlign: "center", whiteSpace: "nowrap" };
const tdStyle = { padding: "8px 10px", borderBottom: `1px solid ${C.borderLight}`, whiteSpace: "nowrap" };
const inputStyle = { background: C.surfaceAlt, border: `1px solid ${C.border}`, color: C.text, padding: "8px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 14, outline: "none" };

// ══════════════════════════════════════════════════
// SCHEDULE TAB
// Calendar of May–Aug 2026, Sun–Sat. Empty days are tappable to add a game;
// game cells show vs/@ Opponent + chosen pitchers (or "no lineup"). Tapping a
// game cell loads the entry into the active editing state via onOpenGame.
// ══════════════════════════════════════════════════
function ScheduleTab({ schedule, setSchedule, roster, onOpenGame }) {
  const months = [
    { year: 2026, monthIdx: 4, label: "May 2026" },
    { year: 2026, monthIdx: 5, label: "June 2026" },
    { year: 2026, monthIdx: 6, label: "July 2026" },
    { year: 2026, monthIdx: 7, label: "August 2026" },
  ];
  const dayHeaders = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const [editorOpen, setEditorOpen] = useState(false);
  const [editorMode, setEditorMode] = useState("add");
  const [editorKind, setEditorKind] = useState("game"); // "game" | "practice"
  const [editorDate, setEditorDate] = useState("");
  const [editorEntryId, setEditorEntryId] = useState(null);
  const [editorOpponent, setEditorOpponent] = useState("");
  const [editorHomeAway, setEditorHomeAway] = useState("home");

  const openAdd = (date) => {
    setEditorMode("add");
    setEditorKind("game");
    setEditorDate(date);
    setEditorEntryId(null);
    setEditorOpponent("");
    setEditorHomeAway("home");
    setEditorOpen(true);
  };
  const openEdit = (entry) => {
    setEditorMode("edit");
    setEditorKind(entry.kind === "practice" ? "practice" : "game");
    setEditorDate(entry.date);
    setEditorEntryId(entry.id);
    setEditorOpponent(entry.opponent || "");
    setEditorHomeAway(entry.homeAway || "home");
    setEditorOpen(true);
  };
  const saveEditor = () => {
    const opp = editorOpponent.trim();
    if (!opp) return;
    if (editorMode === "edit" && editorEntryId) {
      setSchedule(prev => prev.map(e => e.id === editorEntryId ? { ...e, opponent: opp, homeAway: editorHomeAway } : e));
    } else {
      setSchedule(prev => [...prev, {
        id: "sch_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        date: editorDate,
        kind: "game",
        opponent: opp,
        homeAway: editorHomeAway,
      }]);
    }
    setEditorOpen(false);
  };
  const setAsPractice = () => {
    if (editorMode === "edit" && editorEntryId) {
      // Convert an existing game entry to a practice (drops opponent + lineup).
      setSchedule(prev => prev.map(e => e.id === editorEntryId ? {
        id: e.id, date: e.date, kind: "practice",
      } : e));
    } else {
      setSchedule(prev => [...prev, {
        id: "sch_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        date: editorDate,
        kind: "practice",
      }]);
    }
    setEditorOpen(false);
  };
  const deleteEditor = () => {
    if (editorMode !== "edit" || !editorEntryId) return;
    const msg = editorKind === "practice"
      ? "Delete this practice?"
      : "Delete this game and any saved lineup for it?";
    if (!confirm(msg)) return;
    setSchedule(prev => prev.filter(e => e.id !== editorEntryId));
    setEditorOpen(false);
  };

  const byDate = useMemo(() => {
    const m = {};
    schedule.forEach(e => { m[e.date] = e; });
    return m;
  }, [schedule]);

  const rosterById = useMemo(() => {
    const m = {};
    roster.forEach(p => { m[p.id] = p; });
    return m;
  }, [roster]);

  const pitcherNames = (entry) => {
    if (!entry || !entry.lineup || !Array.isArray(entry.lineup.grid)) return null;
    const seen = new Set();
    const names = [];
    entry.lineup.grid.forEach(inn => {
      const pid = inn && inn.P;
      if (pid && !seen.has(pid)) {
        seen.add(pid);
        const p = rosterById[pid];
        if (p) names.push(p.name);
      }
    });
    return names.length > 0 ? names : null;
  };

  return (
    <div>
      <div style={{ marginBottom: 22 }}>
        <h2 style={{ fontFamily: DISPLAY, fontSize: 24, fontWeight: 700, color: C.text, marginBottom: 4 }}>Schedule</h2>
        <div style={{ fontSize: 13, color: C.textMuted }}>Tap a day to add a game. Tap a game to open or generate its lineup.</div>
      </div>
      {months.map(m => (
        <MonthGrid key={m.label}
          year={m.year} monthIdx={m.monthIdx} label={m.label}
          dayHeaders={dayHeaders} byDate={byDate}
          pitcherNames={pitcherNames}
          onAdd={openAdd} onEdit={openEdit} onOpen={onOpenGame}
        />
      ))}
      {editorOpen && (
        <ScheduleEditorModal
          mode={editorMode} kind={editorKind} date={editorDate}
          opponent={editorOpponent} setOpponent={setEditorOpponent}
          homeAway={editorHomeAway} setHomeAway={setEditorHomeAway}
          onSave={saveEditor} onDelete={deleteEditor}
          onSetAsPractice={setAsPractice}
          onCancel={() => setEditorOpen(false)}
        />
      )}
    </div>
  );
}

function MonthGrid({ year, monthIdx, label, dayHeaders, byDate, pitcherNames, onAdd, onEdit, onOpen }) {
  const firstOfMonth = new Date(year, monthIdx, 1);
  const lastOfMonth = new Date(year, monthIdx + 1, 0);
  const startCol = firstOfMonth.getDay();
  const numDays = lastOfMonth.getDate();
  const cells = [];
  for (let i = 0; i < startCol; i++) cells.push({ kind: "blank", key: "b" + i });
  for (let d = 1; d <= numDays; d++) {
    const date = `${year}-${String(monthIdx + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    cells.push({ kind: "day", key: date, day: d, date });
  }
  while (cells.length % 7 !== 0) cells.push({ kind: "blank", key: "t" + cells.length });

  return (
    <div style={{ marginBottom: 32, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: 18 }}>
      <h3 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, color: C.text, marginBottom: 14 }}>{label}</h3>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, marginBottom: 6 }}>
        {dayHeaders.map(d => (
          <div key={d} style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, textAlign: "center", padding: "4px 0" }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
        {cells.map(c => {
          if (c.kind === "blank") return <div key={c.key} style={{ minHeight: 110 }} />;
          const entry = byDate[c.date];
          if (!entry) {
            return (
              <button key={c.key} onClick={() => onAdd(c.date)} style={{
                minHeight: 110, padding: "8px 10px",
                background: C.surfaceAlt, border: `1px dashed ${C.border}`, borderRadius: 8,
                fontFamily: FONT, color: C.textMuted, textAlign: "left",
                cursor: "pointer", display: "flex", flexDirection: "column",
                transition: "background 0.1s, border-color 0.1s",
              }}
              onMouseEnter={(e) => { e.currentTarget.style.background = C.accentLight; e.currentTarget.style.borderColor = C.accent; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = C.surfaceAlt; e.currentTarget.style.borderColor = C.border; }}
              >
                <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>{c.day}</div>
              </button>
            );
          }
          if (entry.kind === "practice") {
            return (
              <div key={c.key} onClick={() => onEdit(entry)} style={{
                minHeight: 110, padding: "8px 10px",
                background: C.orangeLight,
                border: `1px solid ${C.orange}`,
                borderRadius: 8, cursor: "pointer",
                display: "flex", flexDirection: "column", gap: 4,
              }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{c.day}</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.orange, lineHeight: 1.3, marginTop: 2 }}>Practice</div>
              </div>
            );
          }
          const pitchers = pitcherNames(entry);
          const hasLineup = !!pitchers;
          const oppLabel = (entry.homeAway === "away" ? "@ " : "vs ") + (entry.opponent || "?");
          return (
            <div key={c.key} onClick={() => onOpen(entry)} style={{
              minHeight: 110, padding: "8px 10px",
              background: hasLineup ? C.greenLight : C.blueLight,
              border: `1px solid ${hasLineup ? C.green : C.blue}`,
              borderRadius: 8, position: "relative", cursor: "pointer",
              display: "flex", flexDirection: "column", gap: 4,
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{c.day}</div>
                <button onClick={(e) => { e.stopPropagation(); onEdit(entry); }} style={{
                  background: "rgba(255,255,255,0.6)", border: `1px solid ${C.border}`,
                  padding: "1px 6px", cursor: "pointer", color: C.textMuted,
                  fontSize: 11, lineHeight: 1.2, borderRadius: 4,
                }} title="Edit game">edit</button>
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, color: C.text, lineHeight: 1.3, wordBreak: "break-word" }}>{oppLabel}</div>
              <div style={{ fontSize: 11, color: hasLineup ? C.greenText : C.textMuted, lineHeight: 1.3, fontStyle: hasLineup ? "normal" : "italic", wordBreak: "break-word" }}>
                {hasLineup ? pitchers.join(", ") : "no lineup"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ScheduleEditorModal({ mode, kind, date, opponent, setOpponent, homeAway, setHomeAway, onSave, onDelete, onSetAsPractice, onCancel }) {
  const dateLabel = (() => {
    try {
      const d = new Date(date + "T12:00:00");
      return d.toLocaleDateString(undefined, { weekday: "long", month: "long", day: "numeric", year: "numeric" });
    } catch { return date; }
  })();
  const oppValid = opponent.trim().length > 0;
  const isPracticeEdit = mode === "edit" && kind === "practice";

  return (
    <div onClick={onCancel} style={{
      position: "fixed", inset: 0, background: "rgba(40,35,30,0.45)",
      display: "flex", alignItems: "center", justifyContent: "center",
      zIndex: 100, padding: 20,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: C.surface, borderRadius: 12, padding: 24, maxWidth: 400, width: "100%",
        fontFamily: FONT, color: C.text, boxShadow: "0 10px 40px rgba(0,0,0,0.15)",
      }}>
        <h2 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, marginBottom: 4 }}>
          {isPracticeEdit ? "Practice" : (mode === "edit" ? "Edit game" : "Add game")}
        </h2>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 18 }}>{dateLabel}</div>

        {isPracticeEdit ? (
          <div style={{
            background: C.orangeLight, border: `1px solid ${C.orange}`, borderRadius: 6,
            padding: "10px 12px", marginBottom: 22, fontSize: 13, color: C.text,
          }}>
            This day is set as a practice.
          </div>
        ) : (
          <React.Fragment>
            <label style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Opponent</label>
            <input type="text" value={opponent} onChange={e => setOpponent(e.target.value)} placeholder="e.g. Burlington Bulls"
              autoFocus
              onKeyDown={(e) => { if (e.key === "Enter" && oppValid) onSave(); }}
              style={{ width: "100%", padding: "8px 10px", border: `1px solid ${C.border}`, borderRadius: 6, fontFamily: FONT, fontSize: 14, color: C.text, background: C.surfaceAlt, marginBottom: 16 }} />
            <label style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Home / Away</label>
            <div style={{ display: "flex", gap: 8, marginBottom: 22 }}>
              {[{id:"home", label:"Home (vs)"}, {id:"away", label:"Away (@)"}].map(opt => (
                <button key={opt.id} onClick={() => setHomeAway(opt.id)} style={{
                  flex: 1, padding: "8px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 500, cursor: "pointer",
                  background: homeAway === opt.id ? C.accent : C.surface,
                  color: homeAway === opt.id ? "#fff" : C.text,
                  border: `1px solid ${homeAway === opt.id ? C.accent : C.border}`,
                }}>{opt.label}</button>
              ))}
            </div>
          </React.Fragment>
        )}

        <div style={{ display: "flex", justifyContent: mode === "edit" ? "space-between" : "flex-end", alignItems: "center", gap: 8 }}>
          {mode === "edit" && (
            <button onClick={onDelete} style={{ background: "transparent", border: `1px solid ${C.red}`, color: C.redText, padding: "8px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Delete</button>
          )}
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={onCancel} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.text, padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 500, cursor: "pointer" }}>{isPracticeEdit ? "Close" : "Cancel"}</button>
            {!isPracticeEdit && (
              <button onClick={onSave} disabled={!oppValid} style={{
                background: oppValid ? C.accent : C.borderLight,
                border: `1px solid ${oppValid ? C.accent : C.border}`,
                color: oppValid ? "#fff" : C.textMuted,
                padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 600,
                cursor: oppValid ? "pointer" : "not-allowed",
              }}>{mode === "edit" ? "Save" : "Add"}</button>
            )}
          </div>
        </div>

        {!isPracticeEdit && (
          <div style={{ borderTop: `1px solid ${C.borderLight}`, marginTop: 18, paddingTop: 14, display: "flex", justifyContent: "center" }}>
            <button onClick={onSetAsPractice} style={{
              background: "transparent", border: `1px solid ${C.orange}`, color: C.orange,
              padding: "6px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 12, fontWeight: 500, cursor: "pointer",
            }}>Set as practice</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
