// LOGIN SCREEN
// Magic-link auth: enter email → click link in inbox → signed in.
// ══════════════════════════════════════════════════
function LoginScreen() {
  const [email, setEmail] = useState("");
  const [loading, setLoading] = useState(false);
  const [sent, setSent] = useState(false);
  const [error, setError] = useState("");

  const handleSendLink = async () => {
    const e = email.trim();
    if (!e) return;
    setLoading(true);
    setError("");
    const { error: err } = await supabase.auth.signInWithOtp({
      email: e,
      options: { emailRedirectTo: window.location.href },
    });
    setLoading(false);
    if (err) setError(err.message);
    else setSent(true);
  };

  return (
    <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FONT, color: C.text, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 32, maxWidth: 380, width: "100%", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
        <div style={{ marginBottom: 24, textAlign: "center" }}>
          <div style={{ fontFamily: DISPLAY, fontSize: 28, fontWeight: 700, color: C.accent, marginBottom: 4 }}>Dugout</div>
          <div style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>11U OBA</div>
        </div>
        {sent ? (
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 14, fontWeight: 600, color: C.text, marginBottom: 8 }}>Check your email</div>
            <div style={{ fontSize: 13, color: C.textMuted, lineHeight: 1.5 }}>
              We sent a sign-in link to<br />
              <strong style={{ color: C.text }}>{email}</strong>
            </div>
            <button onClick={() => { setSent(false); setEmail(""); }} style={{ marginTop: 20, fontSize: 12, color: C.textMuted, background: "transparent", border: "none", cursor: "pointer", textDecoration: "underline" }}>
              Use a different email
            </button>
          </div>
        ) : (
          <React.Fragment>
            <label style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 6 }}>Coach email</label>
            <input
              type="email"
              value={email}
              onChange={e => setEmail(e.target.value)}
              placeholder="you@example.com"
              autoFocus
              onKeyDown={(e) => { if (e.key === "Enter" && email.trim()) handleSendLink(); }}
              style={{ width: "100%", padding: "10px 12px", border: `1px solid ${C.border}`, borderRadius: 6, fontFamily: FONT, fontSize: 14, color: C.text, background: C.surfaceAlt, marginBottom: 12 }}
            />
            <button
              onClick={handleSendLink}
              disabled={loading || !email.trim()}
              style={{
                width: "100%", padding: "10px 16px", borderRadius: 6, fontFamily: FONT, fontSize: 14, fontWeight: 600,
                background: (loading || !email.trim()) ? C.borderLight : C.accent,
                color: (loading || !email.trim()) ? C.textMuted : "#fff",
                border: `1px solid ${(loading || !email.trim()) ? C.border : C.accent}`,
                cursor: (loading || !email.trim()) ? "not-allowed" : "pointer",
              }}
            >
              {loading ? "Sending..." : "Send sign-in link"}
            </button>
            {error && (
              <div style={{ marginTop: 12, fontSize: 12, color: C.redText, background: C.redLight, padding: "8px 10px", borderRadius: 4 }}>
                {error}
              </div>
            )}
          </React.Fragment>
        )}
      </div>
    </div>
  );
}

  const labelStyle   = { fontSize: 12, fontWeight: 600, color: C.textMuted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 6 };
  const descStyle    = { fontSize: 12, color: C.textMuted, marginBottom: 10, lineHeight: 1.4 };
  const btnStyle     = { background: C.surface, border: `1px solid ${C.border}`, color: C.text, padding: "8px 14px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 500, cursor: "pointer" };
  const primaryBtn   = { ...btnStyle, background: C.accent, borderColor: C.accent, color: "#fff", fontWeight: 600 };

  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "30px 16px 20px", zIndex: 1000 }}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.surface, color: C.text, borderRadius: 8, padding: 20, maxWidth: 560, width: "100%", maxHeight: "calc(100vh - 60px)", overflowY: "auto", boxShadow: "0 8px 32px rgba(0,0,0,0.2)" }}>
        <div style={{ display: "flex", alignItems: "center", marginBottom: 14 }}>
          <span style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, color: C.text }}>Team data</span>
          <button onClick={onClose} title="Close" style={{ marginLeft: "auto", background: "transparent", border: "none", color: C.textMuted, cursor: "pointer", fontSize: 20, lineHeight: 1, padding: "4px 8px" }}>{"×"}</button>
        </div>

        <div style={{ fontSize: 12, color: C.textMuted, lineHeight: 1.6 }}>
          <div>Last applied here: <strong style={{ color: C.text }}>{formatPublishedAt(localPublishedAt)}</strong></div>
          <div>Latest on server: <strong style={{ color: C.text }}>{serverPublishedAt ? formatPublishedAt(serverPublishedAt) : "no team-data.json found"}</strong></div>
        </div>

        <div style={sectionStyle}>
          <div style={labelStyle}>Export</div>
          <div style={descStyle}>Download a JSON snapshot of your current team data (roster, schedule, lineups, pitch logs, bench tiers).</div>
          <button onClick={onExport} style={primaryBtn}>Download team-data.json</button>
        </div>

        <div style={sectionStyle}>
          <div style={labelStyle}>Import</div>
          <div style={descStyle}>Replace your view with a JSON file (e.g. one a coach exported and sent you). Local edits will be overwritten.</div>
          <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={onPickFile} style={{ display: "none" }} />
          <button onClick={() => fileInputRef.current?.click()} style={btnStyle}>{"Choose file…"}</button>
        </div>

        <div style={sectionStyle}>
          <div style={labelStyle}>Sync from server</div>
          <div style={descStyle}>Reload from the latest team-data.json deployed on this site. Use this if you skipped the banner earlier.</div>
          <button onClick={onSyncFromServer} style={btnStyle}>Sync now</button>
        </div>

        <div style={{ ...sectionStyle, fontSize: 11, color: C.textMuted, lineHeight: 1.5 }}>
          <div style={{ fontWeight: 600, color: C.textMuted, marginBottom: 4 }}>Publishing workflow</div>
          <ol style={{ paddingLeft: 18, margin: 0 }}>
            <li>Make changes here, then click <strong>Download team-data.json</strong>.</li>
            <li>Upload that file to the GitHub repo (overwrite the existing team-data.json).</li>
            <li>Push. Other devices loading the site see a banner offering to apply the new data.</li>
          </ol>
        </div>
      </div>
    </div>
  );
}

// APP
// ══════════════════════════════════════════════════
function App() {
  // Theme. Apply synchronously in the lazy initializer so the very first
  // render reads the right palette (otherwise we'd flash light-then-dark).
  const [theme, setTheme] = useState(() => {
    const t = load("dugout_theme", "light");
    applyTheme(t);
    return t;
  });
  useEffect(() => {
    save("dugout_theme", theme);
    document.body.style.background = theme === "dark" ? C_DARK.bg : C_LIGHT.bg;
  }, [theme]);
  const toggleTheme = () => {
    const next = theme === "dark" ? "light" : "dark";
    applyTheme(next);
    setTheme(next);
  };

  // Auth session — null until the user signs in via magic link. While null,
  // the app renders the LoginScreen instead of the main UI.
  const [session, setSession] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  // hydrated = true once we've fetched the team_data row. Main app waits on it.
  const [hydrated, setHydrated] = useState(false);
  // True when this device's localStorage holds data the cloud doesn't have.
  // Drives the import-to-cloud banner above the main content.
  const [showImportBanner, setShowImportBanner] = useState(false);

  // Team data publish/sync. On mount we fetch ./team-data.json from the
  // deployed origin; if its publishedAt is newer than what's stored locally,
  // the banner offers to apply it (overwriting localStorage with the snapshot).
  const [serverTeamData, setServerTeamData] = useState(null);
  const [showServerBanner, setShowServerBanner] = useState(false);
  const [teamDataModalOpen, setTeamDataModalOpen] = useState(false);
  // Local "last applied" timestamp, mirrored from localStorage. Stored as
  // React state so the modal's displayed time updates after Export/Skip
  // without needing a reload.
  const [localPublishedAt, setLocalPublishedAtState] = useState(() => getLocalPublishedAt());
  const stampLocalPublishedAt = (ts) => {
    setLocalPublishedAt(ts);
    setLocalPublishedAtState(ts);
  };

  useEffect(() => {
    let cancelled = false;
    fetchTeamDataFromServer().then(data => {
      if (cancelled || !data) return;
      setServerTeamData(data);
      if (data.publishedAt > getLocalPublishedAt()) {
        setShowServerBanner(true);
      }
    });
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!REQUIRE_AUTH) {
      // Bypass: skip auth + cloud hydration; render the app immediately
      // backed by localStorage only.
      setAuthChecked(true);
      setHydrated(true);
      return;
    }
    supabase.auth.getSession().then(({ data }) => {
      setSession(data.session);
      setAuthChecked(true);
    });
    const { data: sub } = supabase.auth.onAuthStateChange((_evt, sess) => {
      setSession(sess);
      if (!sess) {
        // Sign-out: drop hydration so next sign-in re-fetches.
        setHydrated(false);
        setShowImportBanner(false);
        cloudReady = false;
        for (const k of Object.keys(cloudCache)) delete cloudCache[k];
      }
    });
    return () => sub?.subscription?.unsubscribe();
  }, []);

  const [roster, setRoster] = useState(() => {
    const storedVer = load("dugout_roster_version", 0);
    if (storedVer < ROSTER_VERSION) {
      // Roster defaults have changed — reset to pick up corrected positions + ranks.
      save("dugout_roster", DEFAULT_ROSTER);
      save("dugout_roster_version", ROSTER_VERSION);
      return DEFAULT_ROSTER;
    }
    return load("dugout_roster", DEFAULT_ROSTER);
  });
  const [pitchLogs, setPitchLogs] = useState(() => load("dugout_pitchLogs", []));
  const [tab, setTab] = useState("schedule");

  useEffect(() => { save("dugout_roster", roster); save("dugout_roster_version", ROSTER_VERSION); }, [roster]);
  useEffect(() => { save("dugout_pitchLogs", pitchLogs); }, [pitchLogs]);
  // Snap to the top of the page whenever the active tab changes. Tab switches
  // (manual or programmatic — e.g. Generate Lineup → Lineup Editor, or opening
  // a calendar entry → Setup) used to leave the page anchored at whatever
  // scroll position the previous tab was on, which felt disorienting.
  useEffect(() => { window.scrollTo(0, 0); }, [tab]);

  // Season schedule. Each entry: { id, date: "YYYY-MM-DD", opponent, homeAway,
  // gameType?, lineup? }. lineup, when present, is the saved game state for
  // that day so re-opening the entry restores the exact lineup the coach left.
  const [schedule, setSchedule] = useState(() => load("dugout_schedule", []));
  useEffect(() => { save("dugout_schedule", schedule); }, [schedule]);

  const [absentIds, setAbsentIds] = useState([]);
  const [pitcherAssignments, setPitcherAssignments] = useState([]);
  const [catcherAssignments, setCatcherAssignments] = useState([]);
  const [benchTiers, setBenchTiers] = useState(() => {
    const stored = load("dugout_benchTiers", null);
    // If no stored tiers or roster version bumped, seed from defaults.
    if (!stored || load("dugout_benchTiers_version", 0) < ROSTER_VERSION) {
      save("dugout_benchTiers", DEFAULT_BENCH_TIERS);
      save("dugout_benchTiers_version", ROSTER_VERSION);
      return DEFAULT_BENCH_TIERS;
    }
    return stored;
  });
  useEffect(() => { save("dugout_benchTiers", benchTiers); }, [benchTiers]);
  const [editableGrid, setEditableGrid] = useState(null);
  const [isFinalized, setIsFinalized] = useState(false);
  const [warnings, setWarnings] = useState([]);
  const [gameInnings, setGameInnings] = useState(6);
  const [generationId, setGenerationId] = useState(0);
  // Pins: user-locked (inning, pos, playerId) cells that the brute-force solver
  // must leave untouched. Cleared on every fresh Generate so a new lineup starts
  // from a clean slate. Persist across Solve Remaining so the solver respects
  // the user's manual decisions.
  // Pin/solve UI archived 2026-04-26 (see archive/pin-and-solve.md). The
  // engine still accepts a pins array; we just always pass [].
  // Game metadata used in filenames, export headers, and the lineup print.
  // Persisted so next session opens with the last game's shell; user will
  // typically update the date + opponent for each game and keep gameType.
  const [gameMeta, setGameMeta] = useState(() => load("dugout_gameMeta", {
    date: new Date().toISOString().slice(0, 10),
    opponent: "",
    gameType: "season",
  }));
  useEffect(() => { save("dugout_gameMeta", gameMeta); }, [gameMeta]);

  // Hydrate from Supabase once the user signs in. After the fetch completes,
  // override React state with cloud values — but only when the cloud has
  // real data. If cloud is empty (fresh project), leave the localStorage /
  // DEFAULT_ROSTER initial state alone so the import banner can offer to
  // push it up.
  useEffect(() => {
    if (!session || cloudReady) return;
    hydrateFromCloud().then(() => {
      // If the cloud has *any* data, treat cloud as source of truth — sync
      // every field, even empties (so deletions made on other devices
      // propagate). If the cloud is fully empty (fresh project), leave local
      // state alone so the import banner can offer to push it up.
      const r  = cloudCache["dugout_roster"];
      const pl = cloudCache["dugout_pitchLogs"];
      const sc = cloudCache["dugout_schedule"];
      const bt = cloudCache["dugout_benchTiers"];
      const gm = cloudCache["dugout_gameMeta"];
      const cloudHasAnyData =
        (Array.isArray(r) && r.length > 0) ||
        (Array.isArray(pl) && pl.length > 0) ||
        (Array.isArray(sc) && sc.length > 0) ||
        (bt && typeof bt === "object" && Object.keys(bt).length > 0) ||
        (gm && typeof gm === "object" && Object.keys(gm).length > 0);

      if (cloudHasAnyData) {
        if (Array.isArray(r))  setRoster(r.length > 0 ? r : DEFAULT_ROSTER);
        if (Array.isArray(pl)) setPitchLogs(pl);
        if (Array.isArray(sc)) setSchedule(sc);
        if (bt && typeof bt === "object") setBenchTiers(Object.keys(bt).length > 0 ? bt : DEFAULT_BENCH_TIERS);
        if (gm && typeof gm === "object" && Object.keys(gm).length > 0) setGameMeta(gm);
      } else {
        // Cloud is empty. Offer to import this device's data if it has any.
        let localRoster = null;
        try { localRoster = JSON.parse(localStorage.getItem("dugout_roster") || "null"); } catch {}
        if (Array.isArray(localRoster) && localRoster.length > 0) setShowImportBanner(true);
      }
      setHydrated(true);
    });
  }, [session]);

  // Push every cloud-mapped key from this device's localStorage up to the
  // team_data row. Used by the import banner.
  const handleImportToCloud = () => {
    for (const k of Object.keys(KEY_TO_COLUMN)) {
      let v = null;
      try { v = JSON.parse(localStorage.getItem(k) || "null"); } catch {}
      if (v != null) save(k, v);
    }
    setShowImportBanner(false);
  };

  // Apply the team-data.json that the server banner advertised: overwrite
  // localStorage with the snapshot and reload so React re-reads everything
  // from a clean slate. Reload is the simplest way to avoid having to
  // mirror the snapshot into every useState above.
  const applyServerTeamData = () => {
    if (!serverTeamData) return;
    if (applyTeamData(serverTeamData)) window.location.reload();
    else alert("Couldn't apply server team data — it's missing a valid roster.");
  };
  // Suppress the banner for THIS published version. Bumps local publishedAt
  // so we don't re-prompt on the next refresh until something newer ships.
  // The user's local data is left untouched.
  const skipServerTeamData = () => {
    if (serverTeamData?.publishedAt) stampLocalPublishedAt(serverTeamData.publishedAt);
    setShowServerBanner(false);
  };
  // Export: download a JSON snapshot, and stamp local publishedAt so the
  // head coach's next page load doesn't see a banner pointing at their own
  // export.
  const handleExportTeamData = () => {
    const ts = downloadTeamData();
    stampLocalPublishedAt(ts);
  };
  const handleImportFile = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      let data;
      try { data = JSON.parse(e.target.result); }
      catch { alert("Couldn't parse this file as JSON."); return; }
      if (!data || !Array.isArray(data.roster)) {
        alert("This file doesn't look like a Dugout team-data export.");
        return;
      }
      if (!confirm("Replace your current team data with this file? Local edits will be overwritten.")) return;
      if (applyTeamData(data)) window.location.reload();
    };
    reader.readAsText(file);
  };
  const handleSyncFromServer = async () => {
    const data = await fetchTeamDataFromServer();
    if (!data) { alert("No team-data.json found on the server."); return; }
    if (!Array.isArray(data.roster)) { alert("Server team-data.json has no roster yet — nothing to apply."); return; }
    if (!confirm(`Replace your current team data with the latest published version (${formatPublishedAt(data.publishedAt)})? Local edits will be overwritten.`)) return;
    if (applyTeamData(data)) window.location.reload();
  };

  // Transient: id of the schedule entry the user is currently editing. Set
  // when they click into a game from the calendar; null for a one-off lineup
  // not tied to the schedule. Drives the auto-save-back effect below.
  const [currentScheduleId, setCurrentScheduleId] = useState(null);

  // Roster sorted by jersey number ascending. All player-list UI (roster table,
  // attendance, bench priority, lineup summary, etc.) uses this so players appear
  // in #-order regardless of insertion order. Non-numeric numbers sort last.
  const sortedRoster = useMemo(() => {
    const byNumber = (a, b) => {
      const na = parseInt(a.number, 10);
      const nb = parseInt(b.number, 10);
      if (Number.isNaN(na) && Number.isNaN(nb)) return 0;
      if (Number.isNaN(na)) return 1;
      if (Number.isNaN(nb)) return -1;
      return na - nb;
    };
    return [...roster].sort(byNumber);
  }, [roster]);

  const availablePlayers = useMemo(() => sortedRoster.filter(p => !absentIds.includes(p.id)), [sortedRoster, absentIds]);

  // Pitcher availability is computed against the date of the game being
  // planned (gameMeta.date), not the wall-clock today. That way re-opening
  // a past game gives the right answer for that game's date, and forward
  // planning naturally uses the future date as the reference.
  //
  // Hard block (`available: false`): only when a LOGGED pitchLogs entry in
  // the past 7 days requires rest beyond the gap between then and the
  // planning date. This matches the user's rule: "only block based on
  // actual innings pitched in past games that have been logged."
  //
  // Soft warnings (`warnings`): planned-but-not-logged scheduled appearances
  // that touch the rest window. Surfaced in the UI as info, never blocking.
  //   - "sameday": another game on the same date (tournaments)
  //   - "pastplanned": earlier game that was planned but never logged
  //   - "future": upcoming game whose rest window the planning date falls in
  const pitcherAvailability = useMemo(() => {
    const result = {};
    const planningDate = gameMeta.date || (new Date().toISOString().slice(0, 10));
    const planningTs = new Date(planningDate + "T12:00:00").getTime();

    roster.forEach(p => {
      if (!p.positionMap?.P) return;

      // Hard block: rest from logged past outings within the 7-day window.
      const logs = pitchLogs.filter(l => l.playerId === p.id);
      const recentLogs = logs.filter(l => {
        const days = (planningTs - new Date(l.date + "T12:00:00").getTime()) / 86400000;
        return days >= 0 && days <= 7;
      });
      let restRemaining = 0;
      let blockReason = null;
      let last7 = 0;
      if (recentLogs.length > 0) {
        const lastLog = recentLogs.sort((a, b) => b.date.localeCompare(a.date))[0];
        const daysSince = Math.floor((planningTs - new Date(lastLog.date + "T12:00:00").getTime()) / 86400000);
        const restNeeded = getRestDays(lastLog.pitches);
        restRemaining = Math.max(0, restNeeded - daysSince);
        if (restRemaining > 0) blockReason = "Unavailable";
        last7 = recentLogs.reduce((s, l) => s + l.pitches, 0);
      }

      // Soft warnings from scheduled-but-not-yet-logged appearances.
      const warnings = [];
      schedule.forEach(g => {
        if (g.id === currentScheduleId) return;
        if (!g.lineup || !Array.isArray(g.lineup.pitcherAssignments)) return;
        const assigned = g.lineup.pitcherAssignments.find(pa => pa.id === p.id);
        if (!assigned) return;
        // If actuals were logged for this game already, the pitchLogs check
        // above already covers it — skip the planned version to avoid double-counting.
        const alreadyLogged = pitchLogs.some(l => l.scheduleId === g.id && l.playerId === p.id);
        if (alreadyLogged) return;
        const dayDiff = Math.floor((new Date(g.date + "T12:00:00").getTime() - planningTs) / 86400000);
        const oppLabel = g.opponent ? ` vs ${g.opponent}` : "";
        if (dayDiff === 0) {
          warnings.push({ type: "sameday", burden: assigned.budget, dayDiff: 0,
            msg: `${assigned.budget} planned same-day${oppLabel}` });
        } else if (dayDiff < 0) {
          const restNeeded = getRestDays(assigned.budget);
          const daysAgo = -dayDiff;
          if (daysAgo < restNeeded) {
            warnings.push({ type: "pastplanned", burden: assigned.budget, dayDiff,
              msg: `${assigned.budget} planned ${daysAgo}d ago${oppLabel} (not yet logged)` });
          }
        } else if (dayDiff > 0 && dayDiff <= 4) {
          warnings.push({ type: "future", burden: assigned.budget, dayDiff,
            msg: `${assigned.budget} planned in ${dayDiff}d${oppLabel}` });
        }
      });

      const available = restRemaining === 0;
      const reason = blockReason
        || (warnings.length > 0 ? warnings[0].msg
          : (last7 > 0 ? `Available · ${last7}pc/7d` : "Available"));

      result[p.id] = { available, reason, restRemaining, last7, warnings, hasWarnings: warnings.length > 0 };
    });
    return result;
  }, [roster, pitchLogs, schedule, gameMeta.date, currentScheduleId]);

  // Recompute posHistory/benchCount from editableGrid
  const computed = useMemo(() => {
    if (!editableGrid) return { posHistory: {}, benchCount: {} };
    return recomputeFromGrid(editableGrid, availablePlayers);
  }, [editableGrid, availablePlayers]);

  const handleGenerate = () => {
    if (pitcherAssignments.length === 0 || catcherAssignments.length === 0) return;
    for (const pa of pitcherAssignments) {
      const avail = pitcherAvailability[pa.id];
      if (avail && !avail.available) { alert(`${roster.find(p => p.id === pa.id)?.name} is unavailable \u2014 ${avail.reason}.`); return; }
    }
    // Always route through multiRunSolve so every "Generate" benefits from the
    // strict bench-fairness gate (spread \u2264 2 among non-iron players). 25
    // attempts is a good balance of speed and quality for the no-pins case.
    const best = multiRunSolve({
      roster: availablePlayers, pitchers: pitcherAssignments, catchers: catcherAssignments,
      absentIds, innings: gameInnings, benchTiers, pins: [], attempts: 25,
    });
    if (!best) { alert("Couldn't produce any valid lineup. Check that pitchers/catchers are set and enough players are available."); return; }
    // Bench fairness alert disabled 2026-05-03 — the lineup editor's visual
    // warnings (validation panel + bench-score badges) cover the same ground
    // without an interruptive alert. To re-enable, uncomment the block below.
    // if (best.fairnessViolation) {
    //   alert(`Warning: couldn't find a lineup where bench time is within the fairness rule (max 2-inning spread). Showing the best attempt; consider adjusting bench tiers (e.g. mark more players Iron Man or Dev) and regenerate.`);
    // }
    setEditableGrid(JSON.parse(JSON.stringify(best.result.grid)));
    setWarnings(best.scored.warnings);
    setIsFinalized(false);
    setGenerationId(g => g + 1);

    // If this lineup wasn't opened from a calendar entry but the coach has
    // filled in date + opponent on the Setup tab, register it on the calendar
    // so the game shows up alongside everything else (rather than living as a
    // detached one-off lineup).
    if (!currentScheduleId && gameMeta.opponent && gameMeta.opponent.trim() && gameMeta.date) {
      const newId = "sch_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
      setSchedule(prev => [...prev, {
        id: newId,
        date: gameMeta.date,
        kind: "game",
        opponent: gameMeta.opponent.trim(),
        homeAway: gameMeta.homeAway || "home",
        time: gameMeta.time || null,
        gameType: gameMeta.gameType || "season",
      }]);
      setCurrentScheduleId(newId);
      // The mirror effect picks up from here and writes the lineup into the entry.
    }

    setTab("lineup");
  };

  // Re-validate when grid changes
  useEffect(() => {
    if (editableGrid) {
      const w = validateLineup(editableGrid, computed.posHistory, availablePlayers, gameInnings, benchTiers);
      setWarnings(w);
    }
  }, [editableGrid]);

  // Load a schedule entry into the active editing state. If a saved lineup is
  // present, route to the Lineup tab; otherwise jump to Game Settings so the
  // coach can build one.
  const handleOpenScheduleEntry = (entry) => {
    setGameMeta(prev => ({
      ...prev,
      date: entry.date,
      opponent: entry.opponent || "",
      homeAway: entry.homeAway || "home",
      time: entry.time || "",
      gameType: entry.gameType || prev.gameType || "season",
    }));
    setCurrentScheduleId(entry.id);
    if (entry.lineup) {
      setEditableGrid(JSON.parse(JSON.stringify(entry.lineup.grid)));
      setPitcherAssignments(entry.lineup.pitcherAssignments || []);
      setCatcherAssignments(entry.lineup.catcherAssignments || []);
      setAbsentIds(entry.lineup.absentIds || []);
      setGameInnings(entry.lineup.gameInnings || 6);
      setIsFinalized(!!entry.lineup.isFinalized);
      setTab("lineup");
    } else {
      setEditableGrid(null);
      setPitcherAssignments([]);
      setCatcherAssignments([]);
      setAbsentIds([]);
      setIsFinalized(false);
      setTab("setup");
    }
  };

  // Mirror the active game state back to its schedule entry so the calendar
  // shows up-to-date pitcher names and re-opening the entry restores the
  // exact lineup. No-op when no schedule entry is loaded.
  useEffect(() => {
    if (!currentScheduleId) return;
    setSchedule(prev => {
      const idx = prev.findIndex(e => e.id === currentScheduleId);
      if (idx === -1) return prev;
      const next = [...prev];
      next[idx] = {
        ...prev[idx],
        date: gameMeta.date || prev[idx].date,
        opponent: gameMeta.opponent ?? prev[idx].opponent,
        homeAway: gameMeta.homeAway || prev[idx].homeAway,
        time: gameMeta.time !== undefined ? (gameMeta.time || null) : prev[idx].time,
        gameType: gameMeta.gameType || prev[idx].gameType,
        lineup: editableGrid ? {
          grid: editableGrid,
          pitcherAssignments,
          catcherAssignments,
          absentIds,
          gameInnings,
          isFinalized,
        } : prev[idx].lineup,
      };
      return next;
    });
  }, [currentScheduleId, gameMeta, editableGrid, pitcherAssignments, catcherAssignments, absentIds, gameInnings, isFinalized]);

  // Logs already recorded for the active schedule entry. Used to pre-fill the
  // "Log pitches" modal so re-opening shows actual counts (not planned budget).
  const pitchLogsForGame = useMemo(
    () => currentScheduleId ? pitchLogs.filter(l => l.scheduleId === currentScheduleId) : [],
    [pitchLogs, currentScheduleId]
  );
  const currentScheduleEntry = useMemo(
    () => currentScheduleId ? schedule.find(e => e.id === currentScheduleId) : null,
    [schedule, currentScheduleId]
  );
  const isPlayed = !!currentScheduleEntry?.played;

  // Chronologically-ordered games with saved lineups. Powers the prev/next
  // arrows at the top of the Lineup Editor so the coach can step through
  // the schedule without bouncing back to the calendar tab between games.
  const gamesWithLineups = useMemo(() => {
    return schedule
      .filter(g => g && g.kind === "game" && g.lineup && Array.isArray(g.lineup.grid))
      .slice()
      .sort((a, b) => {
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        const ta = a.time || "";
        const tb = b.time || "";
        return ta < tb ? -1 : ta > tb ? 1 : 0;
      });
  }, [schedule]);
  const navIndex = useMemo(
    () => currentScheduleId ? gamesWithLineups.findIndex(g => g.id === currentScheduleId) : -1,
    [gamesWithLineups, currentScheduleId]
  );
  const prevGame = navIndex > 0 ? gamesWithLineups[navIndex - 1] : null;
  const nextGame = (navIndex >= 0 && navIndex < gamesWithLineups.length - 1) ? gamesWithLineups[navIndex + 1] : null;

  // Save handler for the "Log pitches" modal: replaces this game's pitch logs
  // and flips the entry's played flag so the calendar can mark it.
  const handleSavePitchLog = (entries) => {
    if (!currentScheduleId) return;
    const valid = entries.filter(e => {
      if (e.pitches === "" || e.pitches == null) return false;
      const n = parseInt(e.pitches, 10);
      return !Number.isNaN(n) && n >= 0;
    }).map(e => ({ playerId: e.playerId, pitches: parseInt(e.pitches, 10) }));

    setPitchLogs(prev => {
      const filtered = prev.filter(l => l.scheduleId !== currentScheduleId);
      const created = valid.map(v => ({
        id: "pl_" + Date.now() + "_" + v.playerId + "_" + Math.floor(Math.random() * 1000),
        playerId: v.playerId,
        pitches: v.pitches,
        date: gameMeta.date,
        opponent: gameMeta.opponent || "",
        scheduleId: currentScheduleId,
      }));
      return [...filtered, ...created];
    });

    setSchedule(prev => prev.map(e =>
      e.id === currentScheduleId ? { ...e, played: valid.length > 0 } : e
    ));
  };

  // Delete the lineup attached to the active schedule entry (or the in-memory
  // one-off lineup, if not linked). The game itself stays on the calendar so
  // the coach can rebuild — only the saved positions/pitchers/catchers and
  // the played flag are stripped. Pitch logs are NOT removed: those track
  // historical innings and live in a separate bucket; coaches can clean them
  // up from Arm Care if they really want a clean slate.
  const handleDeleteLineup = () => {
    if (currentScheduleId) {
      setSchedule(prev => prev.map(e => {
        if (e.id !== currentScheduleId) return e;
        const { lineup, played, ...rest } = e;
        return rest;
      }));
    }
    setEditableGrid(null);
    setPitcherAssignments([]);
    setCatcherAssignments([]);
    setAbsentIds([]);
    setIsFinalized(false);
    setWarnings([]);
    setCurrentScheduleId(null);
    setTab("schedule");
  };

  const tabs = [
    { id:"schedule", label:"Schedule",        shortLabel:"Schedule" },
    { id:"setup",    label:"Create a Lineup", shortLabel:"Create" },
    { id:"lineup",   label:"Lineup Editor",   shortLabel:"Editor" },
    { id:"roster",   label:"Team Reports",    shortLabel:"Reports" },
  ];

  if (!authChecked) {
    return <div style={{ background: C.bg, minHeight: "100vh" }} />;
  }
  if (REQUIRE_AUTH && !session) return <LoginScreen />;
  if (!hydrated) {
    return (
      <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FONT, color: C.textMuted, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <div style={{ fontSize: 14 }}>Loading team data…</div>
      </div>
    );
  }

  return (
    <div style={{ background: C.bg, minHeight: "100vh", fontFamily: FONT, color: C.text }}>
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "16px 20px", display: "flex", alignItems: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
        <span style={{ fontFamily: DISPLAY, fontSize: 22, fontWeight: 700, color: C.accent }}>Jacks 11U AA</span>
        <span style={{ fontSize: 12, color: C.textMuted, fontWeight: 500, marginLeft: 10 }}>2026</span>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={toggleTheme} title={theme === "dark" ? "Switch to light mode" : "Switch to dark mode"} style={{
            fontSize: 14, color: C.textMuted, background: "transparent",
            border: `1px solid ${C.border}`, cursor: "pointer",
            padding: "4px 8px", borderRadius: 4, lineHeight: 1, fontFamily: FONT,
          }}>{theme === "dark" ? "☀" : "☾"}</button>
          <button onClick={() => setTeamDataModalOpen(true)} title="Team data (export, import, sync)" style={{
            fontSize: 14, color: C.textMuted, background: "transparent",
            border: `1px solid ${C.border}`, cursor: "pointer",
            padding: "4px 8px", borderRadius: 4, lineHeight: 1, fontFamily: FONT,
          }}>{"⚙"}</button>
          {session ? (
            <React.Fragment>
              <span style={{ fontSize: 11, color: C.textMuted, background: C.surfaceAlt, padding: "4px 8px", borderRadius: 4, border: `1px solid ${C.border}`, maxWidth: 200, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                {session.user.email}
              </span>
              <button onClick={() => supabase.auth.signOut()} style={{ fontSize: 11, color: C.textMuted, background: "transparent", border: "none", cursor: "pointer", padding: "4px 6px" }}>
                Sign out
              </button>
            </React.Fragment>
          ) : (
            <span title="Auth gate disabled in source — flip REQUIRE_AUTH back to true to require login" style={{ fontSize: 11, color: C.orange, background: C.orangeLight, padding: "4px 8px", borderRadius: 4, border: `1px solid ${C.orange}`, fontWeight: 600 }}>
              Live beta
            </span>
          )}
        </div>
      </div>
      <div style={{ display: "flex", background: C.surface, borderBottom: `1px solid ${C.border}`, overflowX: "auto" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            flex: 1, padding: "12px 0", background: "transparent",
            color: tab === t.id ? C.accent : C.textMuted, border: "none",
            borderBottom: tab === t.id ? `2px solid ${C.accent}` : "2px solid transparent",
            fontFamily: FONT, fontSize: 13, fontWeight: tab === t.id ? 600 : 500,
            cursor: "pointer", whiteSpace: "nowrap", minWidth: 70,
          }}>
            <span className="tab-desktop">{t.label}</span>
            <span className="tab-mobile">{t.shortLabel || t.label}</span>
          </button>
        ))}
      </div>
      <div style={{ maxWidth: 920, margin: "0 auto", padding: "20px 16px" }}>
        {showServerBanner && serverTeamData && (
          <div style={{ background: C.blueLight, border: `1px solid ${C.blue}`, borderRadius: 8, padding: "12px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 12, fontSize: 13, color: C.text, flexWrap: "wrap" }}>
            <div style={{ flex: "1 1 240px", lineHeight: 1.4 }}>
              <strong>New team data published.</strong> Latest version is from {formatPublishedAt(serverTeamData.publishedAt)}. Apply it to load the team's current roster, schedule, and lineups. Local edits will be overwritten.
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={skipServerTeamData} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.text, padding: "6px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 12, fontWeight: 500, cursor: "pointer" }}>Skip</button>
              <button onClick={applyServerTeamData} style={{ background: C.accent, border: `1px solid ${C.accent}`, color: "#fff", padding: "6px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Apply</button>
            </div>
          </div>
        )}
        {showImportBanner && (
          <div style={{ background: C.blueLight, border: `1px solid ${C.blue}`, borderRadius: 8, padding: "12px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 12, fontSize: 13, color: C.text, flexWrap: "wrap" }}>
            <div style={{ flex: "1 1 240px", lineHeight: 1.4 }}>
              <strong>Local data found.</strong> This device has a roster the cloud doesn't. Import it so all coaches can see it.
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => setShowImportBanner(false)} style={{ background: C.surface, border: `1px solid ${C.border}`, color: C.text, padding: "6px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 12, fontWeight: 500, cursor: "pointer" }}>Not now</button>
              <button onClick={handleImportToCloud} style={{ background: C.accent, border: `1px solid ${C.accent}`, color: "#fff", padding: "6px 12px", borderRadius: 6, fontFamily: FONT, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Import to cloud</button>
            </div>
          </div>
        )}
        {tab === "schedule" && <ScheduleTab schedule={schedule} setSchedule={setSchedule} roster={sortedRoster} onOpenGame={handleOpenScheduleEntry} />}
        {tab === "roster" && <RosterTab roster={sortedRoster} setRoster={setRoster} schedule={schedule} pitchLogs={pitchLogs} setPitchLogs={setPitchLogs} benchTiers={benchTiers} setBenchTiers={setBenchTiers} />}
        {tab === "setup" && <SetupTab roster={sortedRoster} setRoster={setRoster} availablePlayers={availablePlayers} absentIds={absentIds} setAbsentIds={setAbsentIds}
          pitcherAssignments={pitcherAssignments} setPitcherAssignments={setPitcherAssignments}
          catcherAssignments={catcherAssignments} setCatcherAssignments={setCatcherAssignments}
          benchTiers={benchTiers} setBenchTiers={setBenchTiers}
          pitcherAvailability={pitcherAvailability} gameInnings={gameInnings} setGameInnings={setGameInnings}
          gameMeta={gameMeta} setGameMeta={setGameMeta}
          onGenerate={handleGenerate} />}
        {tab === "lineup" && <LineupTab grid={editableGrid} setGrid={setEditableGrid}
          posHistory={computed.posHistory} benchCount={computed.benchCount}
          roster={availablePlayers} fullRoster={sortedRoster}
          warnings={warnings} innings={gameInnings}
          pitcherAssignments={pitcherAssignments} catcherAssignments={catcherAssignments}
          benchTiers={benchTiers} gameMeta={gameMeta}
          isFinalized={isFinalized} setIsFinalized={setIsFinalized}
          generationId={generationId}
          isLinkedToSchedule={!!currentScheduleId}
          isPlayed={isPlayed}
          pitchLogsForGame={pitchLogsForGame}
          onSavePitchLog={handleSavePitchLog}
          onDeleteLineup={handleDeleteLineup}
          onRevalidate={() => {
            if (!editableGrid) return;
            const w = validateLineup(editableGrid, computed.posHistory, availablePlayers, gameInnings, benchTiers);
            setWarnings(w);
          }}
          onBack={() => setTab("setup")}
          prevGame={prevGame}
          nextGame={nextGame}
          onNavigateToGame={handleOpenScheduleEntry} />}
      </div>
      <TeamDataModal
        open={teamDataModalOpen}
        onClose={() => setTeamDataModalOpen(false)}
        onExport={handleExportTeamData}
        onImportFile={handleImportFile}
        onSyncFromServer={handleSyncFromServer}
        localPublishedAt={localPublishedAt}
        serverPublishedAt={serverTeamData?.publishedAt}
      />
    </div>
  );
}

// ══════════════════════════════════════════════════
// PRIORITY MATRIX
// Combined positional + bench priority editor. Rendered in both RosterTab
// (Team Reports) and SetupTab (Create a Lineup) so edits in one place sync
// to the other — both read the same App-level state (roster + benchTiers).
// ══════════════════════════════════════════════════
function PriorityMatrix({ roster, setRoster, benchTiers, setBenchTiers }) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState("");
  const [number, setNumber] = useState("");
  const [newPosMap, setNewPosMap] = useState({});
  const [newBenchTier, setNewBenchTier] = useState(DEFAULT_BENCH_TIER);
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState("");
  const [editNumber, setEditNumber] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [priorityHelpOpen, setPriorityHelpOpen] = useState(false);

  const cycleTier = (pos, map, setter) => {
    const cur = map[pos] || null;
    const idx = cur ? POS_TIERS.indexOf(cur) : -1;
    const next = idx < POS_TIERS.length - 1 ? POS_TIERS[idx + 1] : null;
    const updated = { ...map };
    if (next) updated[pos] = next; else delete updated[pos];
    setter(updated);
  };
  const addPlayer = () => {
    if (!name.trim()) return;
    const newId = Date.now().toString();
    setRoster(prev => [...prev, { id: newId, name: name.trim(), number: number.trim(), positionMap: { ...newPosMap } }]);
    if (newBenchTier !== DEFAULT_BENCH_TIER) {
      setBenchTiers(prev => ({ ...prev, [newId]: newBenchTier }));
    }
    setName(""); setNumber(""); setNewPosMap({}); setNewBenchTier(DEFAULT_BENCH_TIER); setShowAdd(false);
  };
  const startEdit = (p) => { setEditingId(p.id); setEditName(p.name); setEditNumber(p.number); };
  const saveEdit = (id) => { setRoster(prev => prev.map(p => p.id === id ? { ...p, name: editName, number: editNumber } : p)); setEditingId(null); };
  const updatePlayerPos = (playerId, pos) => {
    setRoster(prev => prev.map(p => {
      if (p.id !== playerId) return p;
      const map = { ...(p.positionMap || {}) };
      // Strip any :N rank before cycling — tier cycling resets rank to 1
      const cur = map[pos] ? map[pos].split(":")[0] : null;
      const idx = cur ? POS_TIERS.indexOf(cur) : -1;
      const next = idx < POS_TIERS.length - 1 ? POS_TIERS[idx + 1] : null;
      if (next) map[pos] = next; else delete map[pos];
      return { ...p, positionMap: map };
    }));
  };
  const deletePlayer = (id) => {
    setRoster(prev => prev.filter(p => p.id !== id));
    // Clean up the matching bench-tier entry so we don't leak orphaned keys.
    setBenchTiers(prev => { const next = { ...prev }; delete next[id]; return next; });
    setConfirmDelete(null);
  };
  const resetRoster = () => {
    if (!window.confirm("Reset roster to built-in defaults? This will overwrite any manual changes (including bench priorities).")) return;
    setRoster(DEFAULT_ROSTER);
    setBenchTiers(DEFAULT_BENCH_TIERS);
  };

  return (
    <div>
      <div style={{ marginBottom: 12 }}>
        <h2 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, color: C.text, margin: 0, display: "flex", alignItems: "center", gap: 8 }}>
          Roster Priority
          <button onClick={() => setPriorityHelpOpen(true)} title="What is this?"
            style={{ fontSize: 12, width: 22, height: 22, borderRadius: "50%",
                     border: `1px solid ${C.border}`, background: C.surface, color: C.textMuted,
                     cursor: "pointer", padding: 0, fontWeight: 700, lineHeight: 1, fontFamily: FONT }}>?</button>
        </h2>
        <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>Tap a position cell to cycle a player's tier. Tap a Bench chip to set how often they sit.</div>
      </div>

      {priorityHelpOpen && (
        <div onClick={() => setPriorityHelpOpen(false)} style={{
          position: "fixed", inset: 0, background: "rgba(40,35,30,0.45)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 100, padding: 20,
        }}>
          <div onClick={(e) => e.stopPropagation()} style={{
            background: C.surface, color: C.text, borderRadius: 12, padding: 24,
            maxWidth: 460, width: "100%", fontFamily: FONT,
            boxShadow: "0 10px 40px rgba(0,0,0,0.15)",
          }}>
            <h2 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, marginBottom: 12, color: C.text }}>Roster Priority</h2>
            <p style={{ fontSize: 13, color: C.text, lineHeight: 1.55, marginBottom: 12 }}>
              <strong>Position priority</strong> tells the lineup builder how to prioritize player positioning in a game.
              It uses these rankings to break ties and field the strongest possible defensive alignment. Each player
              should have a maximum of one primary position. Secondary positions are used to adjust for pitching,
              catching, and bench time restrictions. Emergency roles are for players who are better used in other
              positions but can be used when options are very limited.
            </p>
            <p style={{ fontSize: 13, color: C.text, lineHeight: 1.55, marginBottom: 18 }}>
              <strong>Bench priority</strong> controls how often each player sits. <em>Regular</em> = normal rotation.
              <em> Reduced</em> = sits more than normal. <em>Limited</em> = sits the most. Applies to all players
              including pitchers (they sit when not on the mound).
            </p>
            <div style={{ display: "flex", justifyContent: "flex-end" }}>
              <button onClick={() => setPriorityHelpOpen(false)} style={{
                background: C.accent, border: `1px solid ${C.accent}`, color: "#fff",
                padding: "8px 18px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 600,
                cursor: "pointer",
              }}>Got it</button>
            </div>
          </div>
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
        <div style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>{roster.length} players</div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={resetRoster} style={{
            display: "inline-flex", alignItems: "center", gap: 4,
            padding: "5px 10px", borderRadius: 6,
            border: `1px solid ${C.border}`,
            background: C.surfaceAlt, color: C.textMuted,
            fontFamily: FONT, fontSize: 11, fontWeight: 500, cursor: "pointer",
          }}>Reset</button>
          <button onClick={() => setShowAdd(true)} style={{
            display: "inline-flex", alignItems: "center", gap: 6,
            padding: "5px 12px", borderRadius: 6, border: "none",
            background: C.accent, color: "#fff",
            fontFamily: FONT, fontSize: 12, fontWeight: 600, cursor: "pointer",
            boxShadow: "0 1px 3px rgba(107,127,94,0.25)",
          }}>
            <span style={{ fontSize: 15, lineHeight: 1, marginTop: -1 }}>+</span>
            <span>Add Player</span>
          </button>
        </div>
      </div>

      <div style={{ overflowX: "auto", borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", background: C.surface, borderRadius: 8 }}>
          <thead><tr>
            <th style={{ ...thStyle, width: 44, textAlign: "center" }}>#</th>
            <th style={{ ...thStyle, textAlign: "left", minWidth: 100, paddingLeft: 12 }}>Player</th>
            {ALL_POS.map(pos => <th key={pos} style={{ ...thStyle, width: 42 }}>{pos}</th>)}
            <th style={{ ...thStyle, minWidth: 150 }}>Bench</th>
            <th style={{ ...thStyle, width: 54 }} />
          </tr></thead>
          <tbody>
            {roster.map((p, i) => {
              const bg = i % 2 === 0 ? C.surface : C.surfaceAlt;
              const isEd = editingId === p.id;
              const currentBenchTier = benchTiers[p.id] || DEFAULT_BENCH_TIER;
              return (
                <tr key={p.id}>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center", color: C.accent, fontWeight: 600 }}>
                    {isEd ? <input value={editNumber} onChange={e => setEditNumber(e.target.value)} style={{ ...inputStyle, width: 36, textAlign: "center", padding: "4px" }} /> : p.number || "—"}
                  </td>
                  <td style={{ ...tdStyle, background: bg, fontWeight: 600, paddingLeft: 12 }}>
                    {isEd ? <input value={editName} onChange={e => setEditName(e.target.value)} onKeyDown={e => e.key === "Enter" && saveEdit(p.id)} style={{ ...inputStyle, width: "100%", padding: "4px 8px" }} /> : p.name}
                  </td>
                  {ALL_POS.map(pos => {
                    const tier = playerTier(p, pos);
                    return (
                      <td key={pos} style={{ ...tdStyle, background: bg, textAlign: "center", padding: "4px 2px" }}>
                        <button onClick={() => updatePlayerPos(p.id, pos)} style={{
                          width: 26, height: 22, borderRadius: 4, cursor: "pointer",
                          border: tier ? `1.5px solid ${TIER_COLORS[tier]}` : `1px solid ${C.borderLight}`,
                          background: tier ? TIER_BG[tier] : "transparent",
                          display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto",
                        }}>{tier && <span style={{ width: 7, height: 7, borderRadius: "50%", background: TIER_COLORS[tier] }} />}</button>
                      </td>
                    );
                  })}
                  <td style={{ ...tdStyle, background: bg, textAlign: "center", padding: "4px 6px" }}>
                    <div style={{ display: "inline-flex", gap: 4 }}>
                      {BENCH_TIERS.map(bt => (
                        <button key={bt.id}
                          onClick={() => setBenchTiers(prev => ({ ...prev, [p.id]: bt.id }))}
                          title={`${bt.label} — ${bt.desc} (max ${bt.maxBench})`}
                          style={{ ...miniChipStyle,
                            background: currentBenchTier === bt.id ? bt.color : C.surface,
                            color: currentBenchTier === bt.id ? "#fff" : C.textMuted,
                            borderColor: currentBenchTier === bt.id ? bt.color : C.border,
                            fontSize: 11, padding: "4px 9px",
                          }}>{bt.label}</button>
                      ))}
                    </div>
                  </td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center" }}>
                    {isEd ? (
                      <button onClick={() => saveEdit(p.id)} style={{ ...miniChipStyle, color: C.greenText, borderColor: C.green }}>Done</button>
                    ) : (
                      <div style={{ display: "flex", gap: 4, justifyContent: "center" }}>
                        <button onClick={() => startEdit(p)} style={{ ...miniChipStyle, color: C.textMuted }}>Edit</button>
                        <button onClick={() => setConfirmDelete(p.id)} style={{ ...miniChipStyle, color: C.red, borderColor: C.red }}>&times;</button>
                      </div>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ display: "flex", gap: 16, marginTop: 12, fontSize: 12, color: C.textMuted, flexWrap: "wrap", alignItems: "center" }}>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          {POS_TIERS.map(t => (
            <div key={t} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: TIER_COLORS[t] }} />
              {t.charAt(0).toUpperCase() + t.slice(1)}
            </div>
          ))}
        </div>
        <span style={{ color: C.textLight }}>{"·"}</span>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          {BENCH_TIERS.map(bt => (
            <div key={bt.id} style={{ display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: bt.color }} />
              {bt.label}
            </div>
          ))}
        </div>
        <span style={{ marginLeft: "auto", fontStyle: "italic", fontSize: 11 }}>Tap to cycle</span>
      </div>

      {confirmDelete && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999, backdropFilter: "blur(2px)" }} onClick={() => setConfirmDelete(null)}>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 28, maxWidth: 320, boxShadow: "0 8px 30px rgba(0,0,0,0.12)" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontWeight: 600, marginBottom: 16, fontSize: 15 }}>Remove {roster.find(p => p.id === confirmDelete)?.name}?</div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => deletePlayer(confirmDelete)} style={{ ...chipStyle, background: C.red, borderColor: C.red, color: "#fff", padding: "8px 20px" }}>Remove</button>
              <button onClick={() => setConfirmDelete(null)} style={{ ...chipStyle, padding: "8px 20px" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {showAdd && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999, backdropFilter: "blur(2px)" }} onClick={() => setShowAdd(false)}>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 24, width: "90%", maxWidth: 420, boxShadow: "0 8px 30px rgba(0,0,0,0.12)" }} onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, color: C.accent, marginBottom: 16 }}>Add Player</div>
            <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
              <input placeholder="Name" value={name} onChange={e => setName(e.target.value)} onKeyDown={e => e.key === "Enter" && addPlayer()} style={{ ...inputStyle, flex: 1 }} />
              <input placeholder="#" value={number} onChange={e => setNumber(e.target.value)} style={{ ...inputStyle, width: 56 }} />
            </div>
            <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8, fontWeight: 500 }}>Positions</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
              {ALL_POS.map(pos => {
                const tier = newPosMap[pos];
                return <button key={pos} onClick={() => cycleTier(pos, newPosMap, setNewPosMap)} style={{ ...chipStyle, padding: "6px 12px", background: tier ? TIER_BG[tier] : "transparent", borderColor: tier ? TIER_COLORS[tier] : C.border, color: tier ? TIER_COLORS[tier] : C.textMuted }}>{pos}</button>;
              })}
            </div>
            <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8, fontWeight: 500 }}>Bench priority</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 18 }}>
              {BENCH_TIERS.map(bt => (
                <button key={bt.id} onClick={() => setNewBenchTier(bt.id)} style={{
                  ...chipStyle, padding: "6px 12px",
                  background: newBenchTier === bt.id ? bt.color : C.surface,
                  color: newBenchTier === bt.id ? "#fff" : C.textMuted,
                  borderColor: newBenchTier === bt.id ? bt.color : C.border,
                }}>{bt.label}</button>
              ))}
            </div>
            <button onClick={addPlayer} style={{ width: "100%", padding: 10, background: C.accent, color: "#fff", border: "none", borderRadius: 6, fontFamily: FONT, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Add to Roster</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════
// ROSTER TAB
// ══════════════════════════════════════════════════
function RosterTab({ roster, setRoster, schedule = [], pitchLogs = [], setPitchLogs = () => {}, benchTiers = {}, setBenchTiers = () => {} }) {
  // Date range for the Usage Report. Empty = whole season (no bound on that
  // side). Both bounds are inclusive ISO date strings (YYYY-MM-DD).
  const [usageStart, setUsageStart] = useState("");
  const [usageEnd,   setUsageEnd]   = useState("");
  // When true, future games with saved lineups are folded into the heatmap
  // alongside played games — useful for seeing how a season-wide plan
  // distributes innings across players. Defaults to true since the
  // season-planning view is the main reason to look at this report.
  const [includeProjected, setIncludeProjected] = useState(true);

  // Played games (date < today) that have a saved lineup AND fall within the
  // chosen date range. Empty range bounds = no limit on that side.
  const playedGames = useMemo(() => {
    const today = new Date().toISOString().slice(0, 10);
    return schedule.filter(g => {
      if (!g || !g.lineup || !Array.isArray(g.lineup.grid)) return false;
      if (!g.date || g.date >= today) return false;
      if (usageStart && g.date < usageStart) return false;
      if (usageEnd && g.date > usageEnd) return false;
      return true;
    });
  }, [schedule, usageStart, usageEnd]);
  // Future games (date >= today) with a saved lineup — only counted when the
  // includeProjected toggle is on.
  const projectedGames = useMemo(() => {
    const today = new Date().toISOString().slice(0, 10);
    return schedule.filter(g => {
      if (!g || !g.lineup || !Array.isArray(g.lineup.grid)) return false;
      if (!g.date || g.date < today) return false;
      if (usageStart && g.date < usageStart) return false;
      if (usageEnd && g.date > usageEnd) return false;
      return true;
    });
  }, [schedule, usageStart, usageEnd]);
  const includedGames = useMemo(
    () => includeProjected ? [...playedGames, ...projectedGames] : playedGames,
    [playedGames, projectedGames, includeProjected]
  );
  // When true, every cell shows innings-per-game (count / N games included)
  // instead of the raw inning count. Heatmap colors stay tied to the raw
  // counts so the visual ranking doesn't shift between modes. Defaults to
  // true — averages are easier to scan against the bench-tier targets
  // (Regular = 2 BN/game, etc.) than raw seasonal totals.
  const [showAverage, setShowAverage] = useState(true);

  // Inning counts per (player, position), plus a synthetic BN bucket for
  // bench innings. BN is tracked separately so it can render without a
  // heatmap — bench totals naturally skew higher than per-position innings
  // and would otherwise flatten the position-cell gradient.
  const usageByPlayer = useMemo(() => {
    const result = {};
    roster.forEach(p => { result[p.id] = {}; });
    includedGames.forEach(g => {
      g.lineup.grid.forEach(inn => {
        ALL_POS.forEach(pos => {
          const pid = inn[pos];
          if (pid && result[pid]) result[pid][pos] = (result[pid][pos] || 0) + 1;
        });
        (inn.BN || []).forEach(pid => {
          if (pid && result[pid]) result[pid].BN = (result[pid].BN || 0) + 1;
        });
      });
    });
    return result;
  }, [roster, includedGames]);

  // Usage range for the heatmap colors below. ALL_POS only — BN is excluded
  // so the bench column doesn't dominate the gradient.
  const usageRange = useMemo(() => {
    let min = Infinity, max = 0;
    Object.values(usageByPlayer).forEach(byPos => {
      ALL_POS.forEach(pos => {
        const n = byPos[pos];
        if (n && n > 0) { if (n < min) min = n; if (n > max) max = n; }
      });
    });
    return { min: min === Infinity ? 0 : min, max };
  }, [usageByPlayer]);

  // Cell display formatter. Honors the Avg-per-game toggle.
  const formatUsage = (count) => {
    if (!count) return "—";
    if (showAverage && includedGames.length > 0) {
      return (count / includedGames.length).toFixed(1);
    }
    return String(count);
  };

  // Conditional-format gradient for the Usage Report cells:
  //   lowest non-zero count → cool light blue
  //   middle of the range   → neutral warm grey
  //   highest count         → bright orange
  // Both palettes have a dark-mode counterpart so the heatmap stays legible
  // on the dark background (C.bg comparison flips the stops).
  const heatColor = (count, min, max) => {
    const t = max === min ? 0.5 : (count - min) / (max - min);
    const dark = C.bg === C_DARK.bg;
    const stops = dark
      ? [[42, 54, 64], [50, 48, 42], [154, 70, 36]]
      : [[200, 220, 230], [224, 218, 210], [228, 122, 58]];
    let c;
    if (t < 0.5) {
      const u = t * 2;
      c = stops[0].map((v, i) => Math.round(v + (stops[1][i] - v) * u));
    } else {
      const u = (t - 0.5) * 2;
      c = stops[1].map((v, i) => Math.round(v + (stops[2][i] - v) * u));
    }
    return `rgb(${c[0]},${c[1]},${c[2]})`;
  };

  // Depth chart grouped by tier × field position. Excludes P and BN per spec.
  const depthChart = useMemo(() => {
    const byTier = { preferred: {}, secondary: {}, emergency: {} };
    POS_TIERS.forEach(t => { FIELD_POS.forEach(pos => byTier[t][pos] = []); });
    roster.forEach(p => {
      FIELD_POS.forEach(pos => {
        const tier = playerTier(p, pos);
        if (tier) byTier[tier][pos].push(p);
      });
    });
    POS_TIERS.forEach(t => {
      FIELD_POS.forEach(pos => {
        byTier[t][pos].sort((a, b) => playerRank(a, pos) - playerRank(b, pos));
      });
    });
    return byTier;
  }, [roster]);

  const sectionHeader = (title, subtitle) => (
    <div style={{ marginBottom: 12 }}>
      <h2 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, color: C.text, margin: 0 }}>{title}</h2>
      {subtitle && <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>{subtitle}</div>}
    </div>
  );

  return (
    <div>
      {/* Usage Report — innings played per (player, position) from past
          games. Tighter padding than the editable Roster table since it's
          read-only and we want the whole grid on screen at once. */}
      <div style={{ marginBottom: 28 }}>
        {sectionHeader("Usage Report", "Innings each player has played at each position across saved lineups. Toggles let you fold in future planned games and switch the cell display between totals and averages per game.")}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
          <span style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>Range:</span>
          <input type="date" value={usageStart} onChange={e => setUsageStart(e.target.value)}
            style={{ background: C.surfaceAlt, border: `1px solid ${C.border}`, color: C.text, padding: "3px 8px", borderRadius: 6, fontFamily: FONT, fontSize: 12, outline: "none" }} />
          <span style={{ fontSize: 12, color: C.textMuted }}>to</span>
          <input type="date" value={usageEnd} onChange={e => setUsageEnd(e.target.value)}
            style={{ background: C.surfaceAlt, border: `1px solid ${C.border}`, color: C.text, padding: "3px 8px", borderRadius: 6, fontFamily: FONT, fontSize: 12, outline: "none" }} />
          {(usageStart || usageEnd) && (
            <button onClick={() => { setUsageStart(""); setUsageEnd(""); }}
              style={{ ...miniChipStyle, fontSize: 11, padding: "3px 10px" }}>Whole season</button>
          )}
          <button onClick={() => setIncludeProjected(v => !v)}
            title="Fold innings from future games that have a saved lineup into the heatmap"
            style={{
              ...miniChipStyle, fontSize: 11, padding: "3px 10px",
              background: includeProjected ? C.accent : C.surface,
              color: includeProjected ? "#fff" : C.textMuted,
              borderColor: includeProjected ? C.accent : C.border,
            }}>
            {includeProjected ? "✓ " : ""}Include projected
          </button>
          <button onClick={() => setShowAverage(v => !v)}
            title="Show innings per game (cell ÷ N games included) instead of raw totals"
            style={{
              ...miniChipStyle, fontSize: 11, padding: "3px 10px",
              background: showAverage ? C.accent : C.surface,
              color: showAverage ? "#fff" : C.textMuted,
              borderColor: showAverage ? C.accent : C.border,
            }}>
            {showAverage ? "✓ " : ""}Avg per game
          </button>
          <span style={{ fontSize: 11, color: C.textMuted, marginLeft: "auto" }}>
            {includeProjected
              ? `${playedGames.length} played + ${projectedGames.length} projected`
              : `${playedGames.length} ${playedGames.length === 1 ? "game" : "games"} included`}
          </span>
        </div>
        <div style={{ overflowX: "auto", borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", background: C.surface }}>
          <table style={{ width: "auto", borderCollapse: "collapse", background: C.surface, borderRadius: 8 }}>
            <thead><tr>
              <th style={{ ...thStyle, width: 36, textAlign: "center", padding: "6px 4px" }}>#</th>
              <th style={{ ...thStyle, textAlign: "left", width: 130, paddingLeft: 10, padding: "6px 4px 6px 10px" }}>Player</th>
              {ALL_POS.map(pos => <th key={pos} style={{ ...thStyle, width: 36, padding: "6px 2px" }}>{pos}</th>)}
              <th title="Bench innings (no heatmap — bench totals are tracked but not heat-shaded)" style={{ ...thStyle, width: 40, padding: "6px 2px", borderLeft: `2px solid ${C.border}` }}>BN</th>
            </tr></thead>
            <tbody>
              {roster.map((p, i) => {
                const bg = i % 2 === 0 ? C.surface : C.surfaceAlt;
                const usage = usageByPlayer[p.id] || {};
                return (
                  <tr key={p.id}>
                    <td style={{ ...tdStyle, background: bg, textAlign: "center", color: C.accent, fontWeight: 600, padding: "3px 2px", fontSize: 12 }}>{p.number || "—"}</td>
                    <td style={{ ...tdStyle, background: bg, fontWeight: 600, padding: "3px 2px 3px 10px", fontSize: 13 }}>{p.name}</td>
                    {ALL_POS.map(pos => {
                      const count = usage[pos] || 0;
                      const heat = count > 0 ? heatColor(count, usageRange.min, usageRange.max) : null;
                      return (
                        <td key={pos} style={{
                          ...tdStyle, textAlign: "center", padding: "3px 2px",
                          background: heat || bg,
                          color: count > 0 ? C.text : C.textLight,
                          fontWeight: count > 0 ? 700 : 400,
                          fontSize: 12,
                        }}>{formatUsage(count)}</td>
                      );
                    })}
                    {(() => {
                      const count = usage.BN || 0;
                      return (
                        <td key="BN" style={{
                          ...tdStyle, textAlign: "center", padding: "3px 2px",
                          background: bg,
                          color: count > 0 ? C.textMuted : C.textLight,
                          fontWeight: count > 0 ? 600 : 400,
                          fontSize: 12,
                          fontStyle: "italic",
                          borderLeft: `2px solid ${C.border}`,
                        }}>{formatUsage(count)}</td>
                      );
                    })()}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Arm Care — embedded here so all read-mostly team data lives on a
          single page. Uses the standalone ArmCareTab component as-is. */}
      <div style={{ marginBottom: 32 }}>
        {sectionHeader("Arm Care", "Pitcher rest tracker, status, and pitch log history.")}
        <ArmCareTab roster={roster} pitchLogs={pitchLogs} setPitchLogs={setPitchLogs} schedule={schedule} />
      </div>

      {/* Depth Chart — one column per field position (no P, no BN). Players
          stack vertically as tier-colored chips: green = preferred,
          yellow = secondary, orange = emergency. Within a tier, sorted by rank. */}
      <div style={{ marginBottom: 32 }}>
        {sectionHeader("Depth Chart", "Players at each field position, stacked by tier (green = preferred, yellow = secondary, orange = emergency).")}
        <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, overflowX: "auto" }}>
          <div style={{ display: "grid", gridTemplateColumns: `repeat(${FIELD_POS.length}, minmax(70px, 1fr))`, gap: 6 }}>
            {FIELD_POS.map(pos => {
              const players = [
                ...(depthChart.preferred[pos] || []).map(p => ({ p, tier: "preferred" })),
                ...(depthChart.secondary[pos] || []).map(p => ({ p, tier: "secondary" })),
                ...(depthChart.emergency[pos] || []).map(p => ({ p, tier: "emergency" })),
              ];
              return (
                <div key={pos} style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <div style={{ ...thStyle, padding: "6px 4px", textAlign: "center", borderBottom: "none", borderRadius: 4 }}>{pos}</div>
                  {players.length === 0 && (
                    <div style={{ color: C.textLight, fontSize: 12, textAlign: "center", padding: "8px 0", fontStyle: "italic" }}>—</div>
                  )}
                  {players.map(({ p, tier }) => (
                    <div key={`${pos}-${p.id}-${tier}`} style={{
                      background: TIER_BG[tier],
                      color: TIER_COLORS[tier],
                      border: `1px solid ${TIER_COLORS[tier]}`,
                      padding: "5px 6px",
                      borderRadius: 4,
                      fontSize: 12,
                      fontWeight: 600,
                      textAlign: "center",
                    }}>{p.name}</div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Roster Priority \u2014 combined positional + bench priority editor.
          Same component is rendered in SetupTab; both read App-level state
          so edits in either place are reflected in the other. */}
      <PriorityMatrix roster={roster} setRoster={setRoster} benchTiers={benchTiers} setBenchTiers={setBenchTiers} />
    </div>
  );
}

// ══════════════════════════════════════════════════
// ARM CARE TAB
// ══════════════════════════════════════════════════
function ArmCareTab({ roster, pitchLogs, setPitchLogs, canEdit = true, schedule = [] }) {
  const [sortCol, setSortCol] = useState("name");
  const [sortDir, setSortDir] = useState("asc");
  const [logPitcher, setLogPitcher] = useState("");
  const [logPitches, setLogPitches] = useState("");
  const [logDate, setLogDate] = useState(new Date().toISOString().slice(0, 10));
  const [logOpponent, setLogOpponent] = useState("");
  const [rulesOpen, setRulesOpen] = useState(false);
  // Placeholder info modal for the import buttons. Set to null to close, or
  // to { title, body } to open with that content.
  const [importInfo, setImportInfo] = useState(null);
  // "As-of" date: defaults to wall-clock today but the coach can scrub to any
  // date to see what the team's pitch state would have looked like / will look
  // like on that day.
  const wallClockToday = new Date().toISOString().slice(0, 10);
  const [today, setToday] = useState(wallClockToday);
  // When true, planned pitches from future saved lineups are folded into the
  // 7d/14d/30d totals and the Status calculation. Lets the coach scrub the
  // as-of date forward and see what each pitcher's situation will look like
  // under the current plan. Defaults to true so the season-planning view is
  // the default — toggle off to see only actual logged outings.
  const [includeProjected, setIncludeProjected] = useState(true);
  const pitchers = roster.filter(p => p.positionMap?.P);

  // Synthesize "projected" pitch entries from saved future-game lineups.
  // Only future, unplayed games are included — played games are already
  // represented by real entries in pitchLogs.
  const projectedLogs = useMemo(() => {
    if (!includeProjected) return [];
    const out = [];
    schedule.forEach(g => {
      if (!g?.lineup?.pitcherAssignments) return;
      if (!g.date || g.date < wallClockToday) return;
      if (g.played) return;
      g.lineup.pitcherAssignments.forEach(pa => {
        out.push({
          id: `proj_${g.id}_${pa.id}`,
          playerId: pa.id,
          pitches: pa.budget || 0,
          date: g.date,
          opponent: g.opponent || "",
          projected: true,
        });
      });
    });
    return out;
  }, [schedule, includeProjected, wallClockToday]);
  const allLogs = useMemo(() => [...pitchLogs, ...projectedLogs], [pitchLogs, projectedLogs]);

  const pitcherData = useMemo(() => pitchers.map(p => {
    const logs = allLogs.filter(l => l.playerId === p.id);
    const daysAgo = (d) => Math.floor((new Date(today) - new Date(d)) / 86400000);
    // Past-only: future-dated logs are ignored across the totals so the
    // 7d/14d/30d numbers stay consistent with the Status column.
    const last7  = logs.filter(l => { const d = daysAgo(l.date); return d >= 0 && d <= 7;  }).reduce((s, l) => s + l.pitches, 0);
    const last14 = logs.filter(l => { const d = daysAgo(l.date); return d >= 0 && d <= 14; }).reduce((s, l) => s + l.pitches, 0);
    const last30 = logs.filter(l => { const d = daysAgo(l.date); return d >= 0 && d <= 30; }).reduce((s, l) => s + l.pitches, 0);
    // Only consider logs at or before today — future-dated logs would
    // produce a negative `daysAgo` and inflate the rest math.
    const recent = logs.filter(l => { const d = daysAgo(l.date); return d >= 0 && d <= 7; }).sort((a, b) => b.date.localeCompare(a.date));
    let available = true, restRemaining = 0, reason = "Available";
    if (recent.length > 0) { const ll = recent[0]; const rn = getRestDays(ll.pitches); const ds = daysAgo(ll.date); restRemaining = Math.max(0, rn - ds); available = restRemaining === 0; reason = available ? "Available" : "Unavailable"; }
    const avail = ARM_CARE.dailyMax - logs.filter(l => l.date === today).reduce((s, l) => s + l.pitches, 0);
    return { ...p, last7, last14, last30, available, restRemaining, reason, availToday: Math.max(0, avail) };
  }), [pitchers, allLogs, today]);

  const sorted = useMemo(() => [...pitcherData].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === "name") { va = a.name.toLowerCase(); vb = b.name.toLowerCase(); }
    if (va < vb) return sortDir === "asc" ? -1 : 1;
    if (va > vb) return sortDir === "asc" ? 1 : -1;
    return 0;
  }), [pitcherData, sortCol, sortDir]);

  const toggleSort = (col) => { if (sortCol === col) setSortDir(d => d === "asc" ? "desc" : "asc"); else { setSortCol(col); setSortDir("asc"); } };
  const addLog = () => { if (!logPitcher || !logPitches) return; setPitchLogs(prev => [...prev, { id: Date.now().toString(), playerId: logPitcher, pitches: parseInt(logPitches), date: logDate, opponent: logOpponent }]); setLogPitches(""); setLogOpponent(""); };
  const deleteLog = (id) => setPitchLogs(prev => prev.filter(l => l.id !== id));
  const sortHeader = (label, col, width) => <th onClick={() => toggleSort(col)} style={{ ...thStyle, cursor: "pointer", width, userSelect: "none" }}>{label} {sortCol === col ? (sortDir === "asc" ? "\u25B2" : "\u25BC") : ""}</th>;

  const todayLabel = (() => {
    try {
      const d = new Date(today + "T12:00:00");
      return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric", year: "numeric" });
    } catch { return today; }
  })();

  return (
    <div>
      <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <div style={{ fontSize: 12, color: C.textMuted, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
          <span>Status, rest, and totals as of</span>
          <input type="date" value={today} onChange={e => setToday(e.target.value || wallClockToday)}
            style={{ background: C.surfaceAlt, border: `1px solid ${C.border}`, color: C.text, padding: "3px 8px", borderRadius: 6, fontFamily: FONT, fontSize: 12, outline: "none" }} />
          <span style={{ color: C.text, fontWeight: 600 }}>({todayLabel})</span>
          {today !== wallClockToday && (
            <button onClick={() => setToday(wallClockToday)} style={{ ...miniChipStyle, fontSize: 11, padding: "2px 8px" }}>Reset to today</button>
          )}
          <button onClick={() => setIncludeProjected(v => !v)}
            title="Add planned pitches from future saved lineups to the totals. Pair with the date scrubber above to see how a pitcher's situation evolves under the plan."
            style={{
              ...miniChipStyle, fontSize: 11, padding: "2px 8px",
              background: includeProjected ? C.accent : C.surface,
              color: includeProjected ? "#fff" : C.textMuted,
              borderColor: includeProjected ? C.accent : C.border,
            }}>
            {includeProjected ? "✓ " : ""}Include projected
          </button>
        </div>
        {/* Import buttons — top right of the Arm Care section. Open a placeholder
            modal explaining what's needed to wire each import format up. */}
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button onClick={() => setImportInfo({
            title: "Import GameChanger Data",
            body: "GameChanger import isn't wired up yet. To enable it, share a sample export file (CSV preferred) so the parser can match it column-for-column. Imported entries will override any pitch counts previously entered via Log Pitches for the same player + date.",
          })} style={{ ...chipStyle, padding: "6px 14px", fontSize: 12, fontWeight: 600 }}>Import GC Data</button>
          <button onClick={() => setImportInfo({
            title: "Import Pitch Count",
