            body: "League pitch-count import isn't wired up yet. To enable it, share a sample export file from the league tool — or describe the columns / fields it provides — and the parser can be built around it. Imported entries will override any pitch counts previously entered via Log Pitches for the same player + date.",
          })} style={{ ...chipStyle, padding: "6px 14px", fontSize: 12, fontWeight: 600 }}>Import Pitch Count</button>
        </div>
      </div>

      {importInfo && (
        <div onClick={() => setImportInfo(null)} style={{
          position: "fixed", inset: 0, background: "rgba(40,35,30,0.45)",
          display: "flex", alignItems: "center", justifyContent: "center",
          zIndex: 100, padding: 20,
        }}>
          <div onClick={(e) => e.stopPropagation()} style={{
            background: C.surface, color: C.text, borderRadius: 12, padding: 24,
            maxWidth: 460, width: "100%", fontFamily: FONT,
            boxShadow: "0 10px 40px rgba(0,0,0,0.15)",
          }}>
            <h2 style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, marginBottom: 12, color: C.text }}>{importInfo.title}</h2>
            <p style={{ fontSize: 13, color: C.text, lineHeight: 1.55, marginBottom: 18 }}>{importInfo.body}</p>
            <div style={{ display: "flex", justifyContent: "flex-end" }}>
              <button onClick={() => setImportInfo(null)} style={{
                background: C.accent, border: `1px solid ${C.accent}`, color: "#fff",
                padding: "8px 18px", borderRadius: 6, fontFamily: FONT, fontSize: 13, fontWeight: 600,
                cursor: "pointer",
              }}>Got it</button>
            </div>
          </div>
        </div>
      )}
      <div style={{ overflowX: "auto", marginBottom: 20, borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", background: C.surface, borderRadius: 8 }}>
          <thead><tr>
            {sortHeader("Player", "name", 100)}
            {sortHeader("Status", "available", 80)}
            {sortHeader("Avail", "availToday", 50)}
            {sortHeader("7d", "last7", 45)}
            {sortHeader("14d", "last14", 45)}
            {sortHeader("30d", "last30", 50)}
            <th style={{ ...thStyle, width: 60 }}>ERA</th>
            <th style={{ ...thStyle, width: 60 }}>WHIP</th>
            <th style={{ ...thStyle, width: 50 }}>K%</th>
          </tr></thead>
          <tbody>
            {sorted.map((p, i) => {
              const bg = i % 2 ? C.surfaceAlt : C.surface;
              return (
                <tr key={p.id}>
                  <td style={{ ...tdStyle, background: bg, fontWeight: 600, paddingLeft: 12 }}>{p.name}</td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center" }}>
                    <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 12, fontSize: 11, fontWeight: 600, background: p.available ? C.greenLight : C.redLight, color: p.available ? C.greenText : C.redText }}>{p.reason}</span>
                  </td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center", color: p.availToday > 0 ? C.greenText : C.redText, fontWeight: 600 }}>{p.availToday}</td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center" }}>{p.last7}</td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center" }}>{p.last14}</td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center" }}>{p.last30}</td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center", color: C.textLight }}>{"\u2014"}</td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center", color: C.textLight }}>{"\u2014"}</td>
                  <td style={{ ...tdStyle, background: bg, textAlign: "center", color: C.textLight }}>{"\u2014"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {canEdit && (
        <Section title="Log Pitches">
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            <select value={logPitcher} onChange={e => setLogPitcher(e.target.value)} style={{ ...inputStyle, minWidth: 130 }}>
              <option value="">Pitcher...</option>
              {pitchers.map(p => <option key={p.id} value={p.id}>#{p.number} {p.name}</option>)}
            </select>
            <input type="number" placeholder="Pitches" value={logPitches} onChange={e => setLogPitches(e.target.value)} min={1} max={75} style={{ ...inputStyle, width: 80 }} />
            <input type="date" value={logDate} onChange={e => setLogDate(e.target.value)} style={inputStyle} />
            <input placeholder="Opponent" value={logOpponent} onChange={e => setLogOpponent(e.target.value)} style={{ ...inputStyle, flex: "1 1 80px" }} />
            <button onClick={addLog} style={{ ...chipStyle, background: C.accent, color: "#fff", borderColor: C.accent, padding: "8px 18px", fontWeight: 600 }}>Log</button>
          </div>
        </Section>
      )}

      {pitchLogs.length > 0 && (
        <Section title={`Pitch Log (${pitchLogs.length})`} defaultOpen={false}>
          {[...pitchLogs].reverse().slice(0, 20).map(l => {
            const p = roster.find(r => r.id === l.playerId);
            return (
              <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0", borderBottom: `1px solid ${C.borderLight}`, fontSize: 13 }}>
                <span style={{ fontWeight: 600, minWidth: 75 }}>{p?.name || "?"}</span>
                <span style={{ color: C.accent, fontWeight: 600 }}>{l.pitches}pc</span>
                <span style={{ color: C.textMuted }}>{l.date}</span>
                <span style={{ color: C.textMuted, flex: 1 }}>{l.opponent || ""}</span>
                {canEdit && <button onClick={() => deleteLog(l.id)} style={{ ...miniChipStyle, color: C.red, borderColor: C.red, fontSize: 10, padding: "2px 6px" }}>&times;</button>}
              </div>
            );
          })}
        </Section>
      )}

      <div style={{ marginTop: 20 }}>
        <button onClick={() => setRulesOpen(!rulesOpen)} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", background: "transparent", border: "none", borderBottom: `1px solid ${C.border}`, padding: "10px 0", cursor: "pointer", fontFamily: FONT }}>
          <span style={{ fontSize: 11, color: C.accent, transform: rulesOpen ? "rotate(90deg)" : "rotate(0deg)", display: "inline-block", transition: "transform .2s" }}>{"\u25B6"}</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.textMuted }}>OBA 11U Arm Care Rules</span>
        </button>
        {rulesOpen && (
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: 18, fontSize: 13, color: C.textMuted, lineHeight: 2 }}>
            <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: "2px 20px" }}>
              <span style={{ color: C.accent, fontWeight: 600 }}>Daily max:</span><span>75 pitches</span>
              <span style={{ color: C.accent, fontWeight: 600 }}>0 days rest:</span><span>{"1\u201324 pitches"}</span>
              <span style={{ color: C.accent, fontWeight: 600 }}>1 day rest:</span><span>{"25\u201334 pitches"}</span>
              <span style={{ color: C.accent, fontWeight: 600 }}>2 days rest:</span><span>{"35\u201354 pitches"}</span>
              <span style={{ color: C.accent, fontWeight: 600 }}>3 days rest:</span><span>{"55\u201374 pitches"}</span>
              <span style={{ color: C.accent, fontWeight: 600 }}>4 days rest:</span><span>75 pitches</span>
              <span style={{ color: C.accent, fontWeight: 600 }}>Consecutive:</span><span>Max 3 days, never 4</span>
              <span style={{ color: C.accent, fontWeight: 600 }}>Catcher rule:</span><span>Pitcher cannot catch remainder of game</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// SETUP TAB (no CF restriction)
// ══════════════════════════════════════════════════
function SetupTab({ roster, setRoster, availablePlayers, absentIds, setAbsentIds, pitcherAssignments, setPitcherAssignments, catcherAssignments, setCatcherAssignments, benchTiers, setBenchTiers, pitcherAvailability, gameInnings, setGameInnings, gameMeta, setGameMeta, onGenerate }) {
  // On phone, the heavier planning sections start collapsed so the page
  // doesn't open as one long scroll. Tap a section title to expand.
  const isMobile = useIsMobile();
  const updateMeta = (field, value) => setGameMeta(prev => ({ ...prev, [field]: value }));
  const toggleAbsent = (id) => {
    setAbsentIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
    setPitcherAssignments(prev => prev.filter(p => p.id !== id));
    setCatcherAssignments(prev => prev.filter(c => c.id !== id));
  };
  const pitchEligible = availablePlayers.filter(p => p.positionMap?.P);
  const catchEligible = availablePlayers.filter(p => playerCanPlay(p, "C") && !pitcherAssignments.some(pa => pa.id === p.id));
  const addPitcher = (id) => { if (!pitcherAssignments.some(p => p.id === id)) setPitcherAssignments(prev => [...prev, { id, innings: 2, budget: 54 }]); };
  const removePitcher = (id) => setPitcherAssignments(prev => prev.filter(p => p.id !== id));
  const updatePitcher = (id, field, value) => setPitcherAssignments(prev => prev.map(p => p.id === id ? { ...p, [field]: value } : p));
  // Pitcher reorder: HTML5 drag-and-drop on desktop, ↑/↓ buttons for touch.
  // dragPitcherIdx tracks the source row; clears on drop or dragend.
  const [dragPitcherIdx, setDragPitcherIdx] = useState(null);
  const reorderPitcher = (fromIdx, toIdx) => {
    if (fromIdx === toIdx || fromIdx == null || toIdx == null) return;
    setPitcherAssignments(prev => {
      if (fromIdx < 0 || fromIdx >= prev.length) return prev;
      const clamped = Math.max(0, Math.min(toIdx, prev.length - 1));
      const next = [...prev];
      const [moved] = next.splice(fromIdx, 1);
      next.splice(clamped, 0, moved);
      return next;
    });
  };
  const addCatcher = (id) => { if (!catcherAssignments.some(c => c.id === id)) setCatcherAssignments(prev => [...prev, { id, innings: 3 }]); };
  const removeCatcher = (id) => setCatcherAssignments(prev => prev.filter(c => c.id !== id));
  const updateCatcher = (id, field, value) => setCatcherAssignments(prev => prev.map(c => c.id === id ? { ...c, [field]: value } : c));
  const totalPitcherInnings = pitcherAssignments.reduce((s, p) => s + p.innings, 0);
  const totalCatcherInnings = catcherAssignments.reduce((s, c) => s + c.innings, 0);
  const canGenerate = pitcherAssignments.length > 0 && catcherAssignments.length > 0 && totalPitcherInnings >= gameInnings && totalCatcherInnings >= gameInnings && availablePlayers.length >= 9;

  return (
    <div>
      <Section title="Game Details" defaultOpen>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 16, alignItems: "flex-end" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <label style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>Date</label>
            <input type="date" value={gameMeta.date || ""} onChange={e => updateMeta("date", e.target.value)}
              style={{ fontFamily: FONT, fontSize: 13, padding: "6px 10px", border: `1px solid ${C.border}`, borderRadius: 6, background: C.surface, color: C.text }} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <label style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>Time (optional)</label>
            <input type="time" value={gameMeta.time || ""} onChange={e => updateMeta("time", e.target.value)}
              style={{ fontFamily: FONT, fontSize: 13, padding: "6px 10px", border: `1px solid ${C.border}`, borderRadius: 6, background: C.surface, color: C.text }} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4, flex: 1, minWidth: 180 }}>
            <label style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>Opponent</label>
            <input type="text" value={gameMeta.opponent || ""} onChange={e => updateMeta("opponent", e.target.value)} placeholder="e.g. Burlington Bulls"
              style={{ fontFamily: FONT, fontSize: 13, padding: "6px 10px", border: `1px solid ${C.border}`, borderRadius: 6, background: C.surface, color: C.text }} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4, flexBasis: "100%" }}>
            <label style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>Home / Away</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {[{id:"home", label:"Home (vs)"}, {id:"away", label:"Away (@)"}].map(opt => (
                <button key={opt.id} onClick={() => updateMeta("homeAway", opt.id)}
                  style={{ ...chipStyle, background: (gameMeta.homeAway || "home") === opt.id ? C.accent : C.surface, color: (gameMeta.homeAway || "home") === opt.id ? "#fff" : C.text, borderColor: (gameMeta.homeAway || "home") === opt.id ? C.accent : C.border, padding: "6px 14px" }}>
                  {opt.label}
                </button>
              ))}
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4, flexBasis: "100%" }}>
            <label style={{ fontSize: 12, color: C.textMuted, fontWeight: 500 }}>Game Type</label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {GAME_TYPES.map(gt => (
                <button key={gt.id} onClick={() => updateMeta("gameType", gt.id)}
                  style={{ ...chipStyle, background: gameMeta.gameType === gt.id ? C.accent : C.surface, color: gameMeta.gameType === gt.id ? "#fff" : C.text, borderColor: gameMeta.gameType === gt.id ? C.accent : C.border, padding: "6px 14px" }}>
                  {gt.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      </Section>

      <Section title="Game Length" defaultOpen>
        <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <label style={{ fontSize: 13, color: C.textMuted, fontWeight: 500 }}>Innings:</label>
          {[4,5,6,7].map(n => (
            <button key={n} onClick={() => setGameInnings(n)} style={{ ...chipStyle, background: gameInnings === n ? C.accent : C.surface, color: gameInnings === n ? "#fff" : C.text, borderColor: gameInnings === n ? C.accent : C.border, padding: "6px 14px" }}>{n}</button>
          ))}
          <div style={{ marginLeft: "auto", fontSize: 13, color: C.textMuted }}>{availablePlayers.length} players available</div>
        </div>
      </Section>

      <Section title={`Attendance (${availablePlayers.length}/${roster.length})`}>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {roster.map(p => {
            const absent = absentIds.includes(p.id);
            return <button key={p.id} onClick={() => toggleAbsent(p.id)} style={{ ...chipStyle, padding: "7px 14px", background: absent ? C.redLight : C.surface, color: absent ? C.redText : C.text, borderColor: absent ? C.red : C.border, textDecoration: absent ? "line-through" : "none", opacity: absent ? 0.7 : 1 }}>#{p.number} {p.name}</button>;
          })}
        </div>
        <div style={{ fontSize: 12, color: C.textLight, marginTop: 10, fontStyle: "italic" }}>Tap a player to mark them absent</div>
      </Section>

      <Section title={`Pitching Plan (${totalPitcherInnings}/${gameInnings} inn)`} defaultOpen={!isMobile} alert={totalPitcherInnings < gameInnings ? `Need ${gameInnings - totalPitcherInnings} more innings` : null} success={totalPitcherInnings >= gameInnings}>
        {pitcherAssignments.map((pa, idx) => {
          const player = roster.find(p => p.id === pa.id);
          const avail = pitcherAvailability[pa.id];
          const isDragSource = dragPitcherIdx === idx;
          return (
            <div
              key={pa.id}
              draggable
              onDragStart={(e) => { setDragPitcherIdx(idx); try { e.dataTransfer.effectAllowed = "move"; } catch {} }}
              onDragOver={(e) => { if (dragPitcherIdx !== null) e.preventDefault(); }}
              onDrop={(e) => { e.preventDefault(); if (dragPitcherIdx !== null && dragPitcherIdx !== idx) reorderPitcher(dragPitcherIdx, idx); setDragPitcherIdx(null); }}
              onDragEnd={() => setDragPitcherIdx(null)}
              title="Drag to reorder, or use the arrows on the right"
              style={{
                display: "flex", alignItems: "center", gap: 10,
                padding: "10px 0", borderBottom: `1px solid ${C.borderLight}`,
                flexWrap: "wrap", cursor: "grab",
                opacity: isDragSource ? 0.4 : 1,
                background: isDragSource ? C.surfaceAlt : "transparent",
                transition: "opacity 0.1s, background 0.1s",
              }}
            >
              <span style={{ color: C.accent, fontWeight: 700, width: 22, textAlign: "center", fontSize: 14, userSelect: "none" }}>{idx + 1}</span>
              <span style={{ fontWeight: 600, minWidth: 80, fontSize: 14 }}>{player?.name}</span>
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <label style={{ fontSize: 12, color: C.textMuted }}>Inn:</label>
                {[1,2,3,4,5,6,7].map(n => <button key={n} onClick={() => updatePitcher(pa.id, "innings", n)} style={{ ...miniChipStyle, background: pa.innings === n ? C.accent : C.surface, color: pa.innings === n ? "#fff" : C.textMuted, borderColor: pa.innings === n ? C.accent : C.border }}>{n}</button>)}
              </div>
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <label style={{ fontSize: 12, color: C.textMuted }}>Budget:</label>
                {ARM_CARE.budgetOptions.map(b => <button key={b} onClick={() => updatePitcher(pa.id, "budget", b)} style={{ ...miniChipStyle, background: pa.budget === b ? C.blue : C.surface, color: pa.budget === b ? "#fff" : C.textMuted, borderColor: pa.budget === b ? C.blue : C.border, fontSize: 11 }}>{b}</button>)}
              </div>
              {avail && (
                <span style={{
                  fontSize: 11, padding: "3px 8px", borderRadius: 12, fontWeight: 600,
                  background: !avail.available ? C.redLight : avail.hasWarnings ? C.orangeLight : C.greenLight,
                  color:      !avail.available ? C.redText  : avail.hasWarnings ? C.orange      : C.greenText,
                }}>{!avail.available ? "Unavailable" : avail.hasWarnings ? "Restricted" : "Available"}</span>
              )}
              <span style={{ fontSize: 11, color: C.textMuted }}>{"\u2192"} {getRestLabel(pa.budget)} rest</span>
              <div style={{ display: "flex", gap: 4, alignItems: "center", marginLeft: "auto" }}>
                <button onClick={() => reorderPitcher(idx, idx - 1)} disabled={idx === 0} title="Move up"
                  style={{ ...miniChipStyle, padding: "3px 8px", fontSize: 12, opacity: idx === 0 ? 0.3 : 1, cursor: idx === 0 ? "default" : "pointer" }}>{"\u2191"}</button>
                <button onClick={() => reorderPitcher(idx, idx + 1)} disabled={idx === pitcherAssignments.length - 1} title="Move down"
                  style={{ ...miniChipStyle, padding: "3px 8px", fontSize: 12, opacity: idx === pitcherAssignments.length - 1 ? 0.3 : 1, cursor: idx === pitcherAssignments.length - 1 ? "default" : "pointer" }}>{"\u2193"}</button>
                <button onClick={() => removePitcher(pa.id)} title="Remove pitcher" style={{ ...miniChipStyle, color: C.red, borderColor: C.red }}>&times;</button>
              </div>
              {avail && avail.warnings && avail.warnings.length > 0 && (
                <div style={{ flexBasis: "100%", display: "flex", flexDirection: "column", gap: 2, marginLeft: 32, marginTop: -4 }}>
                  {avail.warnings.map((w, i) => (
                    <span key={i} style={{ fontSize: 11, color: C.orange, fontWeight: 500 }}>
                      <span style={{ marginRight: 4 }}>{"\u26a0"}</span>{w.msg}
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        {(() => {
          const unassigned = pitchEligible.filter(p => !pitcherAssignments.some(pa => pa.id === p.id));
          const available   = unassigned.filter(p => pitcherAvailability[p.id]?.available !== false);
          const unavailable = unassigned.filter(p => pitcherAvailability[p.id]?.available === false);
          return (
            <React.Fragment>
              <div style={{ marginTop: 14 }}>
                <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8, fontWeight: 500 }}>Available arms:</div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {available.length === 0 && (
                    <span style={{ fontSize: 12, color: C.textLight, fontStyle: "italic" }}>None — all eligible pitchers are already assigned or resting.</span>
                  )}
                  {available.map(p => {
                    const avail = pitcherAvailability[p.id];
                    const hasWarn = !!avail?.hasWarnings;
                    const tip = avail?.warnings?.length > 0 ? avail.warnings.map(w => w.msg).join(" · ") : avail?.reason;
                    return <button key={p.id} onClick={() => addPitcher(p.id)} title={tip || ""} style={{
                        ...chipStyle, padding: "6px 12px",
                        background:  hasWarn ? C.orangeLight : C.greenLight,
                        borderColor: hasWarn ? C.orange      : C.green,
                        color:       hasWarn ? C.orange      : C.greenText,
                      }}>
                      {hasWarn && <span style={{ marginRight: 4 }}>{"⚠"}</span>}{p.name}
                    </button>;
                  })}
                </div>
              </div>
              {unavailable.length > 0 && (
                <div style={{ marginTop: 14 }}>
                  <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8, fontWeight: 500 }}>Unavailable:</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {unavailable.map(p => {
                      const avail = pitcherAvailability[p.id];
                      return <button key={p.id} disabled title={avail?.reason || "Unavailable"} style={{
                          ...chipStyle, padding: "6px 12px",
                          opacity: 0.5, cursor: "not-allowed",
                          background: C.redLight, borderColor: C.red, color: C.redText,
                        }}>
                        {p.name}
                      </button>;
                    })}
                  </div>
                </div>
              )}
            </React.Fragment>
          );
        })()}
      </Section>

      <Section title={`Catching Plan (${totalCatcherInnings}/${gameInnings} inn)`} defaultOpen={!isMobile} alert={totalCatcherInnings < gameInnings ? `Need ${gameInnings - totalCatcherInnings} more innings` : null} success={totalCatcherInnings >= gameInnings}>
        {catcherAssignments.map((ca, idx) => {
          const player = roster.find(p => p.id === ca.id);
          return (
            <div key={ca.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 0", borderBottom: `1px solid ${C.borderLight}` }}>
              <span style={{ color: C.accent, fontWeight: 700, width: 22, textAlign: "center", fontSize: 14 }}>{idx + 1}</span>
              <span style={{ fontWeight: 600, minWidth: 80, fontSize: 14 }}>{player?.name}</span>
              <div style={{ display: "flex", gap: 4, alignItems: "center" }}>
                <label style={{ fontSize: 12, color: C.textMuted }}>Inn:</label>
                {[1,2,3,4,5,6].map(n => <button key={n} onClick={() => updateCatcher(ca.id, "innings", n)} style={{ ...miniChipStyle, background: ca.innings === n ? C.accent : C.surface, color: ca.innings === n ? "#fff" : C.textMuted, borderColor: ca.innings === n ? C.accent : C.border }}>{n}</button>)}
              </div>
              <button onClick={() => removeCatcher(ca.id)} style={{ ...miniChipStyle, color: C.red, borderColor: C.red, marginLeft: "auto" }}>&times;</button>
            </div>
          );
        })}
        <div style={{ marginTop: 14 }}>
          <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8, fontWeight: 500 }}>Available catchers:</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {catchEligible
              .filter(p => !catcherAssignments.some(ca => ca.id === p.id))
              .slice()
              .sort((a, b) => (TIER_SCORE[playerTier(b, "C")] || 0) - (TIER_SCORE[playerTier(a, "C")] || 0))
              .map(p => {
                const tier = playerTier(p, "C");
                return <button key={p.id} onClick={() => addCatcher(p.id)} style={{ ...chipStyle, padding: "6px 12px", background: C.surface, borderColor: TIER_COLORS[tier] || C.border }}>
                  <span style={{ display: "inline-block", width: 7, height: 7, borderRadius: "50%", background: TIER_COLORS[tier] || C.textLight, marginRight: 6 }} />
                  {p.name}
                </button>;
            })}
          </div>
        </div>
      </Section>

      {/* Roster Priority \u2014 same combined editor that lives on the Team
          Reports tab. Rendered top-level (not inside a Section) so it's
          visually identical in both places, per the "match exactly" spec. */}
      <div style={{ marginTop: 14, marginBottom: 14 }}>
        <PriorityMatrix roster={roster} setRoster={setRoster} benchTiers={benchTiers} setBenchTiers={setBenchTiers} />
      </div>

      <div style={{ marginTop: 28, textAlign: "center" }}>
        <button onClick={onGenerate} disabled={!canGenerate} style={{
          background: canGenerate ? C.accent : C.surfaceAlt, color: canGenerate ? "#fff" : C.textLight,
          border: canGenerate ? "none" : `1px solid ${C.border}`, padding: "14px 48px", borderRadius: 8,
          fontFamily: FONT, fontSize: 16, fontWeight: 600, cursor: canGenerate ? "pointer" : "not-allowed",
          boxShadow: canGenerate ? "0 4px 14px rgba(107,127,94,0.3)" : "none",
        }}>Generate Lineup</button>
        {!canGenerate && (
          <div style={{ fontSize: 13, color: C.red, marginTop: 10 }}>
            {availablePlayers.length < 9 && "Need at least 9 available players. "}
            {pitcherAssignments.length === 0 && "Select at least one pitcher. "}
            {catcherAssignments.length === 0 && "Select at least one catcher. "}
            {totalPitcherInnings < gameInnings && `Pitching plan covers ${totalPitcherInnings}/${gameInnings} innings. `}
            {totalCatcherInnings < gameInnings && `Catching plan covers ${totalCatcherInnings}/${gameInnings} innings. `}
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// LINEUP TAB (with swap, finalize, PNG, color summary)
// ══════════════════════════════════════════════════
function LineupTab({ grid, setGrid, posHistory, benchCount, roster, fullRoster, warnings, innings, pitcherAssignments, catcherAssignments, benchTiers, gameMeta, isFinalized, setIsFinalized, generationId, isLinkedToSchedule = false, isPlayed = false, pitchLogsForGame = [], onSavePitchLog = () => {}, onDeleteLineup = () => {}, onRevalidate, onBack, canEdit = true, prevGame = null, nextGame = null, onNavigateToGame = () => {} }) {
  const isMobile = useIsMobile();
  const [pitchLogModalOpen, setPitchLogModalOpen] = useState(false);
  const [confirmDeleteLineup, setConfirmDeleteLineup] = useState(false);
  // Celebratory "Lineup is saved." modal that pops on finalize. Holds the
  // download shortcuts so the coach can grab a copy before heading to the
  // dugout — closes via the "Play ball!" CTA.
  const [savedModalOpen, setSavedModalOpen] = useState(false);
  const [swapSel, setSwapSel] = useState(null); // { innIdx, key, playerId }
  const [tickerIdx, setTickerIdx] = useState(0);
  const [dismissedMsgs, setDismissedMsgs] = useState(new Set());
  const [tickerHidden, setTickerHidden] = useState(false);
  const [validationOpen, setValidationOpen] = useState(false);
  const [lastGen, setLastGen] = useState(-1);
  // Undo / redo / reset for manual swaps. `history` is the past states (most
  // recent last); `future` holds states reachable via redo. `originalGridRef`
  // snapshots the grid as generated so Reset can revert. All three reset on a
  // fresh Generate (generationId bump).
  const [history, setHistory] = useState([]);
  const [future, setFuture] = useState([]);
  const originalGridRef = useRef(null);
  // Pin/solve UI was archived 2026-04-26 (see archive/pin-and-solve.md).
  // The engine still accepts pins; we just never set any.

  // Sort warnings biggest → smallest (severity: high > med > low)
  const SEVERITY_ORDER = { high: 0, med: 1, low: 2 };
  const sortedWarnings = [...(warnings || [])].sort((a, b) => (SEVERITY_ORDER[a.severity] ?? 3) - (SEVERITY_ORDER[b.severity] ?? 3));
  const visibleWarnings = sortedWarnings.filter(w => !dismissedMsgs.has(w.msg));

  // Reset ticker state on fresh generation
  useEffect(() => {
    if (generationId !== undefined && generationId !== lastGen) {
      setLastGen(generationId);
      setTickerIdx(0);
      setDismissedMsgs(new Set());
      setTickerHidden(false);
    }
  }, [generationId]);

  // Keep tickerIdx in bounds when warnings shrink (from swaps or dismissals)
  useEffect(() => {
    if (tickerIdx >= visibleWarnings.length && visibleWarnings.length > 0) setTickerIdx(0);
  }, [visibleWarnings.length]);

  // First-mount capture of the loaded grid as the "original" Reset target.
  useEffect(() => {
    if (grid && originalGridRef.current === null) {
      originalGridRef.current = JSON.parse(JSON.stringify(grid));
    }
  }, [grid]);

  // Fresh generation snapshots a new "original" and clears the undo/redo stacks.
  useEffect(() => {
    if (generationId === undefined) return;
    if (grid) originalGridRef.current = JSON.parse(JSON.stringify(grid));
    setHistory([]);
    setFuture([]);
  }, [generationId]);

  const handleUndo = () => {
    if (history.length === 0) return;
    const prev = history[history.length - 1];
    setHistory(h => h.slice(0, -1));
    setFuture(f => [...f, JSON.parse(JSON.stringify(grid))]);
    setGrid(prev);
    setSwapSel(null);
  };
  const handleRedo = () => {
    if (future.length === 0) return;
    const next = future[future.length - 1];
    setFuture(f => f.slice(0, -1));
    setHistory(h => [...h, JSON.parse(JSON.stringify(grid))]);
    setGrid(next);
    setSwapSel(null);
  };
  const handleReset = () => {
    if (!originalGridRef.current) return;
    setHistory([]);
    setFuture([]);
    setGrid(JSON.parse(JSON.stringify(originalGridRef.current)));
    setSwapSel(null);
  };
  const canUndo  = history.length > 0;
  const canRedo  = future.length > 0;
  const canReset = canUndo || canRedo;

  const activeTicker = !tickerHidden && visibleWarnings.length > 0 ? visibleWarnings[Math.min(tickerIdx, visibleWarnings.length - 1)] : null;
  const nextTicker = () => setTickerIdx(i => (i + 1) % Math.max(1, visibleWarnings.length));
  const prevTicker = () => setTickerIdx(i => (i - 1 + visibleWarnings.length) % Math.max(1, visibleWarnings.length));
  const dismissCurrent = () => {
    if (!activeTicker) return;
    setDismissedMsgs(s => { const n = new Set(s); n.add(activeTicker.msg); return n; });
  };

  // Manual revalidation: re-run validateLineup in the parent, reset the dismissed
  // set and ticker, and unhide the ticker so any new/remaining issues surface. The
  // grid already auto-revalidates on swap, but this gives a clear way to "take a
  // fresh look" after a batch of manual edits \u2014 especially useful if you've
  // dismissed a bunch of warnings and want to clear the slate.
  const [lastValidatedAt, setLastValidatedAt] = useState(null);
  const handleRevalidate = () => {
    if (onRevalidate) onRevalidate();
    setDismissedMsgs(new Set());
    setTickerIdx(0);
    setTickerHidden(false);
    setLastValidatedAt(new Date());
  };

  if (!grid) {
    return (
      <div style={{ textAlign: "center", padding: 48, color: C.textMuted }}>
        <div style={{ fontFamily: DISPLAY, fontSize: 18, marginBottom: 12 }}>No lineup generated yet</div>
        {canEdit && <button onClick={onBack} style={{ ...chipStyle, background: C.accent, color: "#fff", borderColor: C.accent, padding: "8px 20px" }}>Go to Setup</button>}
      </div>
    );
  }

  const playerMap = {};
  roster.forEach(p => { playerMap[p.id] = p; });
  const positions = ["P", ...FIELD_POS, "BN"];

  // ── Defensive strength: TIER_SCORE aggregated per-inning and per-position ──
  const STRENGTH_POS = ["P", ...FIELD_POS]; // 9 scored positions
  const STRENGTH_MAX = 3;
  const cellScore = (pid, pos) => {
    if (!pid) return 0;
    const p = playerMap[pid];
    const t = p ? playerTier(p, pos) : null;
    return t ? (TIER_SCORE[t] || 0) : 0;
  };
  const inningStrength = grid.map(inn => {
    let sum = 0, max = 0;
    STRENGTH_POS.forEach(pos => { max += STRENGTH_MAX; sum += cellScore(inn[pos], pos); });
    return { sum, max, pct: max > 0 ? Math.round((sum / max) * 100) : 0 };
  });
  const positionStrength = {};
  STRENGTH_POS.forEach(pos => {
    let sum = 0, max = 0;
    grid.forEach(inn => { max += STRENGTH_MAX; sum += cellScore(inn[pos], pos); });
    positionStrength[pos] = { sum, max, pct: max > 0 ? Math.round((sum / max) * 100) : 0 };
  });
  const strengthColor = (p) => {
    if (p >= 90) return { bg: "#d7e9c9", text: "#3d5c2a" };
    if (p >= 80) return { bg: "#e8f2dd", text: "#4a6e3f" };
    if (p >= 70) return { bg: "#fff3cd", text: "#7a5c1a" };
    if (p >= 60) return { bg: "#fde3c8", text: "#8a4f1a" };
    return { bg: "#fddcd4", text: "#9e4f3f" };
  };
  const strengthChip = (p) => {
    const c = strengthColor(p);
    return <span style={{ display: "inline-block", padding: "1px 5px", borderRadius: 3, fontSize: 10, fontWeight: 700, background: c.bg, color: c.text, minWidth: 30, textAlign: "center", marginLeft: 6, verticalAlign: "middle" }}>{p}%</span>;
  };

  const handleCellClick = (innIdx, key, playerId) => {
    if (!canEdit) return;
    if (isFinalized) return;
    // First click: must be on a filled cell (you need to pick a player to move)
    if (!swapSel) {
      if (!playerId) return;
      setSwapSel({ innIdx, key, playerId });
      return;
    }
    // Click same cell again → deselect
    if (swapSel.innIdx === innIdx && swapSel.key === key) { setSwapSel(null); return; }
    // Click different inning → reset selection to new cell (if filled)
    if (swapSel.innIdx !== innIdx) {
      if (playerId) setSwapSel({ innIdx, key, playerId }); else setSwapSel(null);
      return;
    }
    // Same inning, different cell → swap (target may be empty)
    const newGrid = JSON.parse(JSON.stringify(grid));
    const inn = newGrid[innIdx];
    const getP = (k) => {
      if (k.startsWith("BN-")) {
        const idx = parseInt(k.split("-")[1]);
        return (inn.BN || [])[idx] || null;
      }
      return inn[k] || null;
    };
    const setP = (k, v) => {
      if (k.startsWith("BN-")) {
        if (!inn.BN) inn.BN = [];
        const idx = parseInt(k.split("-")[1]);
        if (v) { inn.BN[idx] = v; }
        else {
          // Removing from BN — splice out to keep array tight
          if (idx < inn.BN.length) inn.BN.splice(idx, 1);
        }
      } else {
        inn[k] = v || null;
      }
    };
    const p1 = getP(swapSel.key);
    const p2 = getP(key);
    // Handle BN→field with empty target: need to append to BN array if going to bench empty slot
    if (swapSel.key.startsWith("BN-") && key.startsWith("BN-")) {
      // Both are bench slots — swap or move
      setP(swapSel.key, p2);
      setP(key, p1);
    } else if (key.startsWith("BN-") && !p2) {
      // Moving a player TO an empty bench slot: push to BN array
      setP(swapSel.key, null);
      if (!inn.BN) inn.BN = [];
      inn.BN.push(p1);
    } else if (swapSel.key.startsWith("BN-") && !p2) {
      // Moving a bench player to an empty field position
      setP(key, p1);
      setP(swapSel.key, null);
    } else {
      // Standard swap (either filled/filled, or field empty target)
      setP(swapSel.key, p2);
      setP(key, p1);
    }
    // Push current grid onto history for undo, clear redo stack.
    setHistory(h => [...h, JSON.parse(JSON.stringify(grid))]);
    setFuture([]);
    setGrid(newGrid);
    setSwapSel(null);
  };

  const isSelected = (innIdx, key) => swapSel && swapSel.innIdx === innIdx && swapSel.key === key;

  const handleFinalize = () => { setIsFinalized(true); setSavedModalOpen(true); };
  const handleEdit = () => setIsFinalized(false);

  // Filename builder for downloaded artifacts. Produces names like
  // `lineup-png-whitby-may07.png` so a coach with a folder full of exports
  // can spot the right one at a glance. Falls back to today's date if the
  // game's date isn't set, and drops the opponent slug if no opponent.
  const buildExportFilename = (kind, ext) => {
    const slug = (s) => (s || "").toString().trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    const monthAbbr = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
    const oppSlug = slug(gameMeta?.opponent);
    let dateShort = "";
    const dateRaw = gameMeta?.date;
    if (dateRaw && /^\d{4}-\d{2}-\d{2}$/.test(dateRaw)) {
      const m = monthAbbr[parseInt(dateRaw.slice(5, 7), 10) - 1] || "";
      const d = dateRaw.slice(8, 10);
      if (m) dateShort = m + d;
    }
    if (!dateShort) {
      const today = new Date();
      dateShort = monthAbbr[today.getMonth()] + String(today.getDate()).padStart(2, "0");
    }
    return ["lineup", kind, oppSlug, dateShort].filter(Boolean).join("-") + ext;
  };

  const handleDownloadPNG = () => {
    const dataUrl = generatePNG(grid, posHistory, roster, innings, gameMeta);
    const link = document.createElement("a");
    link.download = buildExportFilename("png", ".png");
    link.href = dataUrl;
    link.click();
  };

  // Export the complete lineup as a structured JSON file. Includes game metadata,
  // the roster snapshot, pitching/catching plans, the inning-by-inning grid, each
  // player's per-inning history, and bench counts. Everything needed to rebuild
  // or archive this game. Filename embeds date + opponent when set.
  const handleExportJSON = () => {
    const meta = gameMeta || {};
    const slug = (s) => (s || "").toString().trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    const playerMini = (p) => ({ id: p.id, name: p.name, number: p.number, positionMap: p.positionMap });
    const payload = {
      schemaVersion: 1,
      exportedAt: new Date().toISOString(),
      game: {
        date: meta.date || null,
        opponent: meta.opponent || null,
        gameType: meta.gameType || null,
        innings,
      },
      roster: roster.map(playerMini),
      pitcherAssignments: pitcherAssignments || [],
      catcherAssignments: catcherAssignments || [],
      benchTiers: benchTiers || {},
      lineup: {
        // Per-inning grid: one object per inning keyed by position (P/C/1B/.../RF)
        // plus a BN array. Values are player IDs; resolve against `roster` above.
        grid: grid,
        // Per-player history: { playerId: ["P"|"1B"|..."BN", ...innings] }
        posHistory,
        // Total innings on the bench per player.
        benchCount,
      },
      isFinalized: !!isFinalized,
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const datePart = meta.date || new Date().toISOString().slice(0, 10);
    const oppPart = slug(meta.opponent);
    const name = ["dugout-lineup", datePart, oppPart].filter(Boolean).join("-") + ".json";
    const link = document.createElement("a");
    link.href = url;
    link.download = name;
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // Export a self-contained, interactive HTML file for use during the game.
  // The exported file shows the lineup grid with full tier coloring, supports
  // tap-to-swap on any two cells (field, bench, or pitcher), marks swapped
  // cells with a small dot, and persists changes in localStorage. A "reset to
  // plan" button restores the original lineup. No network, no dependencies.
  const handleExportGameDay = () => {
    const meta = gameMeta || {};
    const slug = (s) => (s || "").toString().trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    const datePart = meta.date || new Date().toISOString().slice(0, 10);
    const oppSlug = slug(meta.opponent);
    const gameId = ["game", datePart, oppSlug].filter(Boolean).join("-");

    // Stripped-down roster: only the fields the exported file actually needs.
    const playerMini = (p) => ({ id: p.id, name: p.name, number: p.number, positionMap: p.positionMap });
    const payload = {
      gameId,
      meta: {
        date: meta.date || null,
        opponent: meta.opponent || null,
        gameType: meta.gameType || null,
      },
      innings,
      roster: roster.map(playerMini),
      grid,
    };

    // Build a friendly title — falls back gracefully when no opponent is set.
    const titleParts = ["Lineup"];
    if (meta.opponent) titleParts.push("vs " + meta.opponent);
    if (meta.date) titleParts.push("— " + meta.date);
    const title = titleParts.join(" ");

    // Decode template from base64 and substitute placeholders.
    const tmpl = atob(GAME_DAY_TEMPLATE_B64);
    const html = tmpl
      .replace("__GAME_TITLE__", title.replace(/[<>&]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;"}[c])))
      .replace("__GAME_DATA__", JSON.stringify(payload));

    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const link = document.createElement("a");
    link.href = url;
    link.download = buildExportFilename("html", ".html");
    link.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // Open a minimal new window containing only the inning-by-inning position grid
  // (no player summary, no validation ticker, no pitch budget) and trigger the
  // browser's print dialog. Uses a self-contained HTML doc so the page's own
  // stickies/buttons don't end up on the printout.
  const handlePrintGrid = () => {
    const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    const maxBench = Math.max(...grid.map(inn => (inn.BN || []).length), 0);
    const dateStr = new Date().toISOString().slice(0, 10);

    const headerCells = Array.from({ length: innings }, (_, i) => {
      const pct = inningStrength[i] ? inningStrength[i].pct : null;
      const chip = pct != null ? `<span class="chip">${pct}%</span>` : "";
      return `<th>Inn ${i + 1}${chip}</th>`;
    }).join("");

    const posRows = positions.filter(p => p !== "BN").map(pos => {
      const pct = positionStrength[pos] ? positionStrength[pos].pct : null;
      const chip = pct != null ? `<span class="chip">${pct}%</span>` : "";
      const cells = grid.map(inn => {
        const pid = inn[pos];
        const player = pid ? playerMap[pid] : null;
        const tier = player ? playerTier(player, pos) : null;
        const tierClass = tier ? `tier-${tier}` : "";
        return `<td class="${tierClass}">${player ? esc(player.name) : ""}</td>`;
      }).join("");
      return `<tr><th class="pos">${pos}${chip}</th>${cells}</tr>`;
    }).join("");

    const benchRows = Array.from({ length: maxBench }, (_, bnIdx) => {
      const cells = grid.map(inn => {
        const pid = (inn.BN || [])[bnIdx];
        const player = pid ? playerMap[pid] : null;
        return `<td class="bench">${player ? esc(player.name) : ""}</td>`;
      }).join("");
      const label = bnIdx === 0 ? `<th class="pos" rowspan="${maxBench}">BN</th>` : "";
      return `<tr>${label}${cells}</tr>`;
    }).join("");

    const html = `<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Lineup \u2014 ${dateStr}</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 24px; color: #1a1a1a; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { font-size: 12px; color: #666; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { border: 1px solid #999; padding: 6px 8px; text-align: center; }
  thead th { background: #e8e6e0; font-weight: 700; }
  th.pos { background: #e8e6e0; font-weight: 700; text-align: center; white-space: nowrap; }
  td.bench { color: #555; font-style: italic; background: #fafafa; }
  td.tier-preferred { background: #eaf3e1; }
  td.tier-secondary { background: #fff6d9; }
  td.tier-emergency { background: #fde0d4; }
  .chip { display: inline-block; margin-left: 6px; padding: 1px 5px; border: 1px solid #999; border-radius: 3px; font-size: 10px; font-weight: 700; vertical-align: middle; background: #fff; }
  .legend { margin-top: 14px; font-size: 11px; color: #444; display: flex; gap: 14px; flex-wrap: wrap; }
  .legend span { display: inline-flex; align-items: center; gap: 5px; }
  .swatch { display: inline-block; width: 12px; height: 12px; border: 1px solid #999; }
  @media print { body { margin: 12mm; } .noprint { display: none; } }
</style>
</head>
<body>
<h1>Lineup \u2014 ${dateStr}</h1>
<div class="sub">Inning-by-inning positional grid</div>
<table>
  <thead><tr><th class="pos">POS</th>${headerCells}</tr></thead>
  <tbody>
    ${posRows}
    ${benchRows}
  </tbody>
</table>
<div class="legend">
  <span><span class="swatch" style="background:#eaf3e1"></span>Preferred</span>
  <span><span class="swatch" style="background:#fff6d9"></span>Secondary</span>
  <span><span class="swatch" style="background:#fde0d4"></span>Emergency</span>
  <span>% chips = tier-score coverage (per inning in column headers, per position in row labels)</span>
</div>
<script>window.onload = function(){ setTimeout(function(){ window.print(); }, 150); };<\/script>
</body>
</html>`;

    const w = window.open("", "_blank", "width=900,height=700");
    if (!w) {
      alert("Popup blocked \u2014 allow popups for this page to use Print Grid.");
      return;
    }
    w.document.open();
    w.document.write(html);
    w.document.close();
  };

  const cellClickStyle = (innIdx, key, pid) => {
    const sel = isSelected(innIdx, key);
    const sameInningActiveSwap = swapSel && swapSel.innIdx === innIdx && !(swapSel.key === key);
    const canClick = !isFinalized && (pid || sameInningActiveSwap);
    const isDropTarget = sameInningActiveSwap && !pid;
    const outline = sel
      ? "2px solid #3b82f6"
      : isDropTarget
        ? "2px dashed #3b82f6"
        : "none";
    const style = {
      cursor: canClick ? "pointer" : "default",
      borderRadius: 4,
      outline,
      outlineOffset: -1,
      animation: sel ? "pulse-border 1.2s infinite" : "none",
      position: "relative",
    };
    if (isDropTarget) style.background = "#e0efff";
    return style;
  };

  // Friendly date string for the game header below: "Sat, May 7" rather than
  // the raw ISO. Mirrors the formatting used by LogPitchesModal.
  const gameDateLabel = (() => {
    if (!gameMeta?.date) return "";
    try {
      const d = new Date(gameMeta.date + "T12:00:00");
      return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
    } catch { return gameMeta.date; }
  })();
  const gameTypeLabel = gameMeta?.gameType
    ? (GAME_TYPES.find(gt => gt.id === gameMeta.gameType)?.label || null)
    : null;
  const headerSubParts = [
    gameDateLabel || null,
    gameMeta?.time ? formatTime(gameMeta.time) : null,
    gameTypeLabel,
  ].filter(Boolean);
  const showGameHeader = !!(gameMeta?.opponent || gameMeta?.date);

  // Short label for the prev/next nav buttons. Returns "May 17 vs Eagles"
  // (or "@ Eagles" for away). Falls back to just the date if the entry has
  // no opponent set.
  const formatNavLabel = (entry) => {
    if (!entry) return "";
    let datePart = entry.date || "";
    try {
      if (entry.date) {
        const d = new Date(entry.date + "T12:00:00");
        datePart = d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
      }
    } catch {}
    const oppPart = entry.opponent ? `${entry.homeAway === "away" ? "@" : "vs"} ${entry.opponent}` : "";
    return oppPart ? `${datePart} · ${oppPart}` : datePart;
  };

  return (
    <div>
      {/* Prev/next nav between games with saved lineups. Hidden when this
          lineup isn't tied to a schedule entry, or when there's only one
          game in the season so there's nothing to navigate to. */}
      {isLinkedToSchedule && (prevGame || nextGame) && (
        <div style={{ marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={() => prevGame && onNavigateToGame(prevGame)} disabled={!prevGame}
            title={prevGame ? `Previous game: ${formatNavLabel(prevGame)}` : "This is the earliest game with a saved lineup"}
            style={{
              ...miniChipStyle, fontSize: 12, padding: "5px 12px", fontWeight: 500,
              opacity: prevGame ? 1 : 0.35, cursor: prevGame ? "pointer" : "default",
              flex: "0 1 auto", minWidth: 0, maxWidth: "45%",
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
            }}>
            {"← "}{prevGame ? formatNavLabel(prevGame) : "—"}
          </button>
          <div style={{ flex: 1 }} />
          <button onClick={() => nextGame && onNavigateToGame(nextGame)} disabled={!nextGame}
            title={nextGame ? `Next game: ${formatNavLabel(nextGame)}` : "This is the latest game with a saved lineup"}
            style={{
              ...miniChipStyle, fontSize: 12, padding: "5px 12px", fontWeight: 500,
              opacity: nextGame ? 1 : 0.35, cursor: nextGame ? "pointer" : "default",
              flex: "0 1 auto", minWidth: 0, maxWidth: "45%",
              overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
            }}>
            {nextGame ? formatNavLabel(nextGame) : "—"}{" →"}
          </button>
        </div>
      )}

      {/* Game header — opponent + date + time + type pinned at the top so the
          coach knows which game they're editing, especially when bouncing
          between several entries from the schedule in one session. */}
      {showGameHeader && (
        <div style={{ marginBottom: 14, padding: "10px 14px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, display: "flex", flexWrap: "wrap", alignItems: "baseline", gap: "4px 12px" }}>
          {gameMeta?.opponent ? (
            <span style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, color: C.text }}>
              {gameMeta.homeAway === "away" ? "@ " : "vs "}{gameMeta.opponent}
            </span>
          ) : (
            <span style={{ fontFamily: DISPLAY, fontSize: 18, fontWeight: 700, color: C.textMuted, fontStyle: "italic" }}>
              Untitled game
            </span>
          )}
          {headerSubParts.length > 0 && (
            <span style={{ fontSize: 13, color: C.textMuted }}>
              {headerSubParts.join(" · ")}
            </span>
          )}
        </div>
      )}

      {/* Validation ticker — sticky at top so you can cycle through issues while swapping */}
      {false && canEdit && activeTicker && (() => {
        const sevColor = activeTicker.severity === "high" ? C.red : activeTicker.severity === "med" ? C.orange : C.textMuted;
        const sevBg = activeTicker.severity === "high" ? C.redLight : activeTicker.severity === "med" ? C.orangeLight : C.surfaceAlt;
        const sevLabel = activeTicker.severity === "high" ? "HIGH" : activeTicker.severity === "med" ? "MED" : "LOW";
        return (
          <div style={{ position: "sticky", top: 0, zIndex: 20, background: sevBg, border: `1px solid ${sevColor}`, borderRadius: 8, padding: "10px 12px", marginBottom: 14, display: "flex", alignItems: "center", gap: 10, boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
            <span style={{ fontSize: 10, fontWeight: 700, color: sevColor, letterSpacing: 0.5, padding: "2px 6px", border: `1px solid ${sevColor}`, borderRadius: 3, flexShrink: 0 }}>{sevLabel}</span>
            <div style={{ flex: 1, minWidth: 0, fontSize: 13, color: C.text, lineHeight: 1.4 }}>{activeTicker.msg}</div>
            <div style={{ fontSize: 11, color: C.textMuted, flexShrink: 0, whiteSpace: "nowrap" }}>
              {Math.min(tickerIdx, visibleWarnings.length - 1) + 1} / {visibleWarnings.length}
            </div>
            <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
              <button onClick={prevTicker} title="Previous concern" disabled={visibleWarnings.length < 2}
                style={{ ...miniChipStyle, padding: "4px 8px", opacity: visibleWarnings.length < 2 ? 0.4 : 1, cursor: visibleWarnings.length < 2 ? "default" : "pointer" }}>{"\u2190"}</button>
              <button onClick={nextTicker} title="Next concern" disabled={visibleWarnings.length < 2}
                style={{ ...miniChipStyle, padding: "4px 8px", opacity: visibleWarnings.length < 2 ? 0.4 : 1, cursor: visibleWarnings.length < 2 ? "default" : "pointer" }}>{"\u2192"}</button>
              <button onClick={dismissCurrent} title="Dismiss this concern" style={{ ...miniChipStyle, padding: "4px 10px", color: C.textMuted }}>Dismiss</button>
              <button onClick={() => setTickerHidden(true)} title="Hide ticker" style={{ ...miniChipStyle, padding: "4px 8px", color: C.textMuted }}>{"\u00d7"}</button>
            </div>
          </div>
        );
      })()}

      {/* Finalized banner */}
      {isFinalized && (
        <div style={{ background: C.greenLight, border: `1px solid ${C.green}`, borderRadius: 8, padding: "12px 16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ color: C.greenText, fontWeight: 600, fontSize: 14 }}>{"\u2713"} Lineup Locked</span>
          <span style={{ color: C.textMuted, fontSize: 13, flex: 1 }}>Ready to share</span>
          <button onClick={handleExportGameDay} style={{ ...chipStyle, padding: "6px 16px", fontWeight: 600 }}>Download Gameday HTML</button>
          <button onClick={handleDownloadPNG} style={{ ...chipStyle, background: C.accent, color: "#fff", borderColor: C.accent, padding: "6px 16px", fontWeight: 600 }}>Download PNG</button>
        </div>
      )}

      {/* Validation panel \u2014 collapsed by default; tap title to expand. The
          ticker above already surfaces high-severity issues one at a time, so
          the full list is mostly a "give me everything" reference now. */}
      {(() => {
        const hasWarnings = sortedWarnings.length > 0;
        const showTicker  = canEdit && !!activeTicker;
        const sev         = activeTicker?.severity;
        const sevColor    = sev === "high" ? C.red : sev === "med" ? C.orange : C.textMuted;
        const sevBg       = sev === "high" ? C.redLight : sev === "med" ? C.orangeLight : C.surfaceAlt;
        const sevLabel    = sev === "high" ? "HIGH" : sev === "med" ? "MED" : "LOW";

        const panelBg     = showTicker ? sevBg     : (hasWarnings ? C.orangeLight : C.greenLight);
        const panelBorder = showTicker ? sevColor  : (hasWarnings ? C.orange      : C.green);
        const titleColor  = showTicker ? sevColor  : (hasWarnings ? C.orange      : C.greenText);
        const stamp = lastValidatedAt
          ? `Checked ${lastValidatedAt.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`
          : "Auto-checked on swap";
        const open = validationOpen;
        return (
          <div style={{ background: panelBg, border: `1px solid ${panelBorder}`, borderRadius: 8, padding: open ? 16 : "8px 12px", marginBottom: 12, transition: "background .15s, border-color .15s" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
              {/* Chevron toggle (clicking expands/collapses the warning list) */}
              <button onClick={() => setValidationOpen(o => !o)}
                title={open ? "Collapse" : "Expand to see all warnings"}
                style={{ background: "transparent", border: "none", padding: 0, cursor: "pointer",
                         fontSize: 11, lineHeight: 1, color: titleColor, flexShrink: 0, fontWeight: 700,
                         display: "inline-block", width: 14, textAlign: "left",
                         transform: open ? "rotate(90deg)" : "rotate(0deg)",
                         transition: "transform .15s" }}>{"\u25b6"}</button>

              {showTicker ? (
                <React.Fragment>
                  <span style={{ fontSize: 10, fontWeight: 700, color: sevColor, letterSpacing: 0.5, padding: "2px 6px", border: `1px solid ${sevColor}`, borderRadius: 3, flexShrink: 0 }}>{sevLabel}</span>
                  <div style={{ flex: 1, minWidth: 0, fontSize: 13, color: C.text, lineHeight: 1.4 }}>{activeTicker.msg}</div>
                  <span style={{ fontSize: 11, color: C.textMuted, flexShrink: 0, whiteSpace: "nowrap" }}>
                    {Math.min(tickerIdx, visibleWarnings.length - 1) + 1} / {visibleWarnings.length}
                  </span>
                  <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                    <button onClick={prevTicker} title="Previous concern" disabled={visibleWarnings.length < 2}
                      style={{ ...miniChipStyle, padding: "4px 8px", opacity: visibleWarnings.length < 2 ? 0.4 : 1, cursor: visibleWarnings.length < 2 ? "default" : "pointer" }}>{"\u2190"}</button>
                    <button onClick={nextTicker} title="Next concern" disabled={visibleWarnings.length < 2}
                      style={{ ...miniChipStyle, padding: "4px 8px", opacity: visibleWarnings.length < 2 ? 0.4 : 1, cursor: visibleWarnings.length < 2 ? "default" : "pointer" }}>{"\u2192"}</button>
                    <button onClick={dismissCurrent} title="Dismiss this concern"
                      style={{ ...miniChipStyle, padding: "4px 10px", color: C.textMuted }}>Dismiss</button>
                    <button onClick={() => setTickerHidden(true)} title="Hide ticker"
                      style={{ ...miniChipStyle, padding: "4px 8px", color: C.textMuted }}>{"\u00d7"}</button>
                  </div>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <span style={{ flex: 1, fontSize: 12, fontWeight: 600, color: titleColor }}>
                    {hasWarnings
                      ? `Validation (${sortedWarnings.length}${dismissedMsgs.size > 0 ? `, ${dismissedMsgs.size} dismissed` : ""})`
                      : `Validation \u2014 no issues flagged`}
                  </span>
                  <span style={{ fontSize: 10, color: C.textMuted, fontWeight: 500 }}>{stamp}</span>
                  {hasWarnings && (tickerHidden || visibleWarnings.length === 0) && (
                    <button onClick={() => { setTickerHidden(false); setDismissedMsgs(new Set()); setTickerIdx(0); }}
                      style={{ ...miniChipStyle, fontSize: 11, padding: "2px 8px" }}>Show ticker</button>
                  )}
                  <button onClick={handleRevalidate} title="Re-run validation against the current lineup"
                    style={{ ...miniChipStyle, fontSize: 11, padding: "2px 10px", fontWeight: 600 }}>{"\u21bb"} Refresh</button>
                </React.Fragment>
              )}
            </div>

            {open && hasWarnings && (
              <div style={{ marginTop: 10 }}>
                {sortedWarnings.map((w, i) => {
                  const dismissed = dismissedMsgs.has(w.msg);
                  return (
                    <div key={i} style={{ fontSize: 13, color: dismissed ? C.textMuted : (w.severity === "high" ? C.redText : w.severity === "med" ? C.orange : C.textMuted), padding: "3px 0", textDecoration: dismissed ? "line-through" : "none", opacity: dismissed ? 0.6 : 1 }}>
                      {"\u2022"} {w.msg}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })()}

      {/* Swap hint + undo/redo/reset (right-justified). Mirrors the controls
          on the exported game-day HTML so the in-app and on-the-bench experiences
          line up. */}
      {canEdit && !isFinalized && (
        <div style={{ marginBottom: 16, display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <span style={{ fontSize: 12, color: C.textMuted, fontStyle: "italic" }}>
            Tap two players in the same inning to swap positions.
          </span>
          {swapSel && (
            <button onClick={() => setSwapSel(null)}
              style={{ ...miniChipStyle, fontSize: 11, color: C.red, borderColor: C.red, padding: "2px 8px" }}>Cancel</button>
          )}
          <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>
            <button onClick={handleUndo} disabled={!canUndo} title="Undo last swap"
              style={{ ...miniChipStyle, fontSize: 11, padding: "3px 10px", fontWeight: 600,
                       opacity: canUndo ? 1 : 0.4, cursor: canUndo ? "pointer" : "default" }}>{"\u21b6"} Undo</button>
            <button onClick={handleRedo} disabled={!canRedo} title="Redo"
              style={{ ...miniChipStyle, fontSize: 11, padding: "3px 10px", fontWeight: 600,
                       opacity: canRedo ? 1 : 0.4, cursor: canRedo ? "pointer" : "default" }}>{"\u21b7"} Redo</button>
            <button onClick={handleReset} disabled={!canReset} title="Revert to the originally-generated lineup"
              style={{ ...miniChipStyle, fontSize: 11, padding: "3px 10px", fontWeight: 600,
                       opacity: canReset ? 1 : 0.4, cursor: canReset ? "pointer" : "default" }}>{"\u21ba"} Reset</button>
          </div>
        </div>
      )}

      {/* Position Grid */}
      <div style={{ overflowX: "auto", borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.06)", marginBottom: 24 }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: FONT, fontSize: 13, background: C.surface, borderRadius: 8 }}>
          <thead><tr>
            <th style={thStyle}>POS</th>
            {Array.from({ length: innings }, (_, i) => (
              <th key={i} style={thStyle}>
                {/* Strength % chip disabled 2026-05-03 — could be misread by other coaches.
                    To re-enable, drop the `false &&` guard below. */}
                <span>Inn {i + 1}</span>{false && inningStrength[i] && strengthChip(inningStrength[i].pct)}
              </th>
            ))}
          </tr></thead>
          <tbody>
            {positions.map((pos) => {
              if (pos === "BN") {
                const maxBench = Math.max(...grid.map(inn => (inn.BN || []).length), 0);
                return Array.from({ length: maxBench }, (_, bnIdx) => (
                  <tr key={`BN-${bnIdx}`}>
                    {bnIdx === 0 && <td rowSpan={maxBench} style={{ ...tdStyle, fontWeight: 600, color: C.textLight, textAlign: "center", borderRight: `2px solid ${C.border}`, background: C.surfaceAlt, verticalAlign: "middle" }}>BN</td>}
                    {grid.map((inn, innIdx) => {
                      const pid = (inn.BN || [])[bnIdx];
                      const player = pid ? playerMap[pid] : null;
                      const key = `BN-${bnIdx}`;
                      return (
                        <td key={innIdx} onClick={() => handleCellClick(innIdx, key, pid)}
                          style={{ ...tdStyle, background: innIdx % 2 === 0 ? C.surface : C.surfaceAlt, ...cellClickStyle(innIdx, key, pid) }}>
                          {player && <BenchScoreBadge count={benchCount[pid]} />}
                          {player && (
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 4, paddingRight: 18, color: C.textLight, fontStyle: "italic", fontSize: 12 }}>
                              {false && <span title="pinned-removed" style={{ display: "none" }}>{"\u25CF"}</span>}
                              <span>{player.name}</span>
                            </div>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ));
              }
              return (
                <tr key={pos}>
                  <td style={{ ...tdStyle, fontWeight: 600, textAlign: "center", borderRight: `2px solid ${C.border}`, color: pos === "P" ? C.accent : C.text, background: C.surfaceAlt, whiteSpace: "nowrap" }}>
                    {/* Strength % chip disabled 2026-05-03 — see note on inning header above. */}
                    <span>{pos}</span>{false && positionStrength[pos] && strengthChip(positionStrength[pos].pct)}
                  </td>
                  {grid.map((inn, innIdx) => {
                    const pid = inn[pos];
                    const player = pid ? playerMap[pid] : null;
                    const tier = player ? playerTier(player, pos) : null;
                    const tierColor = tier ? TIER_COLORS[tier] : null;
                    const prevPid = innIdx > 0 ? grid[innIdx - 1][pos] : null;
                    const isCont = pid && pid === prevPid;
                    const pinned = false;
                    return (
                      <td key={innIdx} onClick={() => handleCellClick(innIdx, pos, pid)}
                        style={{ ...tdStyle, background: innIdx % 2 === 0 ? C.surface : C.surfaceAlt, ...cellClickStyle(innIdx, pos, pid) }}>
                        {player && <BenchScoreBadge count={benchCount[pid]} />}
                        {player && (
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 5, paddingRight: 18 }}>
                            {tierColor && <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: tierColor, flexShrink: 0 }} />}
                            <span style={{ fontWeight: 600, color: C.text, fontSize: 13 }}>{player.name}</span>
                            {pinned && <span title="Pinned \u2014 Solve Remaining will not change this cell" style={{ marginLeft: "auto", color: "#c97b2c", fontSize: 11, fontWeight: 700 }}>{"\u25CF"}</span>}
                          </div>
                        )}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Color-coded Player Summary Grid */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, marginBottom: 10, borderBottom: `1px solid ${C.border}`, paddingBottom: 6, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span>Player Summary</span>
          <div style={{ display: "flex", gap: 12, fontWeight: 500 }}>
            {Object.values(CAT_COLORS).map(c => (
              <div key={c.label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11 }}>
                <span style={{ width: 10, height: 10, borderRadius: 3, background: c.bg, border: `1px solid ${c.text}33`, display: "inline-block" }} />
                <span style={{ color: C.textMuted }}>{c.label}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{ overflowX: "auto", borderRadius: 8, boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", background: C.surface, borderRadius: 8 }}>
            <thead><tr>
              <th style={{ ...thStyle, textAlign: "left", paddingLeft: 12, width: 50 }}>#</th>
              <th style={{ ...thStyle, textAlign: "left", minWidth: 90 }}>Player</th>
              {Array.from({ length: innings }, (_, i) => <th key={i} style={{ ...thStyle, minWidth: 60 }}>Inn {i + 1}</th>)}
              <th style={{ ...thStyle, width: 50 }}>BN</th>
            </tr></thead>
            <tbody>
              {roster.map((p, ri) => {
                const history = posHistory[p.id] || [];
                const bnCount = history.filter(h => h === "BN").length;
                const bt = BENCH_TIER_MAP[benchTiers[p.id] || DEFAULT_BENCH_TIER];
                const overBench = bnCount > bt.maxBench;
                return (
                  <tr key={p.id}>
                    <td style={{ ...tdStyle, background: ri % 2 ? C.surfaceAlt : C.surface, color: C.accent, fontWeight: 600, paddingLeft: 12 }}>{p.number}</td>
                    <td style={{ ...tdStyle, background: ri % 2 ? C.surfaceAlt : C.surface, fontWeight: 600, textAlign: "center" }}>{p.name}</td>
                    {Array.from({ length: innings }, (_, i) => {
                      const pos = history[i];
                      if (!pos) return <td key={i} style={{ ...tdStyle, background: ri % 2 ? C.surfaceAlt : C.surface }} />;
                      const cat = POS_CAT[pos] || "bench";
                      const colors = CAT_COLORS[cat];
                      return (
                        <td key={i} style={{ ...tdStyle, background: ri % 2 ? C.surfaceAlt : C.surface, textAlign: "center", padding: "4px 6px" }}>
                          <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 6, fontSize: 12, fontWeight: 600, background: colors.bg, color: colors.text, minWidth: 32 }}>{pos}</span>
                        </td>
                      );
                    })}
                    <td style={{ ...tdStyle, background: ri % 2 ? C.surfaceAlt : C.surface, textAlign: "center", fontWeight: 600, color: overBench ? C.redText : C.textMuted, whiteSpace: "nowrap" }}>
                      {bnCount === 2
                        ? <span>{bnCount}</span>
                        : <BenchScoreBadge count={bnCount} size="md" />}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Pitch Budget */}
      <div style={{ marginBottom: 24 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, marginBottom: 10, borderBottom: `1px solid ${C.border}`, paddingBottom: 6 }}>Pitch Budget Impact</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
          {pitcherAssignments.map(pa => {
            const player = roster.find(p => p.id === pa.id);
            return (
              <div key={pa.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 16px", fontSize: 13 }}>
                <span style={{ fontWeight: 600 }}>{player?.name}</span>
                <span style={{ color: C.textMuted, marginLeft: 10 }}>Budget: {pa.budget}pc {"\u2192"} {getRestLabel(pa.budget)} rest</span>
              </div>

          })}

      {/* Secondary action row \u2014 back, gameday export, pitch log. Stacks
          vertically on mobile so each button is a clean full-width tap target. */}
      <div style={{
        display: "flex",
        flexDirection: isMobile ? "column" : "row",
        justifyContent: "center",
        alignItems: isMobile ? "stretch" : "center",
        gap: 10, marginTop: 28, flexWrap: "wrap",
      }}>
        <button onClick={onBack} style={{ ...chipStyle, padding: "10px 28px", background: C.surface, borderColor: C.accent, color: C.accent, fontSize: 14, fontWeight: 600 }}>{"\u2190"} {canEdit ? "Back to Setup" : "Back to Schedule"}</button>
        {canEdit && grid && (
          <button onClick={() => setConfirmDeleteLineup(true)}
            style={{ ...chipStyle, padding: "10px 28px", background: C.surface, borderColor: C.red, color: C.redText, fontSize: 14, fontWeight: 600 }}>
            Delete Lineup
          </button>

        {canEdit && isLinkedToSchedule && (
          <button onClick={() => setPitchLogModalOpen(true)} style={{
            ...chipStyle, padding: "10px 28px", fontSize: 14, fontWeight: 600,
            background: isPlayed ? C.greenLight : C.surface,
            borderColor: isPlayed ? C.green : C.border,
            color: isPlayed ? C.greenText : C.text,
          }}>{isPlayed ? "\u2713 Edit Pitch Log" : "Log Pitches"}</button>
        )}
      </div>

      {/* Primary action row \u2014 Finalize / Unlock on its own line, full-width feel */}
      {canEdit && (
        <div style={{ display: "flex", justifyContent: "center", marginTop: 14 }}>
          {!isFinalized ? (
            <button onClick={handleFinalize} style={{
              padding: "14px 56px", background: C.accent, color: "#fff", border: "none",
              borderRadius: 8, fontFamily: FONT, fontSize: 16, fontWeight: 700, cursor: "pointer",
              boxShadow: "0 4px 14px rgba(107,127,94,0.3)", letterSpacing: 0.3,
              minWidth: 280,

            <button onClick={handleEdit} style={{
              padding: "14px 56px", background: C.surface, color: C.orange,

              <button onClick={handleDownloadPNG} style={{ ...chipStyle, padding: "10px 20px", fontWeight: 600, fontSize: 13 }}>Download PNG</button>
            </div>
            <button onClick={() => setSavedModalOpen(false)} style={{
              background: C.accent, border: `1px solid ${C.accent}`, color: "#fff",
              padding: "12px 40px", borderRadius: 8, fontFamily: FONT, fontSize: 15, fontWeight: 700,
              cursor: "pointer", letterSpacing: 0.3,
              boxShadow: "0 4px 14px rgba(107,127,94,0.3)",

        <div onClick={() => setConfirmDeleteLineup(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 999, backdropFilter: "blur(2px)" }}>
